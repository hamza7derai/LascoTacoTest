<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LASCOTACO | Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --brand: #E85A24; --bg: #FDFBFA; }
        body { background-color: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        .premium-ease { transition: all 0.4s cubic-bezier(0.2, 0.9, 0.3, 1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* INPUTS */
        .input-solid { background-color: #F4F5F7; border: 2px solid transparent; border-radius: 16px; padding: 16px; width: 100%; outline: none; font-weight: 600; font-size: 15px; color: #1A1A1A; transition: 0.3s ease; }
        .input-solid:focus { border-color: var(--brand); background-color: white; box-shadow: 0 4px 20px rgba(232, 90, 36, 0.1); }
        .input-solid::placeholder { color: #A0AEC0; font-weight: 500; }

        /* TOGGLE SWITCH (iOS Style) */
        .toggle-checkbox:checked { right: 0; border-color: var(--brand); }
        .toggle-checkbox:checked + .toggle-label { background-color: var(--brand); }
        .toggle-checkbox:checked + .toggle-label:after { transform: translateX(100%); border-color: white; }

        /* BOTTOM SHEET MODAL */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); opacity: 0; pointer-events: none; z-index: 1000; }
        .modal-panel { position: fixed; bottom: 0; left: 0; right: 0; max-width: 600px; margin: 0 auto; background: white; border-radius: 36px 36px 0 0; transform: translateY(100%); pointer-events: none; z-index: 1001; max-height: 90vh; display: flex; flex-direction: column; box-shadow: 0 -20px 40px rgba(0,0,0,0.1); }
        .modal-open .modal-overlay { opacity: 1; pointer-events: auto; }
        .modal-open .modal-panel { transform: translateY(0); pointer-events: auto; }

        /* PRODUCT CARDS */
        .product-card { background: white; border-radius: 28px; border: 1px solid #F1F3F5; box-shadow: 0 8px 24px rgba(0,0,0,0.02); overflow: hidden; }
        .product-card:active { transform: scale(0.97); }
    </style>
</head>
<body class="pb-32" id="body-wrap">

    <header class="sticky top-0 z-40 bg-white/80 backdrop-blur-xl border-b border-gray-100 px-5 py-4 flex justify-between items-center max-w-[800px] mx-auto">
        <h1 class="text-2xl font-black text-[#E85A24] italic tracking-tight">LASCOTACO <span class="text-gray-300 font-bold text-sm not-italic ml-1">Admin</span></h1>
        <div class="flex gap-2">
            <button onclick="openBannerModal()" class="w-11 h-11 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center font-bold shadow-sm active:scale-95 premium-ease">
                <i data-lucide="image" class="w-5 h-5"></i>
            </button>
            <button onclick="openProductModal()" class="px-5 py-0 bg-[#E85A24] text-white rounded-full font-black text-sm shadow-[0_8px_20px_rgba(232,90,36,0.25)] flex gap-2 items-center active:scale-95 premium-ease">
                <i data-lucide="plus" class="w-5 h-5"></i> <span class="hidden sm:inline">Produit</span>
            </button>
        </div>
    </header>

    <div class="max-w-[800px] mx-auto px-5 pt-6 pb-4 flex flex-col sm:flex-row gap-3 sticky top-[73px] z-30 bg-var(--bg)">
        <div class="relative flex-1">
            <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
            <input type="text" id="search-bar" oninput="refreshList()" placeholder="Rechercher un produit..." class="w-full bg-white rounded-[20px] py-4 pl-12 pr-4 shadow-sm border border-gray-100 outline-none focus:border-[#E85A24] font-bold text-[15px] transition-colors">
        </div>
        <select id="filter-type" onchange="refreshList()" class="bg-white rounded-[20px] px-5 py-4 shadow-sm border border-gray-100 outline-none font-bold text-gray-700 text-[15px] appearance-none cursor-pointer">
            <option value="All">Tous les types</option>
            <option value="Restaurant">Restaurant</option>
            <option value="Épicerie">Épicerie</option>
        </select>
    </div>

    <main id="admin-list" class="max-w-[800px] mx-auto p-5 grid grid-cols-1 sm:grid-cols-2 gap-5"></main>


    <div class="modal-overlay premium-ease" id="modal-overlay" onclick="closeProductModal()"></div>
    <div class="modal-panel premium-ease" id="modal-panel">
        
        <div class="p-6 border-b border-gray-100 flex justify-between items-center shrink-0 relative">
            <div class="absolute top-3 left-1/2 -translate-x-1/2 w-12 h-1.5 bg-gray-200 rounded-full"></div>
            <h2 id="modal-title" class="text-2xl font-black text-gray-900 mt-2 tracking-tight">Nouveau Produit</h2>
            <button onclick="closeProductModal()" class="p-2.5 bg-gray-50 rounded-full text-gray-500 active:scale-90 premium-ease mt-2"><i data-lucide="x" class="w-5 h-5"></i></button>
        </div>

        <div class="p-6 overflow-y-auto no-scrollbar flex-1 space-y-8">
            <input type="hidden" id="p-id">
            
            <div class="space-y-4">
                <h3 class="font-black text-xs text-gray-400 uppercase tracking-widest ml-1">Infos Générales</h3>
                <input id="p-name" type="text" placeholder="Nom du produit (ex: Tacos Nuggets)" class="input-solid">
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="relative">
                        <input id="p-price" type="number" placeholder="Prix" class="input-solid pr-12">
                        <span class="absolute right-4 top-1/2 -translate-y-1/2 font-black text-gray-400">DH</span>
                    </div>
                    <select id="p-type" class="input-solid appearance-none" onchange="syncLabels()">
                        <option value="Restaurant">Restaurant</option>
                        <option value="Épicerie">Épicerie</option>
                    </select>
                </div>

                <div class="flex gap-2">
                    <select id="p-label" class="input-solid appearance-none flex-1"></select>
                    <button onclick="addNewLabel()" class="px-5 bg-gray-100 rounded-2xl text-gray-500 font-black text-xl hover:bg-gray-200 active:scale-95 premium-ease">+</button>
                </div>

                <textarea id="p-desc" placeholder="Description courte (ingrédients, détails...)" class="input-solid h-24 resize-none"></textarea>
                
                <div class="relative">
                    <input id="p-img" type="text" placeholder="URL de l'image" class="input-solid pl-12">
                    <i data-lucide="image" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
                </div>
            </div>

            <hr class="border-gray-100">

            <div class="space-y-6">
                <h3 class="font-black text-xs text-gray-400 uppercase tracking-widest ml-1">Options & Paramètres</h3>
                
                <div class="flex items-center justify-between p-4 bg-orange-50 rounded-[20px] border border-orange-100">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center text-orange-500 shadow-sm"><i data-lucide="zap" class="w-5 h-5"></i></div>
                        <div>
                            <p class="font-bold text-gray-900">Mettre en avant</p>
                            <p class="text-[11px] font-semibold text-orange-600">Afficher dans "Top vente"</p>
                        </div>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="p-top" class="sr-only peer">
                        <div class="w-14 h-8 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[4px] after:left-[4px] after:bg-white after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-[#E85A24] shadow-inner"></div>
                    </label>
                </div>

                <div class="flex items-center justify-between p-4 bg-gray-50 rounded-[20px] border border-gray-100">
                    <div>
                        <p class="font-bold text-gray-900">Choix de Sauces</p>
                        <p class="text-[11px] font-semibold text-gray-500">Demander la sauce au client</p>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="p-sauce" class="sr-only peer" onchange="toggleSection('sauce-ui')">
                        <div class="w-14 h-8 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[4px] after:left-[4px] after:bg-white after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-[#10B981] shadow-inner"></div>
                    </label>
                </div>

                <div id="sauce-ui" class="hidden bg-gray-50 p-4 rounded-[20px] space-y-3 border border-gray-100">
                    <div id="sauce-list" class="space-y-2"></div>
                    <button onclick="addSauceField()" class="w-full py-3 border-2 border-dashed border-gray-300 rounded-xl font-bold text-gray-500 text-sm hover:border-green-500 hover:text-green-600 premium-ease">+ Ajouter une sauce</button>
                </div>

                <div class="flex items-center justify-between p-4 bg-gray-50 rounded-[20px] border border-gray-100">
                    <div>
                        <p class="font-bold text-gray-900">Tailles / Variantes</p>
                        <p class="text-[11px] font-semibold text-gray-500">Ex: Petite 30DH, Grande 50DH</p>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="p-sizes-toggle" class="sr-only peer" onchange="toggleSection('size-ui')">
                        <div class="w-14 h-8 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[4px] after:left-[4px] after:bg-white after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-[#10B981] shadow-inner"></div>
                    </label>
                </div>

                <div id="size-ui" class="hidden bg-gray-50 p-4 rounded-[20px] space-y-3 border border-gray-100">
                    <div id="size-list" class="space-y-2"></div>
                    <button onclick="addSizeField()" class="w-full py-3 border-2 border-dashed border-gray-300 rounded-xl font-bold text-gray-500 text-sm hover:border-green-500 hover:text-green-600 premium-ease">+ Ajouter une taille</button>
                </div>

                <div class="flex items-center justify-between p-4 bg-gray-50 rounded-[20px] border border-gray-100">
                    <div>
                        <p class="font-bold text-gray-900">Instructions Spéciales</p>
                        <p class="text-[11px] font-semibold text-gray-500">Permettre les notes (ex: sans oignons)</p>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="p-instructions" class="sr-only peer" checked>
                        <div class="w-14 h-8 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[4px] after:left-[4px] after:bg-white after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-[#10B981] shadow-inner"></div>
                    </label>
                </div>

            </div>
        </div>

        <div class="p-6 bg-white shrink-0 border-t border-gray-100 shadow-[0_-10px_30px_rgba(0,0,0,0.03)]">
            <button onclick="saveProduct()" class="w-full bg-[#1A1A1A] text-white py-5 rounded-full font-black text-lg active:scale-95 premium-ease shadow-xl flex items-center justify-center gap-2">
                <i data-lucide="check-circle" class="w-6 h-6"></i> Enregistrer le produit
            </button>
        </div>
    </div>


    <div class="modal-overlay premium-ease" id="banner-overlay" onclick="closeBannerModal()"></div>
    <div class="modal-panel premium-ease" id="banner-panel">
        <div class="p-6 border-b border-gray-100 flex justify-between items-center shrink-0 relative">
            <div class="absolute top-3 left-1/2 -translate-x-1/2 w-12 h-1.5 bg-gray-200 rounded-full"></div>
            <h2 class="text-2xl font-black text-gray-900 mt-2 tracking-tight">Gérer les Slides</h2>
            <button onclick="closeBannerModal()" class="p-2.5 bg-gray-50 rounded-full text-gray-500 active:scale-90 premium-ease mt-2"><i data-lucide="x" class="w-5 h-5"></i></button>
        </div>
        <div class="p-6 overflow-y-auto flex-1 space-y-6">
            <div class="flex gap-2">
                <input id="banner-url" type="text" placeholder="URL de l'image (Slide)" class="input-solid flex-1">
                <button onclick="addBanner()" class="px-5 bg-blue-600 text-white rounded-[16px] font-black hover:bg-blue-700 active:scale-95 premium-ease">+</button>
            </div>
            <div id="banner-list" class="grid grid-cols-2 gap-3 pb-8"></div>
        </div>
    </div>


    <script>
        // FIREBASE SETUP
        const firebaseConfig = { apiKey: "AIzaSyBebaGxqiNBvCqofveg1Fmztl7av3Mdoyg", authDomain: "lascotaco-67fe5.firebaseapp.com", projectId: "lascotaco-67fe5", storageBucket: "lascotaco-67fe5.firebasestorage.app", messagingSenderId: "865918381027", appId: "1:865918381027:web:abc6435df20894020c4ed6" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // GLOBALS
        let dynamicSauces = [];
        let dynamicSizes = [];

        // ==========================================
        // UI & MODAL MANAGEMENT
        // ==========================================
        function showToast(msg) {
            const container = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = 'bg-[#1A1A1A] text-white px-5 py-4 rounded-[20px] text-[14px] font-bold shadow-2xl transition-all duration-400 translate-y-[-20px] opacity-0 flex items-center justify-between border border-gray-800 z-[9999]';
            t.innerHTML = `<div class="flex items-center gap-3"><i data-lucide="check-circle-2" class="w-5 h-5 text-[#25D366]"></i> <span>${msg}</span></div>`;
            container.appendChild(t); lucide.createIcons();
            requestAnimationFrame(() => t.classList.remove('translate-y-[-20px]', 'opacity-0'));
            setTimeout(() => { t.classList.add('translate-y-[-20px]', 'opacity-0'); setTimeout(() => t.remove(), 400); }, 2500);
        }

        function toggleSection(id) {
            const el = document.getElementById(id);
            if(el.classList.contains('hidden')) { el.classList.remove('hidden'); } else { el.classList.add('hidden'); }
        }

        // Product Modal
        function openProductModal(id = null) {
            document.getElementById('body-wrap').classList.add('modal-open');
            if(id) { document.getElementById('modal-title').innerText = "Modifier Produit"; } 
            else { 
                document.getElementById('modal-title').innerText = "Nouveau Produit";
                clearForm(); 
            }
        }
        function closeProductModal() { document.getElementById('body-wrap').classList.remove('modal-open'); }

        // Banner Modal
        function openBannerModal() {
            document.getElementById('banner-overlay').style.opacity = '1'; document.getElementById('banner-overlay').style.pointerEvents = 'auto';
            document.getElementById('banner-panel').style.transform = 'translateY(0)'; document.getElementById('banner-panel').style.pointerEvents = 'auto';
            loadBannersAdmin();
        }
        function closeBannerModal() {
            document.getElementById('banner-overlay').style.opacity = '0'; document.getElementById('banner-overlay').style.pointerEvents = 'none';
            document.getElementById('banner-panel').style.transform = 'translateY(100%)'; document.getElementById('banner-panel').style.pointerEvents = 'none';
        }


        // ==========================================
        // DYNAMIC ARRAYS (SAUCES & SIZES)
        // ==========================================
        function renderSauces() {
            const list = document.getElementById('sauce-list');
            list.innerHTML = dynamicSauces.map((s, idx) => `
                <div class="flex gap-2 items-center bg-white p-2 rounded-xl border border-gray-100 shadow-sm">
                    <input type="text" value="${s}" onchange="updateSauce(${idx}, this.value)" class="flex-1 bg-transparent font-bold text-sm outline-none px-2 text-gray-800" placeholder="Nom de la sauce">
                    <button onclick="removeSauce(${idx})" class="w-8 h-8 flex items-center justify-center bg-red-50 text-red-500 rounded-lg hover:bg-red-100"><i data-lucide="minus" class="w-4 h-4"></i></button>
                </div>
            `).join('');
            lucide.createIcons();
        }
        function addSauceField() { dynamicSauces.push(''); renderSauces(); }
        function updateSauce(idx, val) { dynamicSauces[idx] = val; }
        function removeSauce(idx) { dynamicSauces.splice(idx, 1); renderSauces(); }

        function renderSizes() {
            const list = document.getElementById('size-list');
            list.innerHTML = dynamicSizes.map((s, idx) => `
                <div class="flex gap-2 items-center bg-white p-2 rounded-xl border border-gray-100 shadow-sm">
                    <input type="text" value="${s.name}" onchange="updateSizeName(${idx}, this.value)" class="w-1/2 bg-transparent font-bold text-sm outline-none px-2 text-gray-800" placeholder="Ex: Grande">
                    <input type="number" value="${s.price}" onchange="updateSizePrice(${idx}, this.value)" class="w-1/3 bg-transparent font-black text-sm outline-none px-2 text-[#E85A24]" placeholder="Prix">
                    <button onclick="removeSize(${idx})" class="w-8 h-8 flex items-center justify-center bg-red-50 text-red-500 rounded-lg hover:bg-red-100"><i data-lucide="minus" class="w-4 h-4"></i></button>
                </div>
            `).join('');
            lucide.createIcons();
        }
        function addSizeField() { dynamicSizes.push({name: '', price: 0}); renderSizes(); }
        function updateSizeName(idx, val) { dynamicSizes[idx].name = val; }
        function updateSizePrice(idx, val) { dynamicSizes[idx].price = Number(val); }
        function removeSize(idx) { dynamicSizes.splice(idx, 1); renderSizes(); }


        // ==========================================
        // CATEGORIES LOGIC
        // ==========================================
        async function syncLabels(defaultVal = null) {
            const type = document.getElementById('p-type').value;
            const select = document.getElementById('p-label');
            select.innerHTML = "";
            const snap = await db.collection("categories").where("type", "==", type).get();
            snap.forEach(doc => { select.innerHTML += `<option value="${doc.data().name}">${doc.data().name}</option>`; });
            if(defaultVal) select.value = defaultVal;
        }

        async function addNewLabel() {
            const name = prompt("Nom du nouveau label (ex: Tacos, Boissons...):");
            if(name) {
                const type = document.getElementById('p-type').value;
                await db.collection("categories").add({ name: name, type: type });
                syncLabels(name); showToast("Catégorie ajoutée");
            }
        }

        // ==========================================
        // PRODUCT CRUD LOGIC
        // ==========================================
        function clearForm() {
            document.getElementById('p-id').value = ""; document.getElementById('p-name').value = "";
            document.getElementById('p-price').value = ""; document.getElementById('p-desc').value = "";
            document.getElementById('p-img').value = ""; document.getElementById('p-top').checked = false;
            
            document.getElementById('p-sauce').checked = false; document.getElementById('sauce-ui').classList.add('hidden'); dynamicSauces = []; renderSauces();
            document.getElementById('p-sizes-toggle').checked = false; document.getElementById('size-ui').classList.add('hidden'); dynamicSizes = []; renderSizes();
            document.getElementById('p-instructions').checked = true;
            syncLabels();
        }

        async function saveProduct() {
            const id = document.getElementById('p-id').value;
            
            // Clean dynamic arrays
            const finalSauces = dynamicSauces.filter(s => s.trim() !== '');
            const finalSizes = dynamicSizes.filter(s => s.name.trim() !== '' && s.price > 0);

            const data = {
                name: document.getElementById('p-name').value,
                price: Number(document.getElementById('p-price').value),
                type: document.getElementById('p-type').value,
                category: document.getElementById('p-label').value,
                description: document.getElementById('p-desc').value,
                image: document.getElementById('p-img').value,
                isTop: document.getElementById('p-top').checked,
                
                requiresSauce: document.getElementById('p-sauce').checked,
                sauces: finalSauces,
                hasSizes: document.getElementById('p-sizes-toggle').checked,
                sizes: finalSizes,
                hasInstructions: document.getElementById('p-instructions').checked,
                
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            };

            if(!data.name || !data.price) return alert("Le nom et le prix sont obligatoires !");

            if(id) { await db.collection("products").doc(id).update(data); showToast("Produit modifié !"); } 
            else { await db.collection("products").add(data); showToast("Produit ajouté !"); }

            closeProductModal(); refreshList();
        }

        async function editProduct(id) {
            const doc = await db.collection("products").doc(id).get();
            const p = doc.data();
            
            document.getElementById('p-id').value = id;
            document.getElementById('p-name').value = p.name;
            document.getElementById('p-price').value = p.price || '';
            document.getElementById('p-type').value = p.type || 'Restaurant';
            await syncLabels(p.category);
            document.getElementById('p-desc').value = p.description || '';
            document.getElementById('p-img').value = p.image || '';
            document.getElementById('p-top').checked = p.isTop || false;

            // Options Setup
            document.getElementById('p-sauce').checked = p.requiresSauce || false;
            if(p.requiresSauce) { document.getElementById('sauce-ui').classList.remove('hidden'); } else { document.getElementById('sauce-ui').classList.add('hidden'); }
            dynamicSauces = p.sauces || []; renderSauces();

            document.getElementById('p-sizes-toggle').checked = p.hasSizes || false;
            if(p.hasSizes) { document.getElementById('size-ui').classList.remove('hidden'); } else { document.getElementById('size-ui').classList.add('hidden'); }
            dynamicSizes = p.sizes || []; renderSizes();

            document.getElementById('p-instructions').checked = p.hasInstructions !== false; // default true

            openProductModal(id);
        }

        async function deleteProd(id, name) {
            if(confirm(`Supprimer définitivement "${name}" ?`)) {
                await db.collection("products").doc(id).delete();
                showToast("Produit supprimé"); refreshList();
            }
        }

        async function refreshList() {
            const search = document.getElementById('search-bar').value.toLowerCase();
            const filterType = document.getElementById('filter-type').value;
            const list = document.getElementById('admin-list');
            
            const snap = await db.collection("products").orderBy("timestamp", "desc").get();
            list.innerHTML = "";

            snap.forEach(doc => {
                const p = doc.data();
                if(filterType !== "All" && p.type !== filterType) return;
                if(search && !p.name.toLowerCase().includes(search)) return;

                // Build option badges
                let badges = `<span class="bg-gray-100 text-gray-500 text-[9px] font-black uppercase px-2 py-1 rounded">${p.category}</span>`;
                if(p.isTop) badges += `<span class="bg-orange-100 text-orange-600 text-[9px] font-black uppercase px-2 py-1 rounded flex items-center gap-1"><i data-lucide="zap" class="w-3 h-3"></i> Top</span>`;
                if(p.requiresSauce) badges += `<span class="bg-green-100 text-green-600 text-[9px] font-black uppercase px-2 py-1 rounded">Sauces</span>`;

                list.innerHTML += `
                <div class="product-card flex flex-col premium-ease hover:shadow-md cursor-pointer group" onclick="editProduct('${doc.id}')">
                    <div class="h-32 bg-[#FAF5F0] relative overflow-hidden">
                        <img src="${p.image}" class="w-full h-full object-cover mix-blend-multiply premium-ease group-hover:scale-105" loading="lazy">
                        <div class="absolute top-3 left-3 flex gap-1">${badges}</div>
                    </div>
                    <div class="p-4 flex flex-col flex-1 justify-between bg-white z-10 relative">
                        <div>
                            <h3 class="font-bold text-[14px] text-gray-900 leading-tight line-clamp-1">${p.name}</h3>
                            <p class="font-black mt-2 text-[18px]" style="color: var(--brand)">${p.price} DH</p>
                        </div>
                        <div class="flex gap-2 mt-4 pt-4 border-t border-gray-50">
                            <button class="flex-1 bg-gray-50 py-2.5 rounded-[12px] text-gray-700 font-bold text-xs hover:bg-gray-100 flex justify-center items-center gap-2"><i data-lucide="edit-3" class="w-3.5 h-3.5"></i> Modifier</button>
                            <button onclick="event.stopPropagation(); deleteProd('${doc.id}', '${p.name.replace(/'/g, "\\'")}')" class="w-10 flex items-center justify-center bg-red-50 text-red-500 rounded-[12px] hover:bg-red-100"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </div>
                    </div>
                </div>`;
            });
            lucide.createIcons();
        }

        // ==========================================
        // BANNER LOGIC
        // ==========================================
        async function addBanner() {
            const url = document.getElementById('banner-url').value;
            if(!url) return;
            await db.collection("banners").add({ url: url, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
            document.getElementById('banner-url').value = ""; loadBannersAdmin(); showToast("Slide ajouté !");
        }

        async function loadBannersAdmin() {
            const list = document.getElementById('banner-list');
            list.innerHTML = "";
            const snap = await db.collection("banners").orderBy("timestamp", "desc").get();
            snap.forEach(doc => {
                list.innerHTML += `
                    <div class="relative h-24 rounded-2xl overflow-hidden group border border-gray-100 shadow-sm">
                        <img src="${doc.data().url}" class="w-full h-full object-cover">
                        <button onclick="deleteBanner('${doc.id}')" class="absolute inset-0 bg-red-600/80 text-white opacity-0 group-hover:opacity-100 transition flex items-center justify-center cursor-pointer">
                            <i data-lucide="trash-2" class="w-6 h-6"></i>
                        </button>
                    </div>`;
            });
            lucide.createIcons();
        }

        async function deleteBanner(id) {
            if(confirm("Supprimer ce slide ?")) { await db.collection("banners").doc(id).delete(); loadBannersAdmin(); showToast("Slide supprimé"); }
        }

        // INIT
        document.addEventListener('DOMContentLoaded', () => { syncLabels(); refreshList(); lucide.createIcons(); });
    </script>
</body>
</html>
