<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lasco Driver - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-main: #F4F7FC; 
            --surface: #FFFFFF;
            --blue-primary: #0D6EFD; 
            --blue-light: #EBF2FF;
            --text-main: #111827; 
            --text-muted: #6B7280;
            --border: #E5E7EB; 
            --radius-card: 20px; 
            --radius-input: 12px;
            --shadow-modal: 0 10px 40px rgba(0,0,0,0.04);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-main); color: var(--text-main); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        input, button { font-family: inherit; outline: none; border: none; background: none; }
        
        /* HEADER STYLES */
        .header-section { text-align: center; margin-bottom: 24px; }
        .vehicle-icon { color: var(--blue-primary); margin-bottom: 12px; }
        .vehicle-icon svg { width: 24px; height: 24px; fill: currentColor; }
        .logo-title { font-size: 32px; font-weight: 800; letter-spacing: -1px; margin-bottom: 8px;}
        .logo-lasco { color: var(--blue-primary); }
        .logo-driver { color: var(--text-main); }
        .divider-line { width: 32px; height: 3px; background: var(--blue-primary); border-radius: 4px; margin: 0 auto 12px; }
        .subtitle { font-size: 14px; color: var(--text-muted); font-weight: 500; }

        /* CARD STYLES */
        .login-card { background: var(--surface); width: 100%; max-width: 400px; border-radius: var(--radius-card); padding: 32px 24px; box-shadow: var(--shadow-modal); border: 1px solid rgba(0,0,0,0.02); }
        
        /* FORMS */
        .form-group { margin-bottom: 20px; position: relative;}
        .form-label { font-size: 13px; font-weight: 800; margin-bottom: 8px; display: block; color: var(--text-main); }
        
        .input-wrapper { position: relative; display: flex; align-items: center; border: 1px solid var(--border); border-radius: var(--radius-input); background: var(--surface); transition: 0.2s;}
        .input-wrapper:focus-within { border-color: var(--blue-primary); box-shadow: 0 0 0 3px var(--blue-light); }
        
        .left-icon { position: absolute; left: 14px; color: var(--blue-primary); width: 18px; height: 18px; }
        .form-input { width: 100%; padding: 16px 40px; font-size: 14px; font-weight: 500; color: var(--text-main); background: transparent; border: none; outline: none;}
        .form-input::placeholder { color: #9CA3AF; }
        
        .right-action { position: absolute; right: 14px; color: var(--text-muted); cursor: pointer; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; }

        /* CHECKBOX */
        .remember-row { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; cursor: pointer; }
        .custom-checkbox { width: 18px; height: 18px; border-radius: 4px; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; transition: 0.2s; background: white;}
        .custom-checkbox.checked { background: var(--blue-primary); border-color: var(--blue-primary); }
        .custom-checkbox svg { width: 12px; height: 12px; stroke: white; stroke-width: 3; fill: none; display: none; }
        .custom-checkbox.checked svg { display: block; }
        .remember-text { font-size: 13px; font-weight: 600; color: var(--text-muted); }

        /* BUTTON */
        .btn-login { width: 100%; padding: 16px; background: var(--blue-primary); color: white; font-size: 15px; font-weight: 800; border-radius: var(--radius-input); cursor: pointer; transition: 0.2s; box-shadow: 0 8px 20px rgba(13, 110, 253, 0.25); display: flex; align-items: center; justify-content: center; gap: 8px;}
        .btn-login:active { transform: scale(0.98); }
        .btn-login:disabled { opacity: 0.7; cursor: not-allowed; }

        /* FOOTER */
        .footer-text { margin-top: 24px; font-size: 12px; color: var(--text-muted); font-weight: 500; text-align: center; }
        .error-msg { color: #DC2626; font-size: 12px; font-weight: 600; margin-bottom: 16px; text-align: center; display: none; }
        
        /* SPINNER */
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 1s linear infinite; display: none; }
    </style>
</head>
<body>

    <div class="header-section">
        <div class="vehicle-icon">
            <svg viewBox="0 0 24 24"><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2m14 0a2 2 0 1 1-4 0m4 0a2 2 0 1 0-4 0m-10 0a2 2 0 1 1-4 0m4 0a2 2 0 1 0-4 0m10-4H7m8-6h-4"></path></svg>
        </div>
        <div class="logo-title"><span class="logo-lasco">Lasco</span> <span class="logo-driver">Driver</span></div>
        <div class="divider-line"></div>
        <div class="subtitle">Driver access only</div>
    </div>

    <div class="login-card">
        <form id="loginForm">
            
            <div class="error-msg" id="errorMsg">Invalid email or password.</div>

            <div class="form-group">
                <label class="form-label">Email Address</label>
                <div class="input-wrapper">
                    <svg class="left-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                    <input type="email" id="email" class="form-input" placeholder="driver2@getlasco.ma" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <div class="input-wrapper">
                    <svg class="left-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    <input type="password" id="password" class="form-input" placeholder="••••••••" required>
                    <div class="right-action" onclick="togglePassword()">
                        <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    </div>
                </div>
            </div>

            <div class="remember-row" onclick="toggleRemember()">
                <div class="custom-checkbox checked" id="rememberCheck">
                    <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
                </div>
                <span class="remember-text">Remember this device</span>
            </div>

            <button type="submit" class="btn-login" id="loginBtn">
                <span id="btnText" style="display:flex; align-items:center; gap:8px;">
                    <svg viewBox="0 0 24 24" style="width:18px; stroke:white; fill:none; stroke-width:2;"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg> 
                    Sign In
                </span>
                <div class="spinner" id="spinner"></div>
            </button>
        </form>
    </div>

    <div class="footer-text">
        Only authorized drivers can access this panel
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, setPersistence, browserLocalPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
          apiKey: "AIzaSyAaaR52bvyQfkxmZL16lcg4Bd4M76OtbI4",
          authDomain: "lesgo-cd7f9.firebaseapp.com",
          projectId: "lesgo-cd7f9",
          storageBucket: "lesgo-cd7f9.firebasestorage.app",
          messagingSenderId: "618932234525",
          appId: "1:618932234525:web:8eb0b934b1bfd1060059f4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // UI Interactions
        window.togglePassword = () => {
            const input = document.getElementById('password');
            if(input.type === 'password') { input.type = 'text'; } else { input.type = 'password'; }
        };

        window.toggleRemember = () => {
            const check = document.getElementById('rememberCheck');
            check.classList.toggle('checked');
        };

        // Login Submission
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberCheck').classList.contains('checked');
            
            const btn = document.getElementById('loginBtn');
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('spinner');
            const errorMsg = document.getElementById('errorMsg');

            // UI Loading state
            btn.disabled = true;
            btnText.style.display = 'none';
            spinner.style.display = 'block';
            errorMsg.style.display = 'none';

            try {
                // Set persistence (Local = stays logged in, Session = logs out when tab closed)
                const persistenceType = rememberMe ? browserLocalPersistence : browserSessionPersistence;
                await setPersistence(auth, persistenceType);
                
                // Attempt Login
                await signInWithEmailAndPassword(auth, email, password);
                
                // Success! Redirect to the driver dashboard
                window.location.href = "driver.html"; 

            } catch (error) {
                console.error("Login failed:", error);
                errorMsg.innerText = "Invalid email or password.";
                errorMsg.style.display = 'block';
                
                // Reset UI
                btn.disabled = false;
                btnText.style.display = 'flex';
                spinner.style.display = 'none';
            }
        });
    </script>
</body>
</html>
