<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LasGo | Driver Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           VARIABLES & RESET (Driver Theme - Blue)
        ========================================= */
        :root {
            --bg-main: #F8F9FB; --surface: #FFFFFF;
            --primary: #2563EB; /* Delivery Blue */
            --primary-light: #DBEAFE;
            --accent: #16A34A; /* Green for success */
            --accent-light: #DCFCE7;
            --warning: #F59E0B; --warning-light: #FEF3C7;
            --text-main: #1E293B; --text-muted: #64748B;
            --border: #E2E8F0; --radius-card: 20px; --radius-btn: 12px;
            --shadow-sm: 0 4px 12px rgba(0,0,0,0.03); 
            --shadow-nav: 0 -4px 20px rgba(0,0,0,0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-main); color: var(--text-main); padding-bottom: 90px; }
        .container { padding: 20px; max-width: 600px; margin: 0 auto; position: relative; min-height: 100vh;}
        svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        button, a { font-family: inherit; cursor: pointer; outline: none; border: none; background: none; text-decoration: none;}

        /* SPA VIEWS */
        .app-view { display: none; animation: fadeIn 0.3s ease; }
        .app-view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        /* HEADERS */
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .header-top h1 { font-size: 22px; font-weight: 800; color: var(--text-main); line-height: 1.2; }
        .header-top p { font-size: 13px; color: var(--text-muted); font-weight: 500; margin-top: 4px; }
        
        /* TABS */
        .tabs-toggle { display: flex; background: var(--surface); border-radius: 50px; padding: 6px; border: 1px solid var(--border); margin-bottom: 24px; }
        .tab-btn { flex: 1; padding: 12px; text-align: center; font-size: 14px; font-weight: 700; border-radius: 50px; color: var(--text-muted); transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px;}
        .tab-btn.active { background: var(--primary); color: white; box-shadow: 0 4px 10px rgba(37, 99, 235, 0.2); }
        .badge-count { background: white; color: var(--primary); font-size: 11px; font-weight: 800; padding: 2px 8px; border-radius: 20px; }
        .tab-btn:not(.active) .badge-count { background: var(--primary); color: white; }

        /* CARDS */
        .card { background: var(--surface); border-radius: var(--radius-card); padding: 16px; box-shadow: var(--shadow-sm); margin-bottom: 16px; border: 1px solid var(--border);}
        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 14px; font-weight: 600; background: var(--surface); border-radius: var(--radius-card); border: 2px dashed var(--border);}
        
        .order-card { cursor: pointer; transition: 0.2s; }
        .order-card:active { transform: scale(0.98); }
        .oc-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; border-bottom: 1px solid var(--bg-main); padding-bottom: 12px;}
        .oc-id { font-size: 16px; font-weight: 800; color: var(--primary); }
        .oc-time { font-size: 12px; color: var(--text-muted); font-weight: 600; display: flex; align-items: center; gap: 4px; margin-top: 4px;}
        
        .oc-location { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 16px; }
        .loc-icon { width: 32px; height: 32px; border-radius: 50%; background: var(--primary-light); color: var(--primary); display: flex; align-items: center; justify-content: center; flex-shrink: 0;}
        .loc-text h4 { font-size: 15px; font-weight: 800; margin-bottom: 2px;}
        .loc-text p { font-size: 13px; color: var(--text-muted); font-weight: 500;}
        
        .oc-footer { display: flex; justify-content: space-between; align-items: center; background: var(--bg-main); padding: 12px; border-radius: 12px;}
        .oc-price { font-size: 16px; font-weight: 800; }
        .oc-items { font-size: 13px; font-weight: 700; color: var(--text-muted); }

        /* DETAIL VIEW */
        .detail-header { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
        .back-btn { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; background: var(--surface); border-radius: 50%; box-shadow: var(--shadow-sm); cursor: pointer; border: 1px solid var(--border);}
        
        .contact-actions { display: flex; gap: 12px; margin-bottom: 24px; }
        .btn-call { flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; background: var(--surface); border: 1px solid var(--border); padding: 14px; border-radius: 16px; font-weight: 700; font-size: 14px; color: var(--text-main); box-shadow: var(--shadow-sm); transition: 0.2s;}
        .btn-call:active { transform: scale(0.95); background: var(--bg-main); }
        .btn-wa { flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; background: #E8FBF0; border: 1px solid #BBF7D0; padding: 14px; border-radius: 16px; font-weight: 700; font-size: 14px; color: #15803D; box-shadow: var(--shadow-sm); transition: 0.2s;}
        .btn-wa:active { transform: scale(0.95); background: #DCFCE7; }

        .info-row { display: flex; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
        .info-row:last-child { border-bottom: none; }
        .info-label { color: var(--text-muted); display: flex; align-items: center; gap: 8px; font-weight: 600;}
        .info-val { font-weight: 800; text-align: right; }

        /* CART ITEMS WITH IMAGES */
        .cart-list { margin-top: 24px; }
        .c-item { display: flex; gap: 12px; padding: 12px; border: 1px solid var(--border); border-radius: 16px; margin-bottom: 12px; background: var(--surface); align-items: center;}
        .c-img { width: 50px; height: 50px; border-radius: 10px; object-fit: cover; background: var(--bg-main); flex-shrink: 0;}
        .c-info { flex: 1; }
        .c-name { font-size: 14px; font-weight: 800; margin-bottom: 2px;}
        .c-meta { font-size: 12px; color: var(--text-muted); line-height: 1.3;}
        .c-qty { font-size: 14px; font-weight: 800; color: var(--primary); background: var(--primary-light); width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center;}

        /* MAIN BUTTONS */
        .btn-main { width: 100%; padding: 18px; border-radius: 16px; font-size: 16px; font-weight: 800; transition: 0.2s; display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 32px; cursor: pointer; border: none; box-shadow: 0 8px 20px rgba(0,0,0,0.1);}
        .btn-main:active { transform: scale(0.98); }
        .btn-start { background: var(--primary); color: white; box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3);}
        .btn-finish { background: var(--accent); color: white; box-shadow: 0 8px 20px rgba(22, 163, 74, 0.3);}
        
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: var(--text-main); color: white; padding: 12px 24px; border-radius: 50px; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; box-shadow: var(--shadow-sm); z-index: 1100; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <div id="view-dashboard" class="app-view active container">
        <div class="header-top">
            <div>
                <h1>Driver Hub 🛵</h1>
                <p>Manage your deliveries</p>
            </div>
        </div>

        <div class="tabs-toggle">
            <div class="tab-btn active" id="tabAvailable" onclick="switchList('available')">
                Available <span class="badge-count" id="countAvailable">0</span>
            </div>
            <div class="tab-btn" id="tabActive" onclick="switchList('active')">
                My Deliveries <span class="badge-count" id="countActive">0</span>
            </div>
        </div>

        <div id="ordersContainer">
            </div>
    </div>

    <div id="view-detail" class="app-view container">
        <div class="detail-header">
            <div class="back-btn" onclick="goBack()"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg></div>
            <h1 style="font-size: 20px; font-weight: 800; flex:1;" id="det-id">Order #</h1>
            <div style="background:var(--warning-light); color:#B45309; font-size:12px; font-weight:800; padding:6px 12px; border-radius:8px;" id="det-status">STATUS</div>
        </div>

        <div class="contact-actions">
            <a href="#" class="btn-call" id="btnCall">
                <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                Call
            </a>
            <a href="#" class="btn-wa" id="btnWa" target="_blank">
                <svg viewBox="0 0 24 24" stroke="currentColor" fill="none"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
                WhatsApp
            </a>
        </div>

        <div class="card" style="padding: 0 16px;">
            <div class="info-row">
                <div class="info-label"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg> Client</div>
                <div class="info-val" id="det-client">Name</div>
            </div>
            <div class="info-row">
                <div class="info-label"><svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg> Area</div>
                <div class="info-val" id="det-area" style="color:var(--primary);">Area</div>
            </div>
            <div class="info-row">
                <div class="info-label"><svg viewBox="0 0 24 24"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect><line x1="1" y1="10" x2="23" y2="10"></line></svg> Collect</div>
                <div class="info-val" id="det-total" style="font-size:18px;">0.00 DH</div>
            </div>
        </div>

        <h3 style="font-size: 16px; font-weight: 800; margin-top: 32px; margin-bottom: 8px;">Order Items</h3>
        <div id="det-cart-list" class="cart-list">
            </div>

        <div id="action-container">
            </div>
    </div>

    <div class="toast" id="toastBox">
        <svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg><span id="toastMsg">Action successful</span>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // ⚠️ SAME FIREBASE CONFIG AS ADMIN/INDEX
        const firebaseConfig = {
          apiKey: "AIzaSyAaaR52bvyQfkxmZL16lcg4Bd4M76OtbI4",
          authDomain: "lesgo-cd7f9.firebaseapp.com",
          projectId: "lesgo-cd7f9",
          storageBucket: "lesgo-cd7f9.firebasestorage.app",
          messagingSenderId: "618932234525",
          appId: "1:618932234525:web:8eb0b934b1bfd1060059f4"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allOrders = [];
        let currentTab = 'available'; // 'available' (Preparing) or 'active' (Out for Delivery)
        let openedOrderId = null;

        // --- LISTENERS ---
        onSnapshot(collection(db, "orders"), snap => {
            allOrders = snap.docs.map(d => ({id: d.id, ...d.data()}));
            renderDashboard();
            
            // Auto-update detail view if open
            if(openedOrderId) {
                const stillExists = allOrders.find(o => o.id === openedOrderId);
                if(stillExists) openOrder(stillExists.id);
                else goBack(); // Order deleted or fully processed
            }
        });

        // --- UI NAVIGATION ---
        window.switchList = (tab) => {
            currentTab = tab;
            document.getElementById('tabAvailable').classList.remove('active');
            document.getElementById('tabActive').classList.remove('active');
            
            if(tab === 'available') document.getElementById('tabAvailable').classList.add('active');
            if(tab === 'active') document.getElementById('tabActive').classList.add('active');
            
            renderDashboard();
        };

        window.goBack = () => {
            document.querySelectorAll('.app-view').forEach(v => v.classList.remove('active'));
            document.getElementById('view-dashboard').classList.add('active');
            openedOrderId = null;
            window.scrollTo(0,0);
        };

        // --- RENDERING ---
        function renderDashboard() {
            // Sort by time
            const sortedOrders = [...allOrders].sort((a,b) => {
                return new Date(b.timestamp).getTime() - new Date(a.timestamp).getTime();
            });

            // Filter for Available (Status: Preparing)
            const available = sortedOrders.filter(o => o.status === 'Preparing');
            // Filter for Active (Status: Out for Delivery)
            const active = sortedOrders.filter(o => o.status === 'Out for Delivery');

            document.getElementById('countAvailable').innerText = available.length;
            document.getElementById('countActive').innerText = active.length;

            const container = document.getElementById('ordersContainer');
            const displayList = currentTab === 'available' ? available : active;

            if(displayList.length === 0) {
                container.innerHTML = `
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" style="width:40px; height:40px; margin-bottom:12px; color:var(--text-muted);"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg><br>
                    No orders ${currentTab === 'available' ? 'ready for pickup' : 'currently active'}.
                </div>`;
                return;
            }

            container.innerHTML = displayList.map(o => {
                let orderDate = new Date(); if (o.timestamp) orderDate = new Date(o.timestamp);
                const time = orderDate.toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit'});
                
                return `
                <div class="card order-card" onclick="openOrder('${o.id}')">
                    <div class="oc-header">
                        <div class="oc-id">#${o.id.substring(0,6).toUpperCase()}</div>
                        <div class="oc-time"><svg viewBox="0 0 24 24" style="width:14px;"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg> ${time}</div>
                    </div>
                    <div class="oc-location">
                        <div class="loc-icon"><svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg></div>
                        <div class="loc-text">
                            <h4>${o.neighborhood || 'Unknown Area'}</h4>
                            <p>${o.customerName || 'Client'}</p>
                        </div>
                    </div>
                    <div class="oc-footer">
                        <div class="oc-items">${o.totalItems} items to deliver</div>
                        <div class="oc-price">${Number(o.totalPrice).toFixed(2)} DH</div>
                    </div>
                </div>`;
            }).join('');
        }

        window.openOrder = (id) => {
            const o = allOrders.find(x => x.id === id); if(!o) return;
            openedOrderId = id;
            
            document.querySelectorAll('.app-view').forEach(v => v.classList.remove('active'));
            document.getElementById('view-detail').classList.add('active');
            window.scrollTo(0,0);

            // Populate Info
            document.getElementById('det-id').innerText = `Order #${o.id.substring(0,6).toUpperCase()}`;
            document.getElementById('det-client').innerText = o.customerName || 'Unknown';
            document.getElementById('det-area').innerText = o.neighborhood || 'Unknown Area';
            document.getElementById('det-total').innerText = `${Number(o.totalPrice).toFixed(2)} DH`;
            
            const statBadge = document.getElementById('det-status');
            statBadge.innerText = o.status.toUpperCase();
            if(o.status === 'Preparing') { statBadge.style.background = 'var(--warning-light)'; statBadge.style.color = '#B45309'; }
            else { statBadge.style.background = 'var(--primary-light)'; statBadge.style.color = 'var(--primary)'; }

            // Action Buttons Setup
            const btnCall = document.getElementById('btnCall');
            const btnWa = document.getElementById('btnWa');
            
            if(o.customerPhone) {
                // Ensure number formatting for WA (Remove leading zero, add 212)
                let cleanPhone = o.customerPhone.replace(/^0+/, '');
                
                btnCall.href = `tel:${o.customerPhone}`;
                btnWa.href = `https://wa.me/212${cleanPhone}`;
                btnCall.style.opacity = "1"; btnWa.style.opacity = "1";
                btnCall.style.pointerEvents = "auto"; btnWa.style.pointerEvents = "auto";
            } else {
                btnCall.removeAttribute('href'); btnWa.removeAttribute('href');
                btnCall.style.opacity = "0.5"; btnWa.style.opacity = "0.5";
                btnCall.style.pointerEvents = "none"; btnWa.style.pointerEvents = "none";
            }

            // Cart Elements
            document.getElementById('det-cart-list').innerHTML = (o.cart || []).map(item => {
                const p = item.product || {};
                const img = p.imageUrl && p.imageUrl !== "local_file_selected" ? `<img src="${p.imageUrl}" class="c-img">` : `<div class="c-img" style="display:flex;align-items:center;justify-content:center;font-size:10px;">No Img</div>`;
                
                let metaText = [];
                if(item.variantName) metaText.push(`Size: ${item.variantName}`);
                if(item.extras && item.extras.length > 0) metaText.push(`+ ${item.extras.join(', ')}`);
                if(item.sauces && item.sauces.length > 0) metaText.push(`Sauce: ${item.sauces.join(', ')}`);
                if(item.note) metaText.push(`Note: <span style="color:var(--danger); font-weight:700;">${item.note}</span>`); // Highlight notes for driver

                return `
                <div class="c-item">
                    ${img}
                    <div class="c-info">
                        <div class="c-name">${p.name || 'Item'}</div>
                        <div class="c-meta">${metaText.join('<br>')}</div>
                    </div>
                    <div class="c-qty">x${item.qty}</div>
                </div>`;
            }).join('');

            // Main Action Button logic
            const actionContainer = document.getElementById('action-container');
            if(o.status === 'Preparing') {
                actionContainer.innerHTML = `
                    <button class="btn-main btn-start" onclick="updateOrderStatus('${o.id}', 'Out for Delivery')">
                        <svg viewBox="0 0 24 24" style="width:20px;"><circle cx="12" cy="12" r="10"></circle><polyline points="12 16 16 12 12 8"></polyline><line x1="8" y1="12" x2="16" y2="12"></line></svg>
                        Start Delivery
                    </button>`;
            } else if (o.status === 'Out for Delivery') {
                actionContainer.innerHTML = `
                    <button class="btn-main btn-finish" onclick="updateOrderStatus('${o.id}', 'Delivered')">
                        <svg viewBox="0 0 24 24" style="width:20px;"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                        Mark as Delivered
                    </button>`;
            } else {
                actionContainer.innerHTML = `<div style="text-align:center; margin-top:20px; font-weight:800; color:var(--text-muted);">Order is ${o.status}</div>`;
            }
        };

        // --- FIREBASE ACTIONS ---
        window.updateOrderStatus = async (orderId, newStatus) => {
            try {
                // Update in Firebase
                await updateDoc(doc(db, "orders", orderId), { status: newStatus });
                
                showToast(`Order marked as ${newStatus}`);
                
                // If marked as delivered, go back to dashboard automatically
                if(newStatus === 'Delivered') {
                    goBack();
                }
            } catch (e) {
                console.error(e);
                alert("Network error. Please try again.");
            }
        };

        function showToast(msg) { 
            const t = document.getElementById('toastBox'); 
            document.getElementById('toastMsg').innerText = msg; 
            t.classList.add('show'); 
            setTimeout(() => t.classList.remove('show'), 3000); 
        }
    </script>
</body>
</html>
