<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LASCOTACO | App</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3075/3075977.png"> 
    <meta name="theme-color" content="#ffffff">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --resto: #E85A24; --epi: #10B981; --bg: #FFFFFF; }
        body { background-color: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .app-container { max-width: 500px; margin: 0 auto; width: 100%; position: relative; background: white; min-height: 100vh; box-shadow: 0 0 60px rgba(0,0,0,0.05); overflow-x: hidden; }
        body.modal-open { overflow: hidden; }

        .theme-resto { --brand: var(--resto); --brand-soft: rgba(232, 90, 36, 0.1); }
        .theme-epi { --brand: var(--epi); --brand-soft: rgba(16, 185, 129, 0.1); }

        .premium-ease { transition: all 0.4s cubic-bezier(0.2, 0.9, 0.3, 1); }

        .skeleton { background: linear-gradient(90deg, #F1F3F5 25%, #E9ECEF 50%, #F1F3F5 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 20px; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* CATEGORIES */
        .category-scroll { display: flex; gap: 10px; overflow-x: auto; scroll-snap-type: x mandatory; padding: 4px 20px 16px 20px; scroll-padding-left: 20px; scroll-behavior: smooth; }
        .category-pill { position: relative; flex: 0 0 auto; scroll-snap-align: start; transition: all 0.3s cubic-bezier(0.2, 0.9, 0.3, 1); background: #F8F9FA; color: #495057; border-radius: 12px; }
        .category-pill:active { transform: scale(0.95); }
        .active-label { background-color: var(--brand) !important; color: white !important; font-weight: 800 !important; }

        /* PRODUCT CARDS */
        .product-card { background: white; border-radius: 24px; border: 1px solid #F1F3F5; transition: all 0.3s ease; animation: fadeIn 0.4s ease-out forwards; position: relative; }
        .product-card:active { transform: scale(0.97); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .product-img-wrap { overflow: hidden; border-radius: 20px 20px 6px 6px; height: 150px; background: #FAF5F0; width: 100%; position: relative; }
        .product-img-wrap img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s ease; mix-blend-mode: multiply; }
        .product-card:hover img { transform: scale(1.05); }

        .animate-pop { animation: popBounce 0.4s cubic-bezier(0.2, 0.9, 0.3, 1); }
        @keyframes popBounce { 0% { transform: scale(1); } 40% { transform: scale(0.85); background: white; color: var(--brand); } 70% { transform: scale(1.15); } 100% { transform: scale(1); } }

        /* BOTTOM SHEETS */
        #bottom-sheet-root, #cart-drawer-root { position: fixed; inset: 0; z-index: 2000; pointer-events: none; display: flex; align-items: flex-end; justify-content: center; }
        #bs-overlay, #cart-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(3px); opacity: 0; transition: opacity 0.4s ease; pointer-events: none; }
        
        #bs-panel { width: 100%; max-width: 500px; background: white; border-radius: 32px 32px 0 0; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.3, 1); pointer-events: auto; padding-bottom: env(safe-area-inset-bottom); max-height: 85vh; display: flex; flex-direction: column; }
        .bs-open #bs-overlay { opacity: 1; pointer-events: auto; }
        .bs-open #bs-panel { transform: translateY(0); }

        #cart-panel { width: 100%; max-width: 500px; background: #F8F9FA; border-radius: 28px 28px 0 0; transform: translateY(100%); transition: transform 0.5s cubic-bezier(0.2, 0.9, 0.3, 1); pointer-events: auto; display: flex; flex-direction: column; max-height: 92vh; }
        .drawer-open #cart-overlay { opacity: 1; pointer-events: auto; }
        .drawer-open #cart-panel { transform: translateY(0); }

        #store-toggle-bg { transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.3, 1), background-color 0.4s ease; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; pointer-events: none; display: flex; flex-direction: column; gap: 8px; width: 90%; max-width: 400px; }
    </style>
</head>
<body class="drawer-closed theme-resto" id="body-wrap">

    <div id="toast-container"></div>

    <div class="app-container" id="app-root">
        
        <header class="sticky top-0 z-50 bg-white/95 backdrop-blur-md px-5 py-4 flex justify-between items-center">
            <h1 class="text-[28px] font-black tracking-tighter italic" style="color: var(--brand)">LASCOTACO</h1>
            <button onclick="toggleCart(true)" class="relative bg-[#1A1A1A] text-white px-4 py-2.5 rounded-[14px] font-bold text-[13px] flex items-center gap-2 active:scale-95 transition">
                <i data-lucide="shopping-bag" class="w-4 h-4" style="color: var(--brand)"></i>
                <span id="nav-total">0 DH</span>
                <span id="nav-badge" class="absolute -top-2 -right-2 text-white text-[10px] font-black w-5 h-5 flex items-center justify-center rounded-full border-2 border-white shadow-sm scale-0 premium-ease" style="background-color: var(--brand)">0</span>
            </button>
        </header>

        <div class="px-5 pt-2 pb-4 bg-white/95 backdrop-blur-md sticky top-[72px] z-40">
            <div class="relative flex items-center">
                <i data-lucide="search" class="absolute left-4 w-4 h-4 text-gray-400"></i>
                <input type="text" id="search-input" placeholder="Rechercher un plat, une boisson..." class="w-full bg-[#F8F9FA] border border-gray-100 rounded-2xl py-3.5 pl-11 pr-4 text-[14px] font-bold focus:outline-none focus:ring-2 transition-shadow" style="--tw-ring-color: var(--brand-soft)">
            </div>
        </div>

        <div class="px-5 pb-4 bg-white sticky top-[138px] z-30">
            <div class="bg-gray-50 p-1.5 rounded-2xl flex relative w-full items-center border border-gray-100">
                <div id="store-toggle-bg" class="absolute left-1.5 top-1.5 bottom-1.5 w-[calc(50%-6px)] rounded-xl shadow-sm" style="background-color: var(--brand)"></div>
                
                <button onclick="setStore('Restaurant')" id="btn-resto" class="flex-1 relative z-10 py-3 rounded-xl text-[15px] font-extrabold flex items-center justify-center gap-2 text-white transition-colors duration-300">
                    <i data-lucide="utensils" class="w-4 h-4"></i> Resto
                </button>
                <button onclick="setStore('Épicerie')" id="btn-epi" class="flex-1 relative z-10 py-3 rounded-xl text-[15px] font-extrabold flex items-center justify-center gap-2 text-gray-500 transition-colors duration-300">
                    <i data-lucide="shopping-basket" class="w-4 h-4"></i> Épicerie
                </button>
            </div>
        </div>

        <div id="sub-nav" class="category-scroll no-scrollbar bg-white relative z-20"></div>

        <main id="product-grid" class="p-5 grid grid-cols-2 gap-4 pb-40"></main>

        <div id="checkout-bar" class="fixed bottom-4 left-4 right-4 max-w-[468px] mx-auto z-50 translate-y-[150%] premium-ease">
            <button onclick="toggleCart(true)" class="w-full text-white p-2.5 rounded-[2rem] flex justify-between items-center shadow-[0_12px_24px_rgba(0,0,0,0.15)] active:scale-95 premium-ease relative overflow-hidden" style="background-color: var(--brand)">
                
                <div class="flex items-center gap-3 pl-1 z-10">
                    <div class="relative bg-white w-[44px] h-[44px] rounded-full flex items-center justify-center shadow-inner">
                        <i data-lucide="shopping-bag" class="w-[22px] h-[22px]" style="color: var(--brand)"></i>
                        <span id="floating-badge" class="absolute -top-1 -right-1 text-gray-800 text-[10px] w-5 h-5 rounded-full flex justify-center items-center font-black bg-white shadow-md border border-gray-100">0</span>
                    </div>
                    <div class="text-left">
                        <p id="item-count-text" class="text-[14px] font-bold leading-tight">0 article</p>
                        <p class="text-[11px] font-medium text-white/90 mt-0.5">Livraison : 20 DH</p>
                    </div>
                </div>

                <div class="font-black text-[18px] absolute left-1/2 -translate-x-1/2 z-10 tracking-tight" id="final-price-bottom">0 DH</div>
                
                <div class="bg-white px-4 py-3 rounded-[1.5rem] text-[13px] font-bold flex items-center gap-1.5 z-10 shadow-sm mr-1" style="color: var(--brand)">
                    Voir le panier <i data-lucide="chevron-right" class="w-4 h-4"></i>
                </div>
            </button>
        </div>
    </div>

    <div id="bottom-sheet-root">
        <div id="bs-overlay" onclick="closeSheet()"></div>
        <div id="bs-panel">
            <div class="p-6 border-b border-gray-50 flex justify-between items-start shrink-0 relative">
                <div class="absolute top-2 left-1/2 -translate-x-1/2 w-10 h-1 bg-gray-200 rounded-full"></div>
                <div class="mt-2">
                    <h3 id="bs-title" class="font-black text-xl text-gray-800">Produit</h3>
                    <p id="bs-price" class="font-bold mt-1 text-lg" style="color: var(--brand)">0 DH</p>
                </div>
                <button onclick="closeSheet()" class="p-2.5 bg-gray-100 rounded-full active:scale-90 transition mt-2"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            
            <div class="p-6 overflow-y-auto no-scrollbar flex-1 space-y-6">
                <div id="bs-sauces" class="space-y-3 hidden">
                    <h4 class="font-bold text-sm text-gray-500 uppercase tracking-widest">Choix de Sauce</h4>
                    <select id="sauce-select" class="w-full p-4 bg-gray-50 rounded-2xl font-bold text-sm border border-gray-100 outline-none transition-colors appearance-none" style="focus:border-color: var(--brand)">
                        <option value="">Sans sauce</option>
                        <option value="Algérienne">Algérienne</option>
                        <option value="Big Mac">Big Mac</option>
                        <option value="Fromagère">Fromagère</option>
                        <option value="Andalouse">Andalouse</option>
                    </select>
                </div>
                
                <div class="space-y-3">
                    <h4 class="font-bold text-sm text-gray-500 uppercase tracking-widest">Instructions spéciales</h4>
                    <textarea id="bs-notes" placeholder="Ex: Sans oignons, bien cuit..." class="w-full p-4 bg-gray-50 rounded-2xl font-semibold text-sm border border-gray-100 outline-none resize-none h-24 transition-colors"></textarea>
                </div>
            </div>

            <div class="p-5 bg-white shrink-0 border-t border-gray-50">
                <button id="bs-add-btn" class="w-full text-white py-4 rounded-full font-black text-[17px] active:scale-95 transition shadow-lg" style="background-color: var(--brand)">
                    Ajouter au panier
                </button>
            </div>
        </div>
    </div>

    <div id="cart-drawer-root" class="premium-ease">
        <div id="cart-overlay" onclick="toggleCart(false)" class="premium-ease"></div>
        <div id="cart-panel" class="premium-ease">
            
            <div class="p-5 flex justify-between items-start shrink-0 bg-white rounded-t-[28px] relative border-b border-gray-100">
                <div class="absolute top-2 left-1/2 -translate-x-1/2 w-10 h-1.5 bg-gray-200 rounded-full"></div>
                <div class="mt-3">
                    <h2 class="text-[22px] font-black tracking-tight text-gray-900">Mon Panier</h2>
                    <p class="text-xs font-semibold mt-1 flex items-center gap-1" style="color: var(--brand)">
                        <i data-lucide="clock" class="w-3.5 h-3.5"></i> <span id="cart-header-count">0 article</span> • Livraison en 20-30 min
                    </p>
                </div>
                <button onclick="toggleCart(false)" class="p-2 bg-gray-50 rounded-full text-gray-600 active:scale-90 premium-ease mt-2"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            
            <div id="cart-items" class="flex-1 overflow-y-auto p-5 space-y-4 no-scrollbar bg-[#F8F9FA]"></div>
            
            <div id="upsell-container" class="px-5 pb-5 shrink-0 bg-[#F8F9FA] hidden">
                <p class="font-black text-[15px] text-gray-900 tracking-tight mb-3">À ne pas manquer ! 🥤</p>
                <div class="flex gap-3 overflow-x-auto no-scrollbar pb-2" id="upsell-list"></div>
            </div>

            <div class="p-6 bg-white shrink-0 rounded-t-[24px] shadow-[0_-10px_20px_rgba(0,0,0,0.02)]">
                <div class="space-y-3">
                    <div class="flex justify-between items-center">
                        <span class="font-semibold text-gray-500 text-[13px]">Sous-total</span>
                        <span id="drawer-subtotal" class="font-bold text-gray-900 text-[14px]">0 DH</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="font-semibold text-gray-500 text-[13px]">Livraison</span>
                        <span class="font-bold text-gray-900 text-[14px]">20 DH</span>
                    </div>
                    <div class="border-t border-dashed border-gray-200 my-4"></div>
                    <div class="flex justify-between items-center">
                        <span class="font-black text-gray-900 text-[16px]">Total à payer</span>
                        <span id="drawer-total" class="text-[24px] font-black" style="color: var(--brand)">0 DH</span>
                    </div>
                </div>
                
                <button onclick="sendToWhatsApp()" id="wa-btn" class="w-full bg-[#25D366] text-white py-4 rounded-xl font-black text-[16px] flex justify-center items-center gap-2 mt-6 shadow-md shadow-green-500/20 active:scale-95 premium-ease">
                    <i data-lucide="message-circle" class="w-5 h-5 fill-current"></i> Commander via WhatsApp
                </button>
                
                <p class="text-center text-gray-400 text-[10px] font-semibold mt-4 flex items-center justify-center gap-1.5">
                    <i data-lucide="shield-check" class="w-3.5 h-3.5"></i> Paiement à la livraison
                </p>
            </div>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js'); }); }

        const firebaseConfig = { apiKey: "AIzaSyBebaGxqiNBvCqofveg1Fmztl7av3Mdoyg", authDomain: "lascotaco-67fe5.firebaseapp.com", projectId: "lascotaco-67fe5", storageBucket: "lascotaco-67fe5.firebasestorage.app", messagingSenderId: "865918381027", appId: "1:865918381027:web:abc6435df20894020c4ed6" };
        firebase.initializeApp(firebaseConfig); const db = firebase.firestore();

        let cart = JSON.parse(localStorage.getItem('lasco_cart_v2')) || []; 
        let activeStore = 'Restaurant'; let activeCat = '🔥 Top vente';
        let livraisonFee = 20;
        let globalProducts = []; 
        let currentItemForSheet = null;
        let lastTotal = 0; // State for counting animation

        function saveCart() { localStorage.setItem('lasco_cart_v2', JSON.stringify(cart)); }

        db.collection("products").get().then(snap => {
            snap.forEach(doc => {
                let data = doc.data();
                if (!data.category) data.category = '🔥 Top vente'; 
                globalProducts.push(data);
            });
            renderUpsells(); loadProducts(); syncUI(); 
        });

        function showToast(message) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'bg-[#1A1A1A] text-white px-5 py-4 rounded-[20px] text-[14px] font-bold shadow-2xl transition-all duration-400 translate-y-[-20px] opacity-0 flex items-center justify-between border border-gray-800';
            toast.innerHTML = `<div class="flex items-center gap-3"><i data-lucide="check-circle-2" class="w-5 h-5 text-[#25D366]"></i> <span>${message}</span></div>`;
            container.appendChild(toast); lucide.createIcons();
            requestAnimationFrame(() => { toast.classList.remove('translate-y-[-20px]', 'opacity-0'); });
            setTimeout(() => { toast.classList.add('translate-y-[-20px]', 'opacity-0'); setTimeout(() => toast.remove(), 400); }, 2500);
        }

        function renderSkeletons() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = Array(4).fill().map(() => `
                <div class="product-card p-2.5 flex flex-col gap-3 border-transparent shadow-none">
                    <div class="skeleton h-[150px] w-full rounded-[20px]"></div>
                    <div class="skeleton h-4 w-3/4 rounded mt-1"></div>
                    <div class="skeleton h-6 w-1/3 rounded mt-auto"></div>
                </div>`).join('');
        }

        function setStore(type) { 
            activeStore = type; activeCat = '🔥 Top vente'; document.getElementById('search-input').value = '';
            
            const body = document.getElementById('body-wrap');
            const toggleBg = document.getElementById('store-toggle-bg');
            const btnResto = document.getElementById('btn-resto'); const btnEpi = document.getElementById('btn-epi');
            
            if(type === 'Restaurant') {
                body.className = "drawer-closed theme-resto";
                toggleBg.style.transform = 'translateX(0)';
                btnResto.classList.replace('text-gray-500', 'text-white'); btnEpi.classList.replace('text-white', 'text-gray-500');
            } else {
                body.className = "drawer-closed theme-epi";
                toggleBg.style.transform = 'translateX(100%)';
                btnEpi.classList.replace('text-gray-500', 'text-white'); btnResto.classList.replace('text-white', 'text-gray-500');
            }
            renderSkeletons(); renderLabels(); loadProducts(); renderUpsells();
        }

        async function renderLabels() {
            const nav = document.getElementById('sub-nav');
            const cats = [{name: '🔥 Top vente'}];
            const snap = await db.collection("categories").where("type", "==", activeStore).get();
            snap.forEach(doc => cats.push(doc.data()));
            nav.innerHTML = cats.map((cat, idx) => `
                <button id="btn-cat-${idx}" onclick="handleCatClick('${cat.name}', 'btn-cat-${idx}')" 
                    class="category-pill px-5 py-2.5 text-[13px] font-bold whitespace-nowrap ${activeCat === cat.name ? 'active-label' : ''}">
                    ${cat.name}
                </button>`).join('');
        }

        function handleCatClick(catName, elementId) {
            activeCat = catName; document.getElementById('search-input').value = '';
            renderLabels(); renderSkeletons(); loadProducts();
            const nav = document.getElementById('sub-nav');
            const scrollTarget = document.getElementById(elementId).offsetLeft - 20;
            nav.scrollTo({ left: scrollTarget, behavior: 'smooth' });
        }

        document.getElementById('search-input').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            if(term.length > 0) {
                const filtered = globalProducts.filter(p => p.type === activeStore && p.name.toLowerCase().includes(term));
                renderProductGrid(filtered);
            } else { loadProducts(); }
        });

        function loadProducts() {
            let filtered = [];
            if (activeCat === '🔥 Top vente') { filtered = globalProducts.filter(p => p.type === activeStore && p.isTop === true); } 
            else { filtered = globalProducts.filter(p => p.type === activeStore && p.category === activeCat); }
            renderProductGrid(filtered);
        }

        function renderProductGrid(products) {
            const grid = document.getElementById('product-grid');
            if(products.length === 0) { grid.innerHTML = '<p class="col-span-2 text-center text-gray-400 py-10 font-bold text-sm">Aucun résultat trouvé</p>'; return; }
            
            grid.innerHTML = products.map(p => `
                <div class="product-card cursor-pointer p-2.5 flex flex-col" onclick="openOptions('${p.name}', ${p.price}, '${p.image}', '${p.category}')">
                    <div class="product-img-wrap">
                        <img src="${p.image}" loading="lazy">
                        ${p.isTop ? `<span class="absolute top-2 left-2 text-white text-[8px] font-black px-2 py-0.5 rounded uppercase shadow-sm" style="background-color: var(--brand)">Top</span>` : ''}
                    </div>
                    <div class="pt-2 px-1 flex flex-col flex-1 justify-between">
                        <h3 class="font-bold text-[13px] text-gray-900 leading-tight line-clamp-2">${p.name}</h3>
                        <div class="flex justify-between items-center mt-3">
                            <span class="font-black text-[15px]" style="color: var(--brand)">${p.price} DH</span>
                            <button class="w-8 h-8 rounded-full flex items-center justify-center text-white font-bold text-[18px] shadow-sm active:scale-90 transition-transform" style="background-color: var(--brand)" onclick="event.stopPropagation(); openOptions('${p.name}', ${p.price}, '${p.image}', '${p.category}');" id="add-btn-${p.name.replace(/\s+/g, '')}">
                                +
                            </button>
                        </div>
                    </div>
                </div>`).join('');
            lucide.createIcons();
        }

        function openOptions(name, price, image, category) {
            currentItemForSheet = { name, price, image };
            document.getElementById('bs-title').innerText = name;
            document.getElementById('bs-price').innerText = price + ' DH';
            document.getElementById('sauce-select').value = '';
            document.getElementById('bs-notes').value = '';
            
            const foodName = name.toLowerCase(); const foodCat = category ? category.toLowerCase() : '';
            const needsSauce = ['tacos', 'burger', 'burgers', 'sandwich', 'panini'].some(k => foodName.includes(k) || foodCat.includes(k));

            const sauceDiv = document.getElementById('bs-sauces');
            if(activeStore === 'Restaurant' && needsSauce) { sauceDiv.classList.remove('hidden'); } else { sauceDiv.classList.add('hidden'); }
            document.getElementById('body-wrap').classList.add('bs-open', 'modal-open');
        }

        function closeSheet() { document.getElementById('body-wrap').classList.remove('bs-open', 'modal-open'); currentItemForSheet = null; }

        document.getElementById('bs-add-btn').addEventListener('click', () => {
            if(!currentItemForSheet) return;
            const sauce = document.getElementById('sauce-select').value;
            const notes = document.getElementById('bs-notes').value.trim();
            const complexId = `${currentItemForSheet.name}-${sauce}-${notes}`;
            
            const existing = cart.find(i => i.id === complexId);
            if(existing) { existing.qty++; } else {
                cart.push({ id: complexId, name: currentItemForSheet.name, price: currentItemForSheet.price, image: currentItemForSheet.image, sauce: sauce, notes: notes, qty: 1 });
            }
            
            closeSheet(); saveCart(); syncUI(); showToast(`${currentItemForSheet.name} ajouté !`);
            
            const btnId = `add-btn-${currentItemForSheet.name.replace(/\s+/g, '')}`;
            const btn = document.getElementById(btnId);
            if(btn) { btn.classList.add('animate-pop'); setTimeout(() => btn.classList.remove('animate-pop'), 400); }
        });

        function renderUpsells() {
            const drinks = globalProducts.filter(p => {
                const cat = (p.category || '').toLowerCase();
                return cat.includes('boisson') || cat.includes('drink') || cat.includes('boissons');
            }).slice(0, 5); 

            const container = document.getElementById('upsell-container');
            const list = document.getElementById('upsell-list');
            
            if(drinks.length === 0) { container.classList.add('hidden'); return; }
            
            container.classList.remove('hidden');
            const tags = ['POPULAIRE', 'FRAIS', 'TOP'];
            
            list.innerHTML = drinks.map((d, index) => {
                const tag = tags[index % tags.length];
                const tagColor = tag === 'POPULAIRE' ? 'bg-red-500' : (tag === 'FRAIS' ? 'bg-green-500' : 'bg-orange-500');
                
                return `
                <div class="min-w-[130px] bg-white border border-gray-100 rounded-2xl p-2 relative shadow-sm cursor-pointer active:scale-95 transition" onclick="quickAdd('${d.name}', ${d.price}, '${d.image}')">
                    <span class="absolute top-0 left-2 ${tagColor} text-white text-[7px] font-black px-1.5 py-0.5 rounded-b-md tracking-widest">${tag}</span>
                    <div class="flex items-center gap-2 mt-3">
                        <img src="${d.image}" class="w-8 h-8 object-contain">
                        <div>
                            <p class="font-bold text-[10px] text-gray-800 leading-tight line-clamp-1">${d.name}</p>
                            <p class="font-black text-[10px]" style="color: var(--brand)">${d.price} DH</p>
                        </div>
                    </div>
                    <button class="absolute bottom-2 right-2 w-6 h-6 bg-gray-50 rounded-full flex items-center justify-center font-bold text-gray-500 hover:bg-gray-100">+</button>
                </div>`;
            }).join('');
        }

        function quickAdd(name, price, image) {
            const complexId = `${name}--`;
            const existing = cart.find(i => i.id === complexId);
            if(existing) existing.qty++;
            else cart.push({ id: complexId, name: name, price: price, image: image, sauce: '', notes: '', qty: 1 });
            saveCart(); syncUI(); renderDrawer(); showToast(`${name} ajouté !`);
        }

        function updateCartItemQty(id, change) {
            const index = cart.findIndex(i => i.id === id);
            if(index !== -1) { cart[index].qty += change; if(cart[index].qty <= 0) cart.splice(index, 1); }
            saveCart(); syncUI(); renderDrawer();
        }
        
        function removeCartItem(id) {
            const index = cart.findIndex(i => i.id === id);
            if(index !== -1) { cart.splice(index, 1); }
            saveCart(); syncUI(); renderDrawer();
        }

        // PRICE ANIMATION FUNCTION
        function animateValue(obj, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                obj.innerHTML = Math.floor(progress * (end - start) + start) + " DH";
                if (progress < 1) window.requestAnimationFrame(step);
                else obj.innerHTML = end + " DH";
            };
            window.requestAnimationFrame(step);
        }

        function syncUI() {
            let total = 0; let count = 0;
            cart.forEach(i => { total += i.qty * i.price; count += i.qty; });
            const totalWithDelivery = total > 0 ? total + livraisonFee : 0;
            
            document.getElementById('nav-total').innerText = total + " DH";
            const navBadge = document.getElementById('nav-badge');
            if (count > 0) { navBadge.innerText = count; navBadge.classList.replace('scale-0', 'scale-100'); } 
            else { navBadge.classList.replace('scale-100', 'scale-0'); }
            
            document.getElementById('floating-badge').innerText = count;
            document.getElementById('item-count-text').innerText = count + (count > 1 ? " articles" : " article");
            
            // Animation Trigger
            const bottomPriceEl = document.getElementById('final-price-bottom');
            if (total !== lastTotal) {
                animateValue(bottomPriceEl, lastTotal, total, 400);
                lastTotal = total;
            } else {
                bottomPriceEl.innerText = total + " DH";
            }
            
            document.getElementById('cart-header-count').innerText = count + (count > 1 ? " articles" : " article");
            document.getElementById('drawer-subtotal').innerText = total + " DH";
            document.getElementById('drawer-total').innerText = totalWithDelivery + " DH";
            
            document.getElementById('checkout-bar').style.transform = count > 0 ? 'translateY(0)' : 'translateY(150%)';
        }

        function renderDrawer() {
            const list = document.getElementById('cart-items');
            if(cart.length === 0) { list.innerHTML = `<div class="py-20 text-center"><p class="text-gray-400 font-bold text-xs uppercase tracking-widest mb-4">Panier vide 🌮</p><button onclick="toggleCart(false)" class="text-[14px] font-black underline underline-offset-4" style="color: var(--brand)">Retour au menu</button></div>`; lucide.createIcons(); return; }
            
            list.innerHTML = cart.map(item => `
                <div class="flex items-center gap-3 bg-white p-3 rounded-[20px] shadow-sm border border-gray-100 relative">
                    <img src="${item.image}" class="w-16 h-16 rounded-[14px] object-cover bg-[#FAF5F0] shrink-0" style="mix-blend-mode: multiply;">
                    <div class="flex-1 pr-1">
                        <p class="font-bold text-[14px] text-gray-900 leading-tight">${item.name}</p>
                        ${item.sauce ? `<p class="text-[10px] text-gray-500 mt-0.5">Sauce: ${item.sauce}</p>` : ''}
                        ${item.notes ? `<p class="text-[10px] text-orange-500 italic mt-0.5">"${item.notes}"</p>` : ''}
                        <p class="font-black mt-1 text-[15px]" style="color: var(--brand)">${item.price} DH</p>
                        <button onclick="removeCartItem('${item.id}')" class="text-gray-400 text-[10px] font-bold mt-1 flex items-center gap-1 hover:text-red-500 transition-colors"><i data-lucide="trash-2" class="w-3 h-3"></i> Supprimer</button>
                    </div>
                    <div class="flex flex-col items-center justify-between border border-gray-100 rounded-full w-[34px] h-[86px] py-1 shadow-sm shrink-0">
                        <button onclick="updateCartItemQty('${item.id}', 1)" class="w-full h-8 flex items-center justify-center font-black active:scale-75 premium-ease text-gray-800">+</button>
                        <span class="font-black text-[13px] text-gray-900">${item.qty}</span>
                        <button onclick="updateCartItemQty('${item.id}', -1)" class="w-full h-8 flex items-center justify-center font-black active:scale-75 premium-ease text-gray-400">-</button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function toggleCart(show) {
            const body = document.getElementById('body-wrap'); const overlay = document.getElementById('cart-overlay'); const panel = document.getElementById('cart-panel');
            if(show) { body.classList.replace('drawer-closed', 'drawer-open'); body.classList.add('modal-open'); renderDrawer(); } 
            else { body.classList.replace('drawer-open', 'drawer-closed'); body.classList.remove('modal-open'); }
        }

        function sendToWhatsApp() {
            if(cart.length === 0) return;
            let msg = `🛒 *Nouvelle Commande LASCOTACO*\n\n`;
            let sub = 0; 
            cart.forEach(i => { 
                msg += `• *${i.qty}x* ${i.name}`;
                if(i.sauce) msg += `\n  ↳ _Sauce: ${i.sauce}_`;
                if(i.notes) msg += `\n  ↳ _Note: ${i.notes}_`;
                msg += `\n  = ${i.qty * i.price} DH\n\n`;
                sub += i.qty * i.price; 
            });
            msg += `🛵 *Livraison:* ${livraisonFee} DH\n💰 *TOTAL:* ${sub + livraisonFee} DH`;
            window.open(`https://wa.me/212708006088?text=${encodeURIComponent(msg)}`);
        }

        document.addEventListener('DOMContentLoaded', () => { renderSkeletons(); setStore('Restaurant'); lucide.createIcons(); });
    </script>
</body>
</html>
