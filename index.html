<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LASCOTACO | Pro Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --main: #E85A24; } /* Dynamic Variable */
        body { background-color: #F8F9FA; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* SCROLL LOCK */
        body.no-scroll { overflow: hidden; height: 100vh; }

        .app-container { 
            max-width: 500px; margin: 0 auto; width: 100%; position: relative; 
            background: white; min-height: 100vh; box-shadow: 0 0 50px rgba(0,0,0,0.05); 
            overflow-x: hidden; 
        }
        
        /* CATEGORY PILLS */
        .category-scroll { 
            display: flex; gap: 12px; overflow-x: auto; scroll-behavior: smooth;
            scroll-snap-type: x mandatory; padding: 10px 24px;
            scroll-padding-left: 20px;
        }
        .category-pill { 
            flex: 0 0 auto; scroll-snap-align: start;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0.6;
        }
        .active-label { 
            background-color: var(--main) !important; color: white !important; border-color: var(--main) !important;
            opacity: 1 !important; transform: scale(1.05); box-shadow: 0 8px 15px rgba(0,0,0,0.1); 
        }

        /* SLIDER */
        .slider-viewport { width: 100%; overflow: hidden; border-radius: 28px; position: relative; }
        .slider-wrapper { display: flex; transition: transform 0.7s cubic-bezier(0.65, 0, 0.35, 1); will-change: transform; }
        .slide-box { min-width: 100%; height: 220px; padding: 0 4px; }
        .slide-box img { width: 100%; height: 100%; object-fit: cover; border-radius: 24px; }

        .glass-card { background: white; border-radius: 20px; border: 1px solid #F1F3F5; box-shadow: 0 4px 20px rgba(0,0,0,0.02); }
        
        /* DYNAMIC ACTIVE STORE COLORS */
        .active-main-resto { background-color: #E85A24 !important; color: white !important; }
        .active-main-epi { background-color: #2D6A4F !important; color: white !important; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* FIXED CART DRAWER */
        #cart-drawer-root { position: fixed; inset: 0; z-index: 1000; pointer-events: none; }
        #cart-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); transition: opacity 0.4s ease; }
        #cart-panel { 
            position: absolute; right: 0; top: 0; bottom: 0; width: 85%; max-width: 400px;
            background: white; transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1); 
            pointer-events: auto;
        }
        .drawer-open #cart-panel { transform: translateX(0); }
        .drawer-closed #cart-panel { transform: translateX(100%); }
        .drawer-closed #cart-overlay { opacity: 0; pointer-events: none; }
        .drawer-open #cart-overlay { opacity: 1; pointer-events: auto; }

        .sticky-footer-wrap { position: fixed; bottom: 0; width: 100%; max-width: 500px; padding: 20px; z-index: 60; transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body class="drawer-closed" id="body-wrap">

    <div class="app-container" id="app-root">
        
        <nav class="sticky top-0 bg-white/80 backdrop-blur-md p-5 z-50 flex justify-between items-center px-6 border-b border-gray-50">
            <h1 class="text-2xl font-extrabold text-[#E85A24] tracking-tighter italic">LASCOTACO</h1>
            <button onclick="toggleCart(true)" class="bg-[#1B1B1B] text-white px-5 py-2.5 rounded-2xl font-black text-sm flex items-center gap-2 shadow-xl active:scale-95 transition">
                <i data-lucide="shopping-bag" class="w-4 h-4 text-orange-400"></i>
                <span id="nav-total">0 DH</span>
            </button>
        </nav>

        <div class="p-4 pt-6">
            <div class="slider-viewport">
                <div id="slider" class="slider-wrapper"></div>
                <div id="slider-dots" class="absolute bottom-4 left-0 right-0 flex justify-center gap-1.5"></div>
            </div>
        </div>

        <div class="p-4 flex gap-3 sticky top-[73px] bg-white/95 backdrop-blur-sm z-40">
            <button onclick="setStore('Restaurant')" id="btn-resto" class="flex-1 py-4 rounded-2xl font-bold flex items-center justify-center gap-2 transition-all bg-white border active-main-resto shadow-lg">
                <i data-lucide="utensils" class="w-4 h-4"></i> Resto
            </button>
            <button onclick="setStore('Épicerie')" id="btn-epi" class="flex-1 py-4 rounded-2xl font-bold flex items-center justify-center gap-2 transition-all bg-white border">
                <i data-lucide="shopping-basket" class="w-4 h-4"></i> Épicerie
            </button>
        </div>

        <div id="sub-nav" class="category-scroll no-scrollbar sticky top-[155px] bg-white/95 backdrop-blur-sm z-30"></div>

        <main id="product-grid" class="p-6 grid grid-cols-2 gap-4 pb-48"></main>

        <div id="checkout-bar" class="sticky-footer-wrap translate-y-full">
            <button onclick="toggleCart(true)" id="main-order-btn" class="w-full bg-[#1A1A1A] text-white p-5 rounded-[2.2rem] flex justify-between items-center shadow-2xl active:scale-95 transition">
                <div class="text-left pl-2">
                    <p id="item-count" class="text-[9px] font-bold text-gray-400 uppercase tracking-widest">0 Articles</p>
                    <p id="final-price" class="text-xl font-black">0 DH</p>
                </div>
                <span class="font-black flex items-center gap-2 pr-2 text-sm text-orange-500 font-bold">Voir le panier <i data-lucide="arrow-right" class="w-4 h-4"></i></span>
            </button>
        </div>
    </div>

    <div id="cart-drawer-root">
        <div id="cart-overlay" onclick="toggleCart(false)"></div>
        <div id="cart-panel" class="flex flex-col">
            <div class="p-6 border-b flex justify-between items-center">
                <h2 class="text-xl font-black italic tracking-tight">Mon Panier</h2>
                <button onclick="toggleCart(false)" class="p-3 bg-gray-100 rounded-full text-gray-500"><i data-lucide="x" class="w-4 h-4"></i></button>
            </div>
            <div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-4 no-scrollbar"></div>
            <div class="p-8 bg-gray-50/80 border-t border-gray-100 space-y-3">
                <div class="flex justify-between items-center px-2">
                    <span class="font-bold text-gray-400 uppercase text-[9px]">Livraison</span>
                    <span class="font-bold text-gray-600 text-xs">20 DH</span>
                </div>
                <div class="flex justify-between items-center px-2">
                    <span class="font-bold text-gray-400 uppercase text-[9px]">Total</span>
                    <span id="drawer-total" class="text-2xl font-black text-[#E85A24]">0 DH</span>
                </div>
                <button onclick="sendToWhatsApp()" id="whatsapp-btn" class="w-full bg-[#25D366] text-white py-5 rounded-[1.8rem] font-black text-lg flex justify-center items-center gap-3 shadow-xl active:scale-95 transition">
                    <i data-lucide="message-circle" class="w-6 h-6"></i> WhatsApp
                </button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBebaGxqiNBvCqofveg1Fmztl7av3Mdoyg",
            authDomain: "lascotaco-67fe5.firebaseapp.com",
            projectId: "lascotaco-67fe5",
            storageBucket: "lascotaco-67fe5.firebasestorage.app",
            messagingSenderId: "865918381027",
            appId: "1:865918381027:web:abc6435df20894020c4ed6"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let cart = {}; let activeStore = 'Restaurant'; let activeCat = '🔥 Top vente';
        let livraisonFee = 20;

        // INFINITE SLIDER
        async function loadSlides() {
            const slider = document.getElementById('slider');
            const dots = document.getElementById('slider-dots');
            const snap = await db.collection("banners").orderBy("timestamp", "desc").get();
            if (snap.empty) return;
            const bannerArray = [];
            snap.forEach(doc => bannerArray.push(doc.data().url));
            slider.innerHTML = bannerArray.map(url => `<div class="slide-box"><img src="${url}"></div>`).join('');
            slider.innerHTML += `<div class="slide-box"><img src="${bannerArray[0]}"></div>`;
            dots.innerHTML = bannerArray.map((_, i) => `<div class="w-1.5 h-1.5 rounded-full bg-white transition-all duration-500 ${i === 0 ? 'w-6' : 'opacity-30'}"></div>`).join('');
            let index = 0;
            const totalSlides = bannerArray.length;
            setInterval(() => {
                index++;
                slider.style.transition = 'transform 0.7s cubic-bezier(0.65, 0, 0.35, 1)';
                slider.style.transform = `translateX(-${index * 100}%)`;
                if (index === totalSlides) {
                    setTimeout(() => {
                        slider.style.transition = 'none';
                        index = 0;
                        slider.style.transform = `translateX(0)`;
                    }, 700);
                }
                const dotIdx = index === totalSlides ? 0 : index;
                Array.from(dots.children).forEach((dot, dIdx) => {
                    dot.className = `w-1.5 h-1.5 rounded-full bg-white transition-all duration-500 ${dIdx === dotIdx ? 'w-6' : 'opacity-80'}`;
                });
            }, 5000);
        }

        // STORE TOGGLE LOGIC
        function setStore(type) { 
            activeStore = type; 
            activeCat = '🔥 Top vente';
            
            const root = document.documentElement;
            const btnResto = document.getElementById('btn-resto');
            const btnEpi = document.getElementById('btn-epi');

            if(type === 'Restaurant') {
                root.style.setProperty('--main', '#E85A24');
                btnResto.className = "flex-1 py-4 rounded-2xl font-bold flex items-center justify-center gap-2 transition-all bg-white border active-main-resto shadow-lg";
                btnEpi.className = "flex-1 py-4 rounded-2xl font-bold flex items-center justify-center gap-2 transition-all bg-white border";
            } else {
                root.style.setProperty('--main', '#2D6A4F'); // Green for Epicerie
                btnEpi.className = "flex-1 py-4 rounded-2xl font-bold flex items-center justify-center gap-2 transition-all bg-white border active-main-epi shadow-lg";
                btnResto.className = "flex-1 py-4 rounded-2xl font-bold flex items-center justify-center gap-2 transition-all bg-white border";
            }
            
            renderLabels(); 
            loadProducts(); 
        }

        async function renderLabels() {
            const nav = document.getElementById('sub-nav');
            const catsData = [{name: '🔥 Top vente'}];
            const snap = await db.collection("categories").where("type", "==", activeStore).get();
            snap.forEach(doc => catsData.push(doc.data()));
            nav.innerHTML = catsData.map((cat, idx) => `
                <button id="btn-cat-${idx}" 
                    onclick="handleCatClick('${cat.name}', 'btn-cat-${idx}')" 
                    class="category-pill px-6 py-2.5 rounded-xl font-bold whitespace-nowrap border ${activeCat === cat.name ? 'active-label' : 'bg-white text-gray-400 border-gray-100'}">
                    ${cat.name}
                </button>
            `).join('');
        }

        function handleCatClick(catName, elementId) {
            activeCat = catName;
            renderLabels();
            const nav = document.getElementById('sub-nav');
            setTimeout(() => {
                const activePill = document.getElementById(elementId);
                if(activePill) nav.scrollTo({ left: activePill.offsetLeft - 24, behavior: 'smooth' });
            }, 10);
            loadProducts();
        }

        function loadProducts() {
            let query = db.collection("products").where("type", "==", activeStore);
            if (activeCat === '🔥 Top vente') query = query.where("isTop", "==", true);
            else query = query.where("category", "==", activeCat);
            query.onSnapshot(snap => {
                const grid = document.getElementById('product-grid');
                grid.innerHTML = "";
                snap.forEach(doc => {
                    const p = doc.data();
                    const qty = cart[p.name]?.qty || 0;
                    grid.innerHTML += `
                        <div class="glass-card p-3 flex flex-col gap-3">
                            <div class="h-32 bg-gray-50 rounded-2xl overflow-hidden relative shadow-inner">
                                <img src="${p.image}" class="w-full h-full object-cover">
                                ${p.isTop ? '<span class="absolute top-2 left-2 bg-orange-600 text-white text-[8px] font-black px-2 py-1 rounded-md" style="background-color: var(--main)">TOP</span>' : ''}
                            </div>
                            <h3 class="font-bold text-[11px] text-gray-800 leading-tight">${p.name}</h3>
                            <div class="flex justify-between items-center mt-auto">
                                <span class="font-black text-xs" style="color: var(--main)">${p.price} DH</span>
                                <div class="flex items-center gap-2 bg-gray-50 rounded-lg p-1 border border-gray-100">
                                    <button onclick="updateQty('${p.name}', ${p.price}, -1, '${p.image}')" class="w-6 h-6 bg-white rounded shadow-sm font-bold text-xs">-</button>
                                    <span class="font-bold text-[10px] w-3 text-center">${qty}</span>
                                    <button onclick="updateQty('${p.name}', ${p.price}, 1, '${p.image}')" class="w-6 h-6 text-white rounded shadow-sm font-bold text-xs" style="background-color: var(--main)">+</button>
                                </div>
                            </div>
                        </div>`;
                });
                lucide.createIcons();
            });
        }

        function updateQty(name, price, change, img) {
            if (!cart[name]) cart[name] = { qty: 0, price: price, image: img };
            cart[name].qty += change;
            if (cart[name].qty <= 0) delete cart[name];
            syncUI();
            if(!document.getElementById('body-wrap').classList.contains('drawer-closed')) renderDrawer();
        }

        function syncUI() {
            let total = 0; let count = 0;
            for (let id in cart) { total += cart[id].qty * cart[id].price; count += cart[id].qty; }
            document.getElementById('nav-total').innerText = total + " DH";
            document.getElementById('final-price').innerText = total + " DH";
            document.getElementById('drawer-total').innerText = (total > 0 ? total + livraisonFee : 0) + " DH";
            document.getElementById('item-count').innerText = count + " Articles";
            document.getElementById('checkout-bar').style.transform = count > 0 ? 'translateY(0)' : 'translateY(100%)';
            loadProducts();
        }

        function renderDrawer() {
            const itemsList = document.getElementById('cart-items');
            const cartKeys = Object.keys(cart);
            if(cartKeys.length === 0) {
                itemsList.innerHTML = `<p class="text-center text-gray-400 py-10 font-bold text-xs">Panier vide 🌮</p>`;
                return;
            }
            itemsList.innerHTML = cartKeys.map(name => `
                <div class="flex items-center gap-4 bg-gray-50 p-3 rounded-2xl border border-gray-100">
                    <img src="${cart[name].image}" class="w-10 h-10 rounded-xl object-cover shadow-sm">
                    <div class="flex-1">
                        <p class="font-bold text-[10px] text-gray-800 leading-tight">${name}</p>
                        <p class="text-[9px] font-black text-[#E85A24]">${cart[name].price} DH</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <button onclick="updateQty('${name}', ${cart[name].price}, -1, '${cart[name].image}')" class="w-6 h-6 bg-white rounded shadow-sm font-black">-</button>
                        <span class="font-bold text-[10px]">${cart[name].qty}</span>
                        <button onclick="updateQty('${name}', ${cart[name].price}, 1, '${cart[name].image}')" class="w-6 h-6 text-white rounded shadow-sm font-black" style="background-color: var(--main)">+</button>
                    </div>
                </div>
            `).join('');
        }

        function toggleCart(show) {
            const body = document.getElementById('body-wrap');
            if(show) { 
                body.classList.replace('drawer-closed', 'drawer-open'); 
                body.classList.add('no-scroll'); // LOCK SCROLL
                renderDrawer(); 
            } else { 
                body.classList.replace('drawer-open', 'drawer-closed'); 
                body.classList.remove('no-scroll'); // UNLOCK SCROLL
            }
        }

        function sendToWhatsApp() {
            let msg = `🛒 *Nouvelle Commande LASCOTACO*\n\n`;
            let subtotal = 0;
            for (let id in cart) { 
                msg += `• ${cart[id].qty}x ${id} (${cart[id].qty * cart[id].price} DH)\n`;
                subtotal += cart[id].qty * cart[id].price;
            }
            msg += `\n💰 *Total:* ${subtotal + livraisonFee} DH`;
            window.open(`https://wa.me/212708006088?text=${encodeURIComponent(msg)}`);
        }

        document.addEventListener('DOMContentLoaded', () => { loadSlides(); setStore('Restaurant'); lucide.createIcons(); });
    </script>
</body>
</html>
