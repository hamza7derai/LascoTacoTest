<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LASCOTACO</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
  --resto: #E85A24;
  --epi: #10B981;
  --bg: #FDFBFA;
}

body {
  background: var(--bg);
  font-family: 'Plus Jakarta Sans', sans-serif;
  -webkit-tap-highlight-color: transparent;
}

/* APP */
.app-container {
  max-width: 500px;
  margin: auto;
  background: white;
  min-height: 100vh;
}

/* THEMES */
.theme-resto { --brand: var(--resto); --brand-soft: rgba(232,90,36,0.1); }
.theme-epi { --brand: var(--epi); --brand-soft: rgba(16,185,129,0.1); }

/* CATEGORY */
.category-scroll {
  display: flex;
  gap: 12px;
  overflow-x: auto;
  scroll-behavior: smooth;
  scroll-snap-type: x mandatory;

  padding: 12px 16px;
}

.category-pill {
  flex: 0 0 auto;
  scroll-snap-align: start;

  background: #F3F4F6;
  color: #6B7280;

  transition: 0.3s;
}

.active-label {
  background: var(--brand) !important;
  color: white !important;
  transform: scale(1.05);
  box-shadow: 0 8px 18px var(--brand-soft);
}

/* PRODUCT */
.product-card {
  background: #FFFAF8;
  border-radius: 20px;
  border: 1px solid #eee;
  transition: 0.25s;
}
.product-card:active { transform: scale(0.96); }

.product-img-wrap {
  height: 120px;
  overflow: hidden;
  border-radius: 16px;
}
.product-img-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: 0.3s;
}
.product-card:active img { transform: scale(1.05); }

/* STICKY */
.sticky-header {
  position: sticky;
  top: 0;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(10px);
  z-index: 50;
}

/* CART */
.drawer-closed #cart-panel { transform: translateX(100%); }
.drawer-open #cart-panel { transform: translateX(0); }

#cart-panel {
  position: fixed;
  right: 0;
  top: 0;
  bottom: 0;
  width: 85%;
  background: white;
  transition: 0.4s;
  z-index: 1000;
}

#cart-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.3);
  display: none;
}
.drawer-open #cart-overlay { display: block; }

/* SCROLLBAR */
.no-scrollbar::-webkit-scrollbar { display: none; }
</style>
</head>

<body class="theme-resto drawer-closed" id="body">

<div class="app-container">

<!-- HEADER -->
<header class="sticky-header p-4 flex justify-between items-center">
  <h1 class="text-xl font-black text-[#E85A24]">LASCOTACO</h1>

  <button onclick="toggleCart(true)" class="bg-black text-white px-4 py-2 rounded-xl text-sm flex gap-2">
    🛒 <span id="nav-total">0 DH</span>
  </button>
</header>

<!-- STORE SWITCH -->
<div class="p-4 flex gap-2">
  <button onclick="setStore('Restaurant')" id="btn-resto" class="flex-1 p-3 rounded-xl bg-orange-500 text-white font-bold">Resto</button>
  <button onclick="setStore('Épicerie')" id="btn-epi" class="flex-1 p-3 rounded-xl bg-gray-100 font-bold">Épicerie</button>
</div>

<!-- CATEGORIES -->
<div id="sub-nav" class="category-scroll no-scrollbar"></div>

<!-- PRODUCTS -->
<main id="grid" class="p-4 grid grid-cols-2 gap-4 pb-32"></main>

</div>

<!-- CART -->
<div id="cart-overlay" onclick="toggleCart(false)"></div>

<div id="cart-panel" class="p-6 flex flex-col">
  <h2 class="font-bold text-lg mb-4">Panier</h2>
  <div id="cart-items" class="flex-1 overflow-auto space-y-3"></div>
  <button onclick="sendToWhatsApp()" class="bg-green-500 text-white p-4 rounded-xl mt-4">Commander</button>
</div>

<script>

/* FIREBASE */
firebase.initializeApp({
  apiKey: "YOUR_KEY",
  projectId: "YOUR_ID"
});
const db = firebase.firestore();

/* STATE */
let cart = {};
let activeStore = "Restaurant";
let activeCat = "🔥 Top vente";

/* CATEGORIES */
async function renderLabels() {
  const nav = document.getElementById("sub-nav");

  const snap = await db.collection("categories")
    .where("type","==",activeStore)
    .get();

  let cats = ["🔥 Top vente"];
  snap.forEach(doc => cats.push(doc.data().name));

  nav.innerHTML = cats.map((c,i)=>`
    <button id="cat-${i}"
      onclick="selectCat('${c}','cat-${i}')"
      class="category-pill px-5 py-2 rounded-xl font-bold ${c===activeCat?'active-label':''}">
      ${c}
    </button>
  `).join("");
}

/* CLICK */
function selectCat(name,id){
  activeCat = name;
  renderLabels();
  loadProducts();

  setTimeout(()=>{
    const nav = document.getElementById("sub-nav");
    const el = document.getElementById(id);

    nav.scrollTo({
      left: el.offsetLeft - 40,
      behavior: "smooth"
    });
  },50);
}

/* PRODUCTS */
function loadProducts(){
  let q = db.collection("products").where("type","==",activeStore);

  if(activeCat==="🔥 Top vente") q = q.where("isTop","==",true);
  else q = q.where("category","==",activeCat);

  q.onSnapshot(snap=>{
    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    snap.forEach(doc=>{
      const p = doc.data();
      const qty = cart[p.name]?.qty || 0;

      grid.innerHTML += `
        <div class="product-card p-3">
          <div class="product-img-wrap">
            <img src="${p.image}">
          </div>

          <h3 class="text-xs font-bold mt-2">${p.name}</h3>

          <div class="flex justify-between mt-2 items-center">
            <span class="font-black text-sm" style="color:var(--brand)">
              ${p.price} DH
            </span>

            <div class="flex gap-2 items-center">
              <button onclick="updateQty('${p.name}',${p.price},-1,'${p.image}')" class="bg-gray-200 w-7 h-7 rounded">-</button>
              <span>${qty}</span>
              <button onclick="updateQty('${p.name}',${p.price},1,'${p.image}')" class="bg-orange-500 text-white w-7 h-7 rounded">+</button>
            </div>
          </div>
        </div>
      `;
    });

    lucide.createIcons();
  });
}

/* CART */
function updateQty(name,price,change,img){
  if(!cart[name]) cart[name]={qty:0,price,image:img};

  cart[name].qty+=change;
  if(cart[name].qty<=0) delete cart[name];

  syncUI();
}

/* UI */
function syncUI(){
  let total=0;

  for(let k in cart){
    total+=cart[k].qty*cart[k].price;
  }

  document.getElementById("nav-total").innerText = total+" DH";
}

/* CART OPEN */
function toggleCart(open){
  const body = document.getElementById("body");
  body.classList.toggle("drawer-open",open);
  body.classList.toggle("drawer-closed",!open);

  renderCart();
}

/* CART UI */
function renderCart(){
  const list = document.getElementById("cart-items");

  if(Object.keys(cart).length===0){
    list.innerHTML = "Panier vide";
    return;
  }

  list.innerHTML = Object.keys(cart).map(n=>`
    <div class="flex justify-between">
      <span>${cart[n].qty}x ${n}</span>
      <span>${cart[n].qty * cart[n].price} DH</span>
    </div>
  `).join("");
}

/* STORE SWITCH */
function setStore(type){
  activeStore = type;
  activeCat = "🔥 Top vente";

  document.getElementById("body").className =
    type==="Restaurant" ? "theme-resto drawer-closed" : "theme-epi drawer-closed";

  renderLabels();
  loadProducts();
}

/* WHATSAPP */
function sendToWhatsApp(){
  let msg = "Commande:\n";

  let total=0;
  for(let k in cart){
    msg += `${cart[k].qty}x ${k}\n`;
    total += cart[k].qty * cart[k].price;
  }

  msg += `Total: ${total} DH`;

  window.open("https://wa.me/212708006088?text="+encodeURIComponent(msg));
}

/* INIT */
document.addEventListener("DOMContentLoaded",()=>{
  renderLabels();
  loadProducts();
});
</script>

</body>
</html>
