<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LASCOTACO | Premium App</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#E85A24">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --resto: #E85A24; --epi: #10B981; --bg: #FDFBFA; }
        body { background-color: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .app-container { max-width: 500px; margin: 0 auto; width: 100%; position: relative; background: white; min-height: 100vh; box-shadow: 0 0 60px rgba(0,0,0,0.03); overflow-x: hidden; }
        body.modal-open { overflow: hidden; }

        /* THEMES */
        .theme-resto { --brand: var(--resto); --brand-soft: rgba(232, 90, 36, 0.1); }
        .theme-epi { --brand: var(--epi); --brand-soft: rgba(16, 185, 129, 0.1); }

        /* SKELETON LOADERS */
        .skeleton { background: linear-gradient(90deg, #F1F3F5 25%, #E9ECEF 50%, #F1F3F5 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 12px; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* CATEGORIES */
        .category-scroll { display: flex; gap: 12px; overflow-x: auto; scroll-snap-type: x mandatory; padding: 12px 24px; scroll-padding-left: 24px; scroll-behavior: smooth;}
        .category-pill { flex: 0 0 auto; scroll-snap-align: start; transition: all 0.3s ease; background: #F1F3F5; color: #6C757D; }
        .active-label { background-color: var(--brand) !important; color: white !important; transform: scale(1.05); box-shadow: 0 8px 20px var(--brand-soft); }

        /* PRODUCTS */
        .product-card { background: #FFFAF8; border-radius: 22px; border: 1px solid #F1F3F5; transition: all 0.3s ease; animation: fadeIn 0.4s ease-out forwards; }
        .product-card:active { transform: scale(0.97); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* BOTTOM SHEET (OPTIONS) */
        #bottom-sheet-root { position: fixed; inset: 0; z-index: 2000; pointer-events: none; display: flex; align-items: flex-end; justify-content: center; }
        #bs-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); opacity: 0; transition: opacity 0.4s ease; pointer-events: none; }
        #bs-panel { width: 100%; max-width: 500px; background: white; border-radius: 32px 32px 0 0; transform: translateY(100%); transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1); pointer-events: auto; padding-bottom: env(safe-area-inset-bottom); max-height: 85vh; display: flex; flex-direction: column; }
        .bs-open #bs-overlay { opacity: 1; pointer-events: auto; }
        .bs-open #bs-panel { transform: translateY(0); }

        /* UTILS */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-store-btn { background-color: var(--brand) !important; color: white !important; box-shadow: 0 10px 20px var(--brand-soft); }
        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; pointer-events: none; display: flex; flex-direction: column; gap: 8px; width: 90%; max-width: 400px; }
    </style>
</head>
<body class="drawer-closed theme-resto" id="body-wrap">

    <div id="toast-container"></div>

    <div class="app-container" id="app-root">
        
        <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-md px-6 py-4 flex justify-between items-center border-b border-gray-50">
            <h1 class="text-2xl font-black text-[#E85A24] tracking-tighter italic">LASCOTACO</h1>
            <button onclick="toggleCart(true)" class="bg-[#1A1A1A] text-white px-5 py-2.5 rounded-2xl font-bold text-xs flex items-center gap-2 active:scale-95 transition">
                <i data-lucide="shopping-bag" class="w-4 h-4 text-orange-400"></i>
                <span id="nav-total">0 DH</span>
            </button>
        </header>

        <div class="px-5 pt-4 pb-2 bg-white">
            <div class="relative">
                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                <input type="text" id="search-input" placeholder="Rechercher un plat, une boisson..." class="w-full bg-gray-50 border border-gray-100 rounded-2xl py-3.5 pl-11 pr-4 text-sm font-bold focus:outline-none focus:ring-2 focus:ring-[#E85A24]/50 transition-shadow">
            </div>
        </div>

        <div class="px-5 py-2 flex gap-3 bg-white sticky top-[68px] z-40">
            <button onclick="setStore('Restaurant')" id="btn-resto" class="flex-1 py-3.5 rounded-2xl font-extrabold flex items-center justify-center gap-2 transition-all bg-white border border-gray-100 active-store-btn">
                <i data-lucide="utensils" class="w-4 h-4"></i> Resto
            </button>
            <button onclick="setStore('Épicerie')" id="btn-epi" class="flex-1 py-3.5 rounded-2xl font-extrabold flex items-center justify-center gap-2 transition-all bg-white border border-gray-100">
                <i data-lucide="shopping-basket" class="w-4 h-4"></i> Épicerie
            </button>
        </div>

        <div id="sub-nav" class="category-scroll no-scrollbar sticky top-[138px] bg-white/95 backdrop-blur-md z-30"></div>

        <main id="product-grid" class="p-5 grid grid-cols-2 gap-4 pb-40">
            </main>

        <div id="checkout-bar" class="fixed bottom-0 left-0 right-0 max-w-[500px] mx-auto p-5 z-40 translate-y-full transition-transform duration-500">
            <button onclick="toggleCart(true)" class="w-full bg-[#1A1A1A] text-white p-5 rounded-[2.2rem] flex justify-between items-center shadow-2xl active:scale-95 transition">
                <div class="text-left pl-2 z-10">
                    <p id="item-count" class="text-[9px] font-bold text-gray-400 uppercase tracking-widest">0 Articles</p>
                    <p id="final-price" class="text-xl font-black">0 DH</p>
                </div>
                <span class="font-black flex items-center gap-2 pr-2 text-sm text-orange-500">Panier <i data-lucide="arrow-right" class="w-4 h-4"></i></span>
            </button>
        </div>
    </div>

    <div id="bottom-sheet-root">
        <div id="bs-overlay" onclick="closeSheet()"></div>
        <div id="bs-panel">
            <div class="p-6 border-b border-gray-50 flex justify-between items-start shrink-0">
                <div>
                    <h3 id="bs-title" class="font-black text-xl text-gray-800">Produit</h3>
                    <p id="bs-price" class="font-bold text-[#E85A24] mt-1">0 DH</p>
                </div>
                <button onclick="closeSheet()" class="p-2 bg-gray-100 rounded-full active:scale-90 transition"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            
            <div class="p-6 overflow-y-auto no-scrollbar flex-1 space-y-6">
                <div id="bs-sauces" class="space-y-3 hidden">
                    <h4 class="font-bold text-sm text-gray-500 uppercase tracking-widest">Choix de Sauce</h4>
                    <select id="sauce-select" class="w-full p-4 bg-gray-50 rounded-2xl font-bold text-sm border border-gray-100 outline-none focus:border-[#E85A24]">
                        <option value="">Sans sauce</option>
                        <option value="Algérienne">Algérienne</option>
                        <option value="Big Mac">Big Mac</option>
                        <option value="Fromagère">Fromagère</option>
                    </select>
                </div>
                
                <div class="space-y-3">
                    <h4 class="font-bold text-sm text-gray-500 uppercase tracking-widest">Instructions spéciales</h4>
                    <textarea id="bs-notes" placeholder="Ex: Sans oignons, bien cuit..." class="w-full p-4 bg-gray-50 rounded-2xl font-semibold text-sm border border-gray-100 outline-none focus:border-[#E85A24] resize-none h-24"></textarea>
                </div>
            </div>

            <div class="p-6 bg-white shrink-0 border-t border-gray-50 shadow-[0_-10px_20px_rgba(0,0,0,0.02)]">
                <button id="bs-add-btn" class="w-full bg-[#E85A24] text-white py-5 rounded-full font-black text-lg active:scale-95 transition shadow-lg shadow-orange-200">
                    Ajouter au panier
                </button>
            </div>
        </div>
    </div>

    <div id="cart-drawer-root" style="position: fixed; inset: 0; z-index: 1000; pointer-events: none;">
        <div id="cart-overlay" style="position: absolute; inset: 0; background: rgba(0,0,0,0.3); backdrop-filter: blur(5px); opacity: 0; transition: opacity 0.4s ease; pointer-events: none;" onclick="toggleCart(false)"></div>
        <div id="cart-panel" style="position: absolute; right: 0; top: 0; bottom: 0; width: 88%; max-width: 420px; background: white; border-radius: 30px 0 0 30px; transform: translateX(100%); transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1); pointer-events: auto; display: flex; flex-direction: column;">
            
            <div class="p-6 border-b flex justify-between items-center shrink-0">
                <h2 class="text-xl font-black italic tracking-tight">Mon Panier</h2>
                <button onclick="toggleCart(false)" class="p-3 bg-gray-100 rounded-full text-gray-500"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            
            <div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-4 no-scrollbar"></div>
            
            <div id="upsell-container" class="px-6 pb-4 shrink-0">
                <p class="font-bold text-[10px] text-gray-400 uppercase tracking-widest mb-3">N'oubliez pas !</p>
                <div class="flex gap-3 overflow-x-auto no-scrollbar pb-2">
                    <div onclick="quickAdd('Coca Cola 33cl', 10, 'https://cdn-icons-png.flaticon.com/512/3075/3075977.png')" class="min-w-[120px] bg-gray-50 p-3 rounded-2xl flex items-center gap-3 border border-gray-100 active:scale-95 transition">
                        <div class="flex-1"><p class="font-bold text-[10px] text-gray-800">Coca Cola</p><p class="font-black text-[9px] text-[#E85A24]">+10 DH</p></div>
                        <div class="w-6 h-6 bg-white rounded-full flex items-center justify-center font-bold text-xs shadow-sm">+</div>
                    </div>
                </div>
            </div>

            <div class="p-8 bg-gray-50/80 border-t border-gray-100 space-y-4 shrink-0">
                <div class="flex justify-between items-center px-2">
                    <span class="font-bold text-gray-400 uppercase text-[10px]">Livraison</span>
                    <span class="font-bold text-gray-800 text-sm">20 DH</span>
                </div>
                <div class="flex justify-between items-center px-2">
                    <span class="font-bold text-gray-400 uppercase text-[10px]">Total à payer</span>
                    <span id="drawer-total" class="text-3xl font-black text-[#E85A24]">0 DH</span>
                </div>
                <button onclick="sendToWhatsApp()" id="wa-btn" class="w-full bg-[#25D366] text-white py-5 rounded-full font-black text-lg flex justify-center items-center gap-3 shadow-xl active:scale-95 transition">
                    <i data-lucide="message-circle" class="w-6 h-6"></i> Commander
                </button>
            </div>
        </div>
    </div>

    <script>
        // SERVICE WORKER REGISTRATION (PWA)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.log('SW setup failed'));
            });
        }

        // FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyBebaGxqiNBvCqofveg1Fmztl7av3Mdoyg",
            authDomain: "lascotaco-67fe5.firebaseapp.com",
            projectId: "lascotaco-67fe5",
            storageBucket: "lascotaco-67fe5.firebasestorage.app",
            messagingSenderId: "865918381027",
            appId: "1:865918381027:web:abc6435df20894020c4ed6"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let cart = []; // Changed to Array to support complex items
        let activeStore = 'Restaurant'; let activeCat = '🔥 Top vente';
        let livraisonFee = 20;
        let allProducts = []; // Local cache for Search
        let currentItemForSheet = null; // Temp holder

        // --- TOAST SYSTEM ---
        function showToast(message) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'bg-[#1A1A1A] text-white px-5 py-3.5 rounded-2xl text-xs font-bold shadow-2xl transition-all duration-300 translate-y-[-20px] opacity-0 flex items-center justify-between border border-gray-800';
            toast.innerHTML = `<div class="flex items-center gap-3"><i data-lucide="check-circle-2" class="w-4 h-4 text-[#25D366]"></i> <span>${message}</span></div>`;
            container.appendChild(toast);
            lucide.createIcons();
            requestAnimationFrame(() => { toast.classList.remove('translate-y-[-20px]', 'opacity-0'); });
            setTimeout(() => { toast.classList.add('translate-y-[-20px]', 'opacity-0'); setTimeout(() => toast.remove(), 300); }, 2500);
        }

        // --- SKELETONS ---
        function renderSkeletons() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = Array(4).fill().map(() => `
                <div class="product-card p-3 flex flex-col gap-3 border-transparent shadow-none">
                    <div class="skeleton h-32 w-full rounded-2xl"></div>
                    <div class="skeleton h-4 w-3/4 rounded mt-1"></div>
                    <div class="flex justify-between items-center mt-auto pt-2">
                        <div class="skeleton h-4 w-12 rounded"></div>
                        <div class="skeleton h-8 w-8 rounded-xl"></div>
                    </div>
                </div>
            `).join('');
        }

        // --- STORE SWITCH ---
        function setStore(type) { 
            activeStore = type; activeCat = '🔥 Top vente';
            document.getElementById('search-input').value = '';
            
            const body = document.getElementById('body-wrap');
            const btnResto = document.getElementById('btn-resto');
            const btnEpi = document.getElementById('btn-epi');
            const waBtn = document.getElementById('wa-btn');
            const bsBtn = document.getElementById('bs-add-btn');

            if(type === 'Restaurant') {
                body.className = "drawer-closed theme-resto";
                btnResto.classList.add('active-store-btn'); btnEpi.classList.remove('active-store-btn');
                waBtn.style.backgroundColor = "#25D366"; bsBtn.style.backgroundColor = "#E85A24";
            } else {
                body.className = "drawer-closed theme-epi";
                btnResto.classList.remove('active-store-btn'); btnEpi.classList.add('active-store-btn');
                waBtn.style.backgroundColor = "#10B981"; bsBtn.style.backgroundColor = "#10B981";
            }
            renderSkeletons(); renderLabels(); loadProducts(); 
        }

        async function renderLabels() {
            const nav = document.getElementById('sub-nav');
            const catsData = [{name: '🔥 Top vente'}];
            const snap = await db.collection("categories").where("type", "==", activeStore).get();
            snap.forEach(doc => catsData.push(doc.data()));
            
            nav.innerHTML = catsData.map((cat, idx) => `
                <button id="btn-cat-${idx}" onclick="handleCatClick('${cat.name}', 'btn-cat-${idx}')" 
                    class="category-pill px-6 py-2.5 rounded-xl font-bold whitespace-nowrap ${activeCat === cat.name ? 'active-label' : ''}">
                    ${cat.name}
                </button>
            `).join('');
        }

        function handleCatClick(catName, elementId) {
            activeCat = catName; document.getElementById('search-input').value = '';
            renderLabels(); renderSkeletons(); loadProducts();
            const nav = document.getElementById('sub-nav');
            const scrollTarget = document.getElementById(elementId).offsetLeft - 24;
            nav.scrollTo({ left: scrollTarget, behavior: 'smooth' });
        }

        // --- SEARCH ENGINE ---
        document.getElementById('search-input').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            if(term.length > 0) {
                const filtered = allProducts.filter(p => p.name.toLowerCase().includes(term));
                renderProductGrid(filtered);
            } else {
                renderProductGrid(allProducts); // reset
            }
        });

        // --- PRODUCTS DB ---
        function loadProducts() {
            let query = db.collection("products").where("type", "==", activeStore);
            if (activeCat === '🔥 Top vente') query = query.where("isTop", "==", true);
            else query = query.where("category", "==", activeCat);
            
            query.onSnapshot(snap => {
                allProducts = [];
                snap.forEach(doc => allProducts.push(doc.data()));
                renderProductGrid(allProducts);
            });
        }

        function renderProductGrid(products) {
            const grid = document.getElementById('product-grid');
            if(products.length === 0) { grid.innerHTML = '<p class="col-span-2 text-center text-gray-400 py-10 font-bold text-xs">Aucun résultat</p>'; return; }
            
            grid.innerHTML = products.map(p => `
                <div class="product-card p-3 flex flex-col gap-3" onclick="openOptions('${p.name}', ${p.price}, '${p.image}')">
                    <div class="product-img-wrap relative">
                        <img src="${p.image}" loading="lazy">
                        ${p.isTop ? `<span class="absolute top-2 left-2 ${activeStore === 'Restaurant' ? 'bg-orange-600' : 'bg-emerald-500'} text-white text-[7px] font-black px-2 py-1 rounded-md uppercase">Top</span>` : ''}
                    </div>
                    <h3 class="font-bold text-[11px] text-gray-800 leading-tight h-8 overflow-hidden pr-1">${p.name}</h3>
                    <div class="flex justify-between items-center mt-auto">
                        <span class="font-black text-sm" style="color: var(--brand)">${p.price} DH</span>
                        <div class="w-8 h-8 rounded-xl font-bold text-xs flex items-center justify-center text-white shadow-md active:scale-90 transition" style="background-color: var(--brand)">+</div>
                    </div>
                </div>`).join('');
        }

        // --- BOTTOM SHEET (CUSTOMIZATION) ---
        function openOptions(name, price, image) {
            currentItemForSheet = { name, price, image };
            document.getElementById('bs-title').innerText = name;
            document.getElementById('bs-price').innerText = price + ' DH';
            document.getElementById('sauce-select').value = '';
            document.getElementById('bs-notes').value = '';
            
            // Show sauces only for restaurant
            const sauceDiv = document.getElementById('bs-sauces');
            if(activeStore === 'Restaurant') sauceDiv.classList.remove('hidden');
            else sauceDiv.classList.add('hidden');

            document.getElementById('body-wrap').classList.add('bs-open', 'modal-open');
        }

        function closeSheet() {
            document.getElementById('body-wrap').classList.remove('bs-open', 'modal-open');
            currentItemForSheet = null;
        }

        document.getElementById('bs-add-btn').addEventListener('click', () => {
            if(!currentItemForSheet) return;
            const sauce = document.getElementById('sauce-select').value;
            const notes = document.getElementById('bs-notes').value.trim();
            
            // Generate unique ID based on options
            const complexId = `${currentItemForSheet.name}-${sauce}-${notes}`;
            
            const existingItem = cart.find(i => i.id === complexId);
            if(existingItem) {
                existingItem.qty++;
            } else {
                cart.push({
                    id: complexId,
                    name: currentItemForSheet.name,
                    price: currentItemForSheet.price,
                    image: currentItemForSheet.image,
                    sauce: sauce,
                    notes: notes,
                    qty: 1
                });
            }
            
            closeSheet();
            syncUI();
            showToast(`${currentItemForSheet.name} ajouté !`);
        });

        // Quick add for upsells
        function quickAdd(name, price, img) {
            const id = `${name}--`;
            const existing = cart.find(i => i.id === id);
            if(existing) existing.qty++;
            else cart.push({ id, name, price, image: img, sauce: '', notes: '', qty: 1 });
            syncUI(); renderDrawer(); showToast(`${name} ajouté !`);
        }

        function updateCartItemQty(id, change) {
            const index = cart.findIndex(i => i.id === id);
            if(index !== -1) {
                cart[index].qty += change;
                if(cart[index].qty <= 0) cart.splice(index, 1);
            }
            syncUI(); renderDrawer();
        }

        // --- CART ENGINE ---
        function syncUI() {
            let total = 0; let count = 0;
            cart.forEach(i => { total += i.qty * i.price; count += i.qty; });
            const totalWithDelivery = total > 0 ? total + livraisonFee : 0;
            
            document.getElementById('nav-total').innerText = total + " DH";
            document.getElementById('final-price').innerText = total + " DH";
            document.getElementById('drawer-total').innerText = totalWithDelivery + " DH";
            document.getElementById('item-count').innerText = count + " Articles";
            document.getElementById('checkout-bar').style.transform = count > 0 ? 'translateY(0)' : 'translateY(150%)';
        }

        function renderDrawer() {
            const list = document.getElementById('cart-items');
            if(cart.length === 0) { list.innerHTML = `<div class="py-20 text-center"><p class="text-gray-400 font-bold text-xs uppercase tracking-widest mb-4">Panier vide 🌮</p><button onclick="toggleCart(false)" class="text-xs font-black underline underline-offset-4" style="color: var(--brand)">Retour au menu</button></div>`; return; }
            
            list.innerHTML = cart.map(item => `
                <div class="flex items-start gap-4 bg-gray-50/80 p-4 rounded-3xl border border-gray-100">
                    <img src="${item.image}" class="w-14 h-14 rounded-2xl object-cover shadow-sm shrink-0">
                    <div class="flex-1 text-[11px]">
                        <p class="font-bold text-gray-800 leading-tight">${item.name}</p>
                        ${item.sauce ? `<p class="text-[9px] text-gray-500 mt-1 uppercase tracking-wider">Sauce: ${item.sauce}</p>` : ''}
                        ${item.notes ? `<p class="text-[9px] text-orange-500 italic mt-0.5">"${item.notes}"</p>` : ''}
                        <p class="font-black mt-2 text-sm" style="color: var(--brand)">${item.price} DH</p>
                    </div>
                    <div class="flex flex-col items-center gap-2 bg-white rounded-xl p-1 shadow-sm border border-gray-50">
                        <button onclick="updateCartItemQty('${item.id}', 1)" class="w-7 h-7 flex items-center justify-center font-black active:scale-75 transition">+</button>
                        <span class="font-black text-xs">${item.qty}</span>
                        <button onclick="updateCartItemQty('${item.id}', -1)" class="w-7 h-7 flex items-center justify-center font-black text-gray-400 active:scale-75 transition">-</button>
                    </div>
                </div>
            `).join('');
        }

        function toggleCart(show) {
            const body = document.getElementById('body-wrap');
            const overlay = document.getElementById('cart-overlay');
            const panel = document.getElementById('cart-panel');
            if(show) { 
                body.classList.replace('drawer-closed', 'drawer-open'); body.classList.add('modal-open'); 
                overlay.style.opacity = '1'; overlay.style.pointerEvents = 'auto';
                panel.style.transform = 'translateX(0)';
                renderDrawer(); 
            } else { 
                body.classList.replace('drawer-open', 'drawer-closed'); body.classList.remove('modal-open'); 
                overlay.style.opacity = '0'; overlay.style.pointerEvents = 'none';
                panel.style.transform = 'translateX(100%)';
            }
        }

        function sendToWhatsApp() {
            if(cart.length === 0) return;
            let msg = `🛒 *Nouvelle Commande LASCOTACO*\n\n`;
            let sub = 0; 
            cart.forEach(i => { 
                msg += `• *${i.qty}x* ${i.name}`;
                if(i.sauce) msg += `\n  ↳ _Sauce: ${i.sauce}_`;
                if(i.notes) msg += `\n  ↳ _Note: ${i.notes}_`;
                msg += `\n  = ${i.qty * i.price} DH\n\n`;
                sub += i.qty * i.price; 
            });
            msg += `🛵 *Livraison:* ${livraisonFee} DH\n💰 *TOTAL:* ${sub + livraisonFee} DH`;
            window.open(`https://wa.me/212708006088?text=${encodeURIComponent(msg)}`);
        }

        // INIT
        document.addEventListener('DOMContentLoaded', () => { setStore('Restaurant'); lucide.createIcons(); });
    </script>
</body>
