<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lasco. | Premium Delivery</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           VARIABLES & RESET (Storefront Theme)
        ========================================= */
        :root {
            --bg-main: #F4F7FE; --surface: #FFFFFF;
            --primary: #EA580C; /* Resto Orange */
            --primary-light: #FFEDD5;
            --accent: #16A34A; /* Grocery Green */
            --accent-light: #DCFCE7;
            --market: #8B5CF6; /* Future Market Purple */
            --danger: #EF4444; --text-main: #0F172A; --text-muted: #64748B;
            --border: #E2E8F0; --radius-lg: 24px; --radius-md: 16px;
            --shadow-sm: 0 4px 12px rgba(0,0,0,0.03); 
            --shadow-lg: 0 12px 40px rgba(0,0,0,0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-main); color: var(--text-main); padding-bottom: 100px; overflow-x: hidden; }
        .no-scroll { overflow: hidden; }
        svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
        button, input, select, textarea { font-family: inherit; outline: none; border: none; background: none; }

        .container { max-width: 500px; margin: 0 auto; padding: 0 16px; }

        /* LIVE ANNOUNCEMENT BANNER */
        #announcementBanner { background: var(--text-main); color: white; text-align: center; font-size: 12px; font-weight: 700; padding: 10px; display: none; }

        /* HEADER */
        .header { padding: 20px 0; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: rgba(244,247,254,0.9); backdrop-filter: blur(10px); z-index: 40;}
        .brand { font-size: 24px; font-weight: 800; letter-spacing: -1px; color: var(--text-main); display: flex; align-items: center; gap: 4px; }
        .brand span { color: var(--primary); }

        /* STORE STATUS BANNER */
        #storeClosedBanner { background: var(--danger-light); color: var(--danger); padding: 12px; border-radius: 12px; font-size: 13px; font-weight: 800; text-align: center; margin-bottom: 20px; display: none; border: 1px dashed var(--danger); }

        /* TYPE TOGGLE (Resto / Grocery) */
        .type-toggle { display: flex; background: var(--surface); border-radius: 50px; padding: 6px; box-shadow: var(--shadow-sm); margin-bottom: 24px; position: relative; z-index: 1;}
        .type-bg { position: absolute; top: 6px; bottom: 6px; left: 6px; width: calc(50% - 6px); background: var(--primary); border-radius: 50px; transition: 0.3s cubic-bezier(0.25, 1, 0.5, 1); z-index: -1; box-shadow: 0 4px 12px rgba(234,88,12,0.3); }
        .type-btn { flex: 1; padding: 12px; text-align: center; font-size: 14px; font-weight: 700; color: var(--text-muted); transition: 0.3s; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;}
        .type-btn.active { color: white; }

        /* SEARCH BAR */
        .search-box { position: relative; margin-bottom: 24px; }
        .search-icon { position: absolute; left: 16px; top: 14px; color: var(--text-muted); width: 18px; }
        .search-input { width: 100%; background: var(--surface); padding: 14px 16px 14px 44px; border-radius: var(--radius-md); font-size: 14px; font-weight: 500; border: 1px solid var(--border); box-shadow: var(--shadow-sm); transition: 0.2s; }
        .search-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }

        /* CATEGORY SECTION */
        .category-section { margin-bottom: 32px; }
        .cat-title { font-size: 18px; font-weight: 800; margin-bottom: 16px; color: var(--text-main); }
        
        /* PRODUCT GRID */
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .product-card { background: var(--surface); border-radius: var(--radius-md); border: 1px solid var(--border); padding: 12px; box-shadow: var(--shadow-sm); cursor: pointer; position: relative; transition: 0.2s; display: flex; flex-direction: column;}
        .product-card:active { transform: scale(0.97); }
        .p-img-wrap { width: 100%; aspect-ratio: 1; border-radius: 12px; overflow: hidden; background: var(--bg-main); margin-bottom: 12px; display: flex; align-items: center; justify-content: center;}
        .p-img-wrap img { width: 100%; height: 100%; object-fit: cover; mix-blend-mode: multiply; }
        .p-name { font-size: 14px; font-weight: 800; color: var(--text-main); line-height: 1.2; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;}
        .p-desc { font-size: 11px; color: var(--text-muted); margin-bottom: 8px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        
        .p-bottom { display: flex; justify-content: space-between; align-items: flex-end; margin-top: auto;}
        .p-price-box { display: flex; flex-direction: column; }
        .p-old-price { font-size: 11px; color: var(--text-muted); text-decoration: line-through; font-weight: 600; line-height: 1; margin-bottom: 2px;}
        .p-price { font-size: 15px; font-weight: 800; color: var(--primary); line-height: 1;}
        .add-btn { width: 32px; height: 32px; border-radius: 10px; background: var(--primary-light); color: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 600;}

        /* MODALS & OVERLAYS */
        .overlay { position: fixed; inset: 0; background: rgba(15,23,42,0.5); backdrop-filter: blur(4px); z-index: 100; opacity: 0; pointer-events: none; transition: 0.3s ease; }
        .overlay.active { opacity: 1; pointer-events: auto; }
        
        /* PRODUCT DETAIL BOTTOM SHEET */
        .sheet { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-radius: 30px 30px 0 0; z-index: 101; transform: translateY(100%); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1); max-height: 90vh; display: flex; flex-direction: column; max-width: 600px; margin: 0 auto; box-shadow: var(--shadow-lg);}
        .sheet.active { transform: translateY(0); }
        .sheet-handle { width: 40px; height: 5px; background: #E2E8F0; border-radius: 10px; margin: 16px auto; flex-shrink: 0; }
        .sheet-content { overflow-y: auto; padding: 0 20px 100px; scrollbar-width: none; }
        .sheet-content::-webkit-scrollbar { display: none; }
        
        .mod-img { width: 100%; aspect-ratio: 5/4; object-fit: cover; border-radius: 20px; background: var(--bg-main); margin-bottom: 20px; mix-blend-mode: multiply;}
        .mod-title { font-size: 22px; font-weight: 800; color: var(--text-main); margin-bottom: 4px; line-height: 1.2;}
        .mod-desc { font-size: 13px; color: var(--text-muted); line-height: 1.5; margin-bottom: 24px; font-weight: 500;}
        
        .opt-group { margin-bottom: 24px; }
        .opt-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .opt-title { font-size: 15px; font-weight: 800; color: var(--text-main); }
        .opt-req { font-size: 11px; font-weight: 700; background: var(--primary-light); color: var(--primary); padding: 4px 8px; border-radius: 6px; }
        
        /* Custom Radio & Checkbox rows */
        .opt-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
        .opt-row:last-child { border-bottom: none; }
        .opt-name { font-size: 14px; font-weight: 600; color: var(--text-main); display: flex; align-items: center; gap: 12px;}
        .opt-price { font-size: 13px; font-weight: 700; color: var(--text-muted); }
        
        /* Custom Radio */
        .custom-radio { width: 20px; height: 20px; border: 2px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        input[type="radio"]:checked + .custom-radio { border-color: var(--primary); }
        input[type="radio"]:checked + .custom-radio::after { content: ''; width: 10px; height: 10px; background: var(--primary); border-radius: 50%; }
        
        /* Custom Checkbox */
        .custom-check { width: 20px; height: 20px; border: 2px solid var(--border); border-radius: 6px; display: flex; align-items: center; justify-content: center; background: transparent; }
        input[type="checkbox"]:checked + .custom-check { background: var(--primary); border-color: var(--primary); }
        input[type="checkbox"]:checked + .custom-check svg { display: block; }
        .custom-check svg { width: 12px; height: 12px; stroke: white; stroke-width: 3; display: none; }

        .note-area { width: 100%; background: var(--bg-main); border: 1px solid var(--border); border-radius: 12px; padding: 16px; font-size: 13px; resize: none; height: 80px; font-weight: 500; }
        .note-area:focus { border-color: var(--primary); }

        /* BOTTOM ADD TO CART BAR */
        .mod-footer { position: absolute; bottom: 0; left: 0; right: 0; background: var(--surface); padding: 16px 20px 30px; border-top: 1px solid var(--border); display: flex; gap: 16px; align-items: center; }
        .qty-controls { display: flex; align-items: center; gap: 16px; background: var(--bg-main); border: 1px solid var(--border); padding: 6px; border-radius: 14px; }
        .qty-btn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; background: var(--surface); border-radius: 10px; font-weight: 800; font-size: 18px; box-shadow: var(--shadow-sm); cursor: pointer; color: var(--text-main);}
        .qty-btn:active { transform: scale(0.9); }
        .qty-val { font-size: 16px; font-weight: 800; width: 20px; text-align: center; }
        .btn-add-cart { flex: 1; background: var(--primary); color: white; font-weight: 800; font-size: 16px; padding: 16px; border-radius: 14px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 8px 24px rgba(234,88,12,0.3); transition: 0.2s;}
        .btn-add-cart:active { transform: scale(0.98); }

        /* FLOATING CART PILL */
        .floating-cart-pill { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(150px); background: var(--text-main); color: white; padding: 16px 20px; border-radius: 50px; display: flex; justify-content: space-between; align-items: center; width: calc(100% - 32px); max-width: 400px; box-shadow: 0 10px 30px rgba(15,23,42,0.3); z-index: 90; cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1); }
        .floating-cart-pill.visible { transform: translateX(-50%) translateY(0); }
        .fc-badge { background: var(--primary); color: white; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; }
        .fc-total { font-weight: 800; font-size: 15px; }

        /* CART SLIDING DRAWER */
        .cart-drawer { position: fixed; top: 0; right: 0; bottom: 0; width: 100%; max-width: 420px; background: var(--bg-main); z-index: 101; transform: translateX(100%); transition: 0.4s cubic-bezier(0.25, 1, 0.5, 1); display: flex; flex-direction: column; box-shadow: -10px 0 40px rgba(0,0,0,0.1);}
        .cart-drawer.active { transform: translateX(0); }
        
        .cd-header { background: var(--surface); padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .cd-close { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; background: var(--bg-main); border-radius: 50%; cursor: pointer; }
        
        .cd-body { flex: 1; overflow-y: auto; padding: 20px; }
        
        .cart-item { background: var(--surface); border-radius: 16px; padding: 12px; margin-bottom: 12px; display: flex; gap: 12px; border: 1px solid var(--border); position: relative;}
        .ci-img { width: 60px; height: 60px; border-radius: 10px; background: var(--bg-main); object-fit: cover; }
        .ci-info { flex: 1; }
        .ci-name { font-size: 14px; font-weight: 800; margin-bottom: 2px; }
        .ci-meta { font-size: 11px; color: var(--text-muted); line-height: 1.4; margin-bottom: 6px; }
        .ci-price { font-size: 14px; font-weight: 800; color: var(--primary); }
        .ci-remove { position: absolute; top: 12px; right: 12px; color: var(--danger); cursor: pointer; padding: 4px; background: var(--danger-light); border-radius: 6px; }
        
        .checkout-card { background: var(--surface); border-radius: 16px; padding: 20px; border: 1px solid var(--border); margin-top: 20px; margin-bottom: 20px;}
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 12px; font-weight: 800; margin-bottom: 6px; color: var(--text-main); }
        .form-control { width: 100%; background: var(--bg-main); border: 1px solid var(--border); padding: 14px; border-radius: 12px; font-size: 13px; font-weight: 500; color: var(--text-main); transition: 0.2s; }
        .form-control:focus { border-color: var(--primary); background: var(--surface); }
        
        .cd-footer { background: var(--surface); padding: 20px; border-top: 1px solid var(--border); }
        .summary-row { display: flex; justify-content: space-between; font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; }
        .summary-row.total { font-size: 18px; font-weight: 800; color: var(--text-main); margin-top: 12px; padding-top: 12px; border-top: 1px dashed var(--border); margin-bottom: 16px;}
        
        .btn-checkout { width: 100%; background: #25D366; color: white; font-weight: 800; font-size: 16px; padding: 16px; border-radius: 14px; display: flex; justify-content: center; align-items: center; gap: 10px; box-shadow: 0 8px 24px rgba(37, 211, 102, 0.3); transition: 0.2s;}
        .btn-checkout:active { transform: scale(0.98); }
        .btn-checkout:disabled { opacity: 0.6; cursor: not-allowed; }
        
        /* TOAST */
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: var(--text-main); color: white; padding: 12px 24px; border-radius: 50px; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; box-shadow: var(--shadow-lg); z-index: 1100; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <div id="announcementBanner"></div>

    <div class="container">
        <header class="header">
            <div class="brand">lasco<span>.</span></div>
            <div style="display:flex; align-items:center; gap:6px; background:var(--surface); border:1px solid var(--border); padding:6px 12px; border-radius:50px; font-size:12px; font-weight:700; box-shadow:var(--shadow-sm);">
                <svg viewBox="0 0 24 24" style="width:14px; color:var(--primary);"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                Marrakech
            </div>
        </header>

        <div id="storeClosedBanner">We are currently closed. Check back later!</div>

        <div class="type-toggle">
            <div class="type-bg" id="typeBg"></div>
            <div class="type-btn active" id="btnResto" onclick="setStoreMode('Resto')">
                <svg viewBox="0 0 24 24"><path d="M17.66 11.2C17.43 10.9 17.15 10.64 16.89 10.38C16.22 9.78 15.46 9.35 14.82 8.72C13.33 7.26 13.07 4.8 14.56 3.11C14.72 2.93 14.57 2.66 14.33 2.7C13.25 2.89 12.06 3.46 11.23 4.29C9.17 6.36 9.07 9.87 10.73 12.06C10.87 12.24 10.64 12.47 10.45 12.33C9.4 11.59 8.87 10.23 9.04 8.93C9.07 8.68 8.77 8.52 8.6 8.7C7.45 9.84 6.75 11.55 7.03 13.33C7.4 15.65 9.02 17.5 11.24 18.23C13.56 18.99 16.27 18.35 17.84 16.39C19.11 14.81 18.9 12.63 17.66 11.2Z"></path></svg>
                Resto
            </div>
            <div class="type-btn" id="btnGrocery" onclick="setStoreMode('Grocery')">
                <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                Grocery
            </div>
        </div>

        <div class="search-box">
            <svg class="search-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <input type="text" id="searchInput" class="search-input" placeholder="Search for food, drinks..." oninput="renderStorefront()">
        </div>

        <div id="storeContent">
            <div style="text-align:center; padding: 40px; color:var(--text-muted); font-weight:600;">Loading menu...</div>
        </div>
    </div>

    <div class="floating-cart-pill" id="cartPill" onclick="openCart()">
        <div style="display:flex; align-items:center; gap:12px;">
            <div class="fc-badge" id="cartBadge">0</div>
            <span style="font-weight:700; font-size:14px;">View your cart</span>
        </div>
        <div class="fc-total" id="cartPillTotal">0.00 DH</div>
    </div>

    <div class="overlay" id="productOverlay" onclick="if(event.target===this) closeProductModal()"></div>
    <div class="sheet" id="productSheet">
        <div class="sheet-handle"></div>
        <div class="sheet-content" id="modContent">
            </div>
        <div class="mod-footer">
            <div class="qty-controls">
                <div class="qty-btn" onclick="adjustModQty(-1)">-</div>
                <div class="qty-val" id="modQty">1</div>
                <div class="qty-btn" onclick="adjustModQty(1)">+</div>
            </div>
            <div class="btn-add-cart" id="modAddBtn" onclick="addToCart()">
                <span>Add to order</span>
                <span id="modTotal">0.00 DH</span>
            </div>
        </div>
    </div>

    <div class="overlay" id="cartOverlay" onclick="if(event.target===this) closeCart()"></div>
    <div class="cart-drawer" id="cartDrawer">
        <div class="cd-header">
            <h2 style="font-size: 20px; font-weight:800;">Your Order</h2>
            <div class="cd-close" onclick="closeCart()"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></div>
        </div>
        
        <div class="cd-body" id="cartBody">
            <div style="text-align:center; padding:40px 20px; color:var(--text-muted); font-weight:600;">Your cart is empty.</div>
        </div>

        <div style="padding: 0 20px;" id="checkoutFormArea">
            <div class="checkout-card">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="custName" class="form-control" placeholder="E.g. Hamza Derai">
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="custPhone" class="form-control" placeholder="06 XX XX XX XX">
                </div>
                <div class="form-group" style="margin-bottom:0;">
                    <label>Delivery Zone</label>
                    <select id="custZone" class="form-control" onchange="calculateCartTotal()">
                        <option value="">Select your area...</option>
                        </select>
                </div>
            </div>
        </div>

        <div class="cd-footer">
            <div class="summary-row"><span>Subtotal</span><span id="cartSubtotal">0.00 DH</span></div>
            <div class="summary-row"><span>Delivery Fee</span><span id="cartFee">0.00 DH</span></div>
            <div class="summary-row total"><span>Total</span><span id="cartTotal">0.00 DH</span></div>
            
            <button class="btn-checkout" id="btnCheckout" onclick="processCheckout()">
                <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.405-.883-.733-1.48-1.638-1.653-1.935-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
                Order via WhatsApp
            </button>
        </div>
    </div>

    <div class="toast" id="toastBox">
        <svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg><span id="toastMsg">Action successful</span>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyAaaR52bvyQfkxmZL16lcg4Bd4M76OtbI4",
          authDomain: "lesgo-cd7f9.firebaseapp.com",
          projectId: "lesgo-cd7f9",
          storageBucket: "lesgo-cd7f9.firebasestorage.app",
          messagingSenderId: "618932234525",
          appId: "1:618932234525:web:8eb0b934b1bfd1060059f4"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allProducts = [], allZones = [], cart = [];
        let currentMode = 'Resto';
        let storeIsOnline = true;
        let activeProduct = null;
        let activeQty = 1;
        let activePrice = 0;

        const safeNum = (val) => isNaN(parseFloat(val)) ? 0 : parseFloat(val);
        const formatPrice = (num) => { const p = Number(num); return p % 1 === 0 ? p.toString() : p.toFixed(2); };

        // ---------------- DYNAMIC ZONES ----------------
        onSnapshot(collection(db, "zones"), snap => {
            allZones = snap.docs.map(d => ({id: d.id, ...d.data()}));
            // Sort alphabetically
            allZones.sort((a,b) => a.name.localeCompare(b.name));
            
            const selectEl = document.getElementById('custZone');
            const currentSelection = selectEl.value;
            
            let html = `<option value="">Select your area...</option>`;
            allZones.forEach(z => {
                html += `<option value="${z.id}" data-fee="${z.fee}">${z.name} (${formatPrice(z.fee)} DH)</option>`;
            });
            selectEl.innerHTML = html;
            
            if(currentSelection && allZones.find(z => z.id === currentSelection)) {
                selectEl.value = currentSelection;
            }
            calculateCartTotal();
        });

        // ---------------- ANNOUNCEMENT BANNER ----------------
        onSnapshot(doc(db, "settings", "announcement"), snap => {
            const banner = document.getElementById('announcementBanner');
            if(snap.exists() && snap.data().isVisible && snap.data().text) {
                banner.innerText = snap.data().text;
                banner.style.display = 'block';
            } else {
                banner.style.display = 'none';
            }
        });

        // ---------------- STORE STATUS ----------------
        onSnapshot(doc(db, "settings", "store_status"), snap => {
            if (snap.exists()) { storeIsOnline = snap.data().isOnline === true; } 
            else { storeIsOnline = false; }
            
            const banner = document.getElementById('storeClosedBanner');
            const btnCheckout = document.getElementById('btnCheckout');
            if(storeIsOnline) {
                banner.style.display = 'none';
                calculateCartTotal(); // Re-evaluates checkout button
            } else {
                banner.style.display = 'block';
                btnCheckout.disabled = true;
                btnCheckout.innerHTML = "Store Closed";
            }
        });

        // ---------------- CATALOG LOGIC ----------------
        onSnapshot(collection(db, "products"), snap => {
            allProducts = snap.docs.map(d => ({id: d.id, ...d.data()}));
            renderStorefront();
        });

        window.setStoreMode = (mode) => {
            currentMode = mode;
            document.getElementById('btnResto').classList.remove('active');
            document.getElementById('btnGrocery').classList.remove('active');
            document.getElementById(`btn${mode}`).classList.add('active');
            
            const bg = document.getElementById('typeBg');
            if(mode === 'Resto') { 
                bg.style.transform = 'translateX(0)'; 
                bg.style.background = 'var(--primary)';
                bg.style.boxShadow = '0 4px 12px rgba(234,88,12,0.3)';
            } else { 
                bg.style.transform = 'translateX(100%)'; 
                bg.style.background = 'var(--accent)';
                bg.style.boxShadow = '0 4px 12px rgba(22,163,74,0.3)';
            }
            
            document.documentElement.style.setProperty('--primary', mode === 'Resto' ? '#EA580C' : '#16A34A');
            document.documentElement.style.setProperty('--primary-light', mode === 'Resto' ? '#FFEDD5' : '#DCFCE7');

            document.getElementById('searchInput').value = '';
            renderStorefront();
        };

        window.renderStorefront = () => {
            const container = document.getElementById('storeContent');
            const searchQuery = document.getElementById('searchInput').value.toLowerCase().trim();

            let visibleProducts = allProducts.filter(p => p.productType === currentMode && p.isAvailable !== false);

            if (searchQuery) {
                visibleProducts = visibleProducts.filter(p => p.name.toLowerCase().includes(searchQuery) || (p.category||'').toLowerCase().includes(searchQuery));
            }

            if(visibleProducts.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding: 60px 20px; color:var(--text-muted);">
                    <svg viewBox="0 0 24 24" style="width:40px; height:40px; margin-bottom:12px; opacity:0.5;"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <p style="font-weight:600;">No items found.</p>
                </div>`;
                return;
            }

            // Group by category
            const grouped = {};
            visibleProducts.forEach(p => {
                const cat = p.category || "Uncategorized";
                if(!grouped[cat]) grouped[cat] = [];
                grouped[cat].push(p);
            });

            // TIME-BASED SORTING (Breakfast Push)
            let catKeys = Object.keys(grouped).sort();
            const hour = new Date().getHours();
            // If it's between 6:00 AM and 11:30 AM (11.5)
            if (hour >= 6 && hour < 11.5) {
                const breakfastCats = catKeys.filter(c => c.toLowerCase().includes('break') || c.toLowerCase().includes('petit'));
                const otherCats = catKeys.filter(c => !c.toLowerCase().includes('break') && !c.toLowerCase().includes('petit'));
                catKeys = [...breakfastCats, ...otherCats];
            }

            let html = '';
            catKeys.forEach(cat => {
                html += `
                <div class="category-section">
                    <h2 class="cat-title">${cat}</h2>
                    <div class="product-grid">
                        ${grouped[cat].map(p => generateProductCard(p)).join('')}
                    </div>
                </div>`;
            });

            container.innerHTML = html;
        };

        function generateProductCard(p) {
            const hasPromo = p.promoPrice !== null && p.promoPrice !== undefined;
            const displayPrice = hasPromo ? p.promoPrice : p.sellPrice;
            const oldPriceHtml = hasPromo ? `<div class="p-old-price">${formatPrice(p.sellPrice)} DH</div>` : '';
            
            const imgTag = p.imageUrl ? `<img src="${p.imageUrl}">` : `<span style="font-size:24px; font-weight:800; color:var(--text-muted); opacity:0.3;">${p.name.charAt(0)}</span>`;
            
            return `
            <div class="product-card" onclick="openProductModal('${p.id}')">
                <div class="p-img-wrap">${imgTag}</div>
                <div class="p-name">${p.name}</div>
                <div class="p-desc">${p.subtitle || p.category}</div>
                <div class="p-bottom">
                    <div class="p-price-box">
                        ${oldPriceHtml}
                        <div class="p-price">${formatPrice(displayPrice)} DH</div>
                    </div>
                    <div class="add-btn"><svg viewBox="0 0 24 24" style="width:16px;"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg></div>
                </div>
            </div>`;
        }

        // ---------------- PRODUCT MODAL LOGIC ----------------
        window.openProductModal = (id) => {
            activeProduct = allProducts.find(x => x.id === id);
            if(!activeProduct) return;
            
            activeQty = 1;
            document.getElementById('modQty').innerText = activeQty;

            let html = '';
            const imgTag = activeProduct.imageUrl ? `<img src="${activeProduct.imageUrl}" class="mod-img">` : '';
            html += imgTag;
            html += `<h2 class="mod-title">${activeProduct.name}</h2>`;
            html += `<p class="mod-desc">${activeProduct.description || activeProduct.subtitle || ''}</p>`;

            // RADIO BUTTONS: SIZES (Single Choice)
            if(activeProduct.sizes && activeProduct.sizes.length > 0) {
                html += `<div class="opt-group">
                    <div class="opt-header">
                        <div class="opt-title">Choose Size</div>
                        <div class="opt-req">Required</div>
                    </div>`;
                activeProduct.sizes.forEach((s, idx) => {
                    const isChecked = idx === 0 ? 'checked' : '';
                    html += `
                    <label class="opt-row">
                        <div class="opt-name">
                            <input type="radio" name="modSize" value="${s.name}" data-price="${s.sellPrice}" style="display:none;" onchange="calcModPrice()" ${isChecked}>
                            <div class="custom-radio"></div>
                            ${s.name}
                        </div>
                        <div class="opt-price">${formatPrice(s.sellPrice)} DH</div>
                    </label>`;
                });
                html += `</div>`;
            }

            // CHECKBOXES: EXTRAS (Multiple Choice)
            if(activeProduct.extras && activeProduct.extras.length > 0) {
                html += `<div class="opt-group">
                    <div class="opt-header">
                        <div class="opt-title">Extras & Add-ons</div>
                        <div style="font-size:11px; color:var(--text-muted); font-weight:600;">Optional</div>
                    </div>`;
                activeProduct.extras.forEach(e => {
                    html += `
                    <label class="opt-row">
                        <div class="opt-name">
                            <input type="checkbox" class="modExtra" value="${e.name}" data-price="${e.price}" style="display:none;" onchange="calcModPrice()">
                            <div class="custom-check"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg></div>
                            ${e.name}
                        </div>
                        <div class="opt-price">+${formatPrice(e.price)} DH</div>
                    </label>`;
                });
                html += `</div>`;
            }

            // RADIO BUTTONS: SAUCES (Single Choice)
            if(activeProduct.sauces && activeProduct.sauces.length > 0) {
                html += `<div class="opt-group">
                    <div class="opt-header">
                        <div class="opt-title">Select Sauce</div>
                        <div class="opt-req">Required</div>
                    </div>`;
                activeProduct.sauces.forEach((s, idx) => {
                    const isChecked = idx === 0 ? 'checked' : '';
                    html += `
                    <label class="opt-row">
                        <div class="opt-name">
                            <input type="radio" name="modSauce" value="${s}" style="display:none;" ${isChecked}>
                            <div class="custom-radio"></div>
                            ${s}
                        </div>
                        <div class="opt-price">Included</div>
                    </label>`;
                });
                html += `</div>`;
            }

            // RADIO BUTTONS: DRINKS (Single Choice)
            if(activeProduct.drinks && activeProduct.drinks.length > 0) {
                html += `<div class="opt-group">
                    <div class="opt-header">
                        <div class="opt-title">Select Drink</div>
                        <div class="opt-req">Required</div>
                    </div>`;
                activeProduct.drinks.forEach((d, idx) => {
                    const isChecked = idx === 0 ? 'checked' : '';
                    html += `
                    <label class="opt-row">
                        <div class="opt-name">
                            <input type="radio" name="modDrink" value="${d}" style="display:none;" ${isChecked}>
                            <div class="custom-radio"></div>
                            ${d}
                        </div>
                        <div class="opt-price">Included</div>
                    </label>`;
                });
                html += `</div>`;
            }

            // RADIO BUTTONS: CUSTOM OPTIONS (Single Choice)
            if(activeProduct.customOptions && activeProduct.customOptions.length > 0) {
                html += `<div class="opt-group">
                    <div class="opt-header">
                        <div class="opt-title">Select Option</div>
                        <div class="opt-req">Required</div>
                    </div>`;
                activeProduct.customOptions.forEach((o, idx) => {
                    const isChecked = idx === 0 ? 'checked' : '';
                    html += `
                    <label class="opt-row">
                        <div class="opt-name">
                            <input type="radio" name="modOption" value="${o}" style="display:none;" ${isChecked}>
                            <div class="custom-radio"></div>
                            ${o}
                        </div>
                    </label>`;
                });
                html += `</div>`;
            }

            html += `
            <div class="opt-group" style="margin-bottom:0;">
                <div class="opt-title" style="margin-bottom:12px;">Special Instructions</div>
                <textarea id="modNote" class="note-area" placeholder="E.g. No onions, allergy to nuts..."></textarea>
            </div>`;

            document.getElementById('modContent').innerHTML = html;
            
            document.body.classList.add('no-scroll'); // Lock background scroll
            document.getElementById('productOverlay').classList.add('active');
            document.getElementById('productSheet').classList.add('active');
            calcModPrice();
        };

        window.closeProductModal = () => {
            document.getElementById('productOverlay').classList.remove('active');
            document.getElementById('productSheet').classList.remove('active');
            setTimeout(() => { document.body.classList.remove('no-scroll'); }, 300); // Unlock background scroll after animation
            activeProduct = null;
        };

        window.adjustModQty = (val) => {
            activeQty += val;
            if(activeQty < 1) activeQty = 1;
            if(activeQty > 20) activeQty = 20;
            document.getElementById('modQty').innerText = activeQty;
            calcModPrice();
        };

        window.calcModPrice = () => {
            if(!activeProduct) return;
            
            let basePrice = activeProduct.promoPrice !== null && activeProduct.promoPrice !== undefined ? activeProduct.promoPrice : activeProduct.sellPrice;
            
            const sizeRadio = document.querySelector('input[name="modSize"]:checked');
            if(sizeRadio) { basePrice = parseFloat(sizeRadio.getAttribute('data-price')); }

            let extrasTotal = 0;
            document.querySelectorAll('.modExtra:checked').forEach(el => {
                extrasTotal += parseFloat(el.getAttribute('data-price'));
            });

            activePrice = basePrice + extrasTotal;
            document.getElementById('modTotal').innerText = `${formatPrice(activePrice * activeQty)} DH`;
        };

        window.addToCart = () => {
            if(!activeProduct) return;

            let finalVariant = null;
            const sizeRadio = document.querySelector('input[name="modSize"]:checked');
            if(sizeRadio) { finalVariant = sizeRadio.value; }

            let finalExtras = [];
            document.querySelectorAll('.modExtra:checked').forEach(el => finalExtras.push(el.value));

            let finalSauces = [];
            const sauceRadio = document.querySelector('input[name="modSauce"]:checked');
            if(sauceRadio) { finalSauces.push(sauceRadio.value); }

            let finalDrinks = [];
            const drinkRadio = document.querySelector('input[name="modDrink"]:checked');
            if(drinkRadio) { finalDrinks.push(drinkRadio.value); }
            
            let finalOptions = [];
            const optRadio = document.querySelector('input[name="modOption"]:checked');
            if(optRadio) { finalOptions.push(optRadio.value); }

            const note = document.getElementById('modNote').value.trim();

            cart.push({
                product: activeProduct,
                qty: activeQty,
                unitPrice: activePrice,
                variantName: finalVariant,
                extras: finalExtras,
                sauces: finalSauces,
                drinks: finalDrinks,
                options: finalOptions,
                note: note
            });

            showToast("Added to cart!");
            closeProductModal();
            updateCartPill();
            renderCartDrawer();
        };

        // ---------------- CART LOGIC ----------------
        function updateCartPill() {
            const pill = document.getElementById('cartPill');
            if(cart.length === 0) {
                pill.classList.remove('visible');
                return;
            }
            
            let total = 0; let items = 0;
            cart.forEach(c => { total += (c.unitPrice * c.qty); items += c.qty; });
            
            document.getElementById('cartBadge').innerText = items;
            document.getElementById('cartPillTotal').innerText = `${formatPrice(total)} DH`;
            pill.classList.add('visible');
        }

        window.openCart = () => {
            renderCartDrawer();
            document.body.classList.add('no-scroll');
            document.getElementById('cartOverlay').classList.add('active');
            document.getElementById('cartDrawer').classList.add('active');
        };

        window.closeCart = () => {
            document.getElementById('cartOverlay').classList.remove('active');
            document.getElementById('cartDrawer').classList.remove('active');
            setTimeout(() => { document.body.classList.remove('no-scroll'); }, 300);
        };

        window.removeFromCart = (index) => {
            cart.splice(index, 1);
            updateCartPill();
            renderCartDrawer();
            if(cart.length === 0) closeCart();
        };

        function renderCartDrawer() {
            const body = document.getElementById('cartBody');
            
            if(cart.length === 0) {
                body.innerHTML = `<div style="text-align:center; padding:60px 20px; color:var(--text-muted);">
                    <svg viewBox="0 0 24 24" style="width:48px; height:48px; opacity:0.3; margin-bottom:16px;"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
                    <p style="font-weight:600;">Your cart is empty.</p>
                </div>`;
                document.getElementById('checkoutFormArea').style.display = 'none';
                calculateCartTotal();
                return;
            }

            document.getElementById('checkoutFormArea').style.display = 'block';

            body.innerHTML = cart.map((c, i) => {
                const img = c.product.imageUrl ? `<img src="${c.product.imageUrl}" class="ci-img">` : `<div class="ci-img"></div>`;
                
                let meta = [];
                if(c.variantName) meta.push(c.variantName);
                if(c.extras.length > 0) meta.push(`+ ${c.extras.join(', ')}`);
                if(c.sauces.length > 0) meta.push(`Sauce: ${c.sauces.join(', ')}`);
                if(c.drinks.length > 0) meta.push(`Drink: ${c.drinks.join(', ')}`);
                if(c.options.length > 0) meta.push(`Opt: ${c.options.join(', ')}`);

                const metaHtml = meta.length > 0 ? `<div class="ci-meta">${meta.join(' • ')}</div>` : '';

                return `
                <div class="cart-item">
                    ${img}
                    <div class="ci-info">
                        <div class="ci-name">${c.qty}x ${c.product.name}</div>
                        ${metaHtml}
                        <div class="ci-price">${formatPrice(c.unitPrice * c.qty)} DH</div>
                    </div>
                    <div class="ci-remove" onclick="removeFromCart(${i})">
                        <svg viewBox="0 0 24 24" style="width:16px;"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                    </div>
                </div>`;
            }).join('');

            calculateCartTotal();
        }

        window.calculateCartTotal = () => {
            let sub = 0;
            cart.forEach(c => sub += (c.unitPrice * c.qty));
            
            let deliveryFee = 0;
            const zoneSelect = document.getElementById('custZone');
            if (zoneSelect && zoneSelect.options[zoneSelect.selectedIndex]) {
                const feeAttr = zoneSelect.options[zoneSelect.selectedIndex].getAttribute('data-fee');
                if(feeAttr) deliveryFee = parseFloat(feeAttr);
            }

            const total = sub + deliveryFee;

            document.getElementById('cartSubtotal').innerText = `${formatPrice(sub)} DH`;
            document.getElementById('cartFee').innerText = `${formatPrice(deliveryFee)} DH`;
            document.getElementById('cartTotal').innerText = `${formatPrice(total)} DH`;

            const btn = document.getElementById('btnCheckout');
            if(!storeIsOnline) {
                btn.disabled = true;
                btn.innerHTML = "Store is Closed";
            } else if(cart.length === 0) {
                btn.disabled = true;
                btn.innerHTML = "Cart Empty";
            } else if (!zoneSelect.value) {
                btn.disabled = true;
                btn.innerHTML = "Select Delivery Zone";
            } else {
                btn.disabled = false;
                btn.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor" stroke="none" style="width:20px;"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.405-.883-.733-1.48-1.638-1.653-1.935-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg> Order via WhatsApp`;
            }
        };

        window.processCheckout = async () => {
            const name = document.getElementById('custName').value.trim();
            const phone = document.getElementById('custPhone').value.trim();
            const zoneSelect = document.getElementById('custZone');
            const zoneName = zoneSelect.options[zoneSelect.selectedIndex].text.split(' (')[0];
            const zoneFee = parseFloat(zoneSelect.options[zoneSelect.selectedIndex].getAttribute('data-fee'));

            if(!name || !phone || !zoneSelect.value) {
                showToast("Please fill all details.");
                return;
            }

            const btn = document.getElementById('btnCheckout');
            btn.innerHTML = "Processing..."; btn.disabled = true;

            let sub = 0; let totalItems = 0;
            cart.forEach(c => { sub += (c.unitPrice * c.qty); totalItems += c.qty; });
            const total = sub + zoneFee;

            const orderData = {
                customerName: name,
                customerPhone: phone,
                neighborhood: zoneName,
                cart: cart,
                totalPrice: total,
                deliveryFee: zoneFee,
                totalItems: totalItems,
                status: 'Pending',
                driverEmail: "",
                timestamp: new Date().toISOString()
            };

            try {
                const docRef = await addDoc(collection(db, "orders"), orderData);
                const orderId = docRef.id.substring(0,6).toUpperCase();
                
                // WhatsApp Formatting
                let waText = `*NOUVELLE COMMANDE LASCO* 🛵\n*ID:* #${orderId}\n*Nom:* ${name}\n*Zone:* ${zoneName}\n\n*Détails:*\n`;
                
                cart.forEach(c => {
                    waText += `▫️ ${c.qty}x ${c.product.name}\n`;
                    if(c.variantName) waText += `   Taille: ${c.variantName}\n`;
                    if(c.extras.length > 0) waText += `   + ${c.extras.join(', ')}\n`;
                    if(c.sauces.length > 0) waText += `   Sauce: ${c.sauces.join(', ')}\n`;
                    if(c.drinks.length > 0) waText += `   Boisson: ${c.drinks.join(', ')}\n`;
                    if(c.options.length > 0) waText += `   Option: ${c.options.join(', ')}\n`;
                    if(c.note) waText += `   Note: ${c.note}\n`;
                });

                waText += `\n*Sous-total:* ${sub} DH\n*Livraison:* ${zoneFee} DH\n*TOTAL:* ${total} DH`;

                // ADD YOUR STORE PHONE NUMBER HERE (Format: 212600000000)
                const storePhone = "212600000000"; 
                const waUrl = `https://wa.me/${storePhone}?text=${encodeURIComponent(waText)}`;
                
                cart = [];
                updateCartPill();
                closeCart();
                showToast("Order placed successfully!");
                
                setTimeout(() => {
                    window.location.href = waUrl;
                }, 1000);

            } catch (e) {
                console.error(e);
                showToast("Error placing order. Please try again.");
                btn.innerHTML = "Order via WhatsApp"; btn.disabled = false;
            }
        };

        function showToast(msg) { 
            const t = document.getElementById('toastBox'); 
            document.getElementById('toastMsg').innerText = msg; 
            t.classList.add('show'); 
            setTimeout(() => t.classList.remove('show'), 3000); 
        }
    </script>
</body>
</html>
