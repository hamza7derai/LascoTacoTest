<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LASCOTACO | App</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3075/3075977.png"> 
    <meta name="theme-color" content="#ffffff">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --resto: #E85A24; --epi: #10B981; --bg: #FDFBFA; }
        body { background-color: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .app-container { max-width: 500px; margin: 0 auto; width: 100%; position: relative; background: #FFFFFF; min-height: 100vh; box-shadow: 0 0 60px rgba(0,0,0,0.03); overflow-x: hidden; }
        body.modal-open { overflow: hidden; }

        .theme-resto { --brand: var(--resto); --brand-soft: rgba(232, 90, 36, 0.1); --brand-medium: rgba(232, 90, 36, 0.15); }
        .theme-epi { --brand: var(--epi); --brand-soft: rgba(16, 185, 129, 0.1); --brand-medium: rgba(16, 185, 129, 0.15); }

        .premium-ease { transition: all 0.3s cubic-bezier(0.2, 0.9, 0.3, 1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* LOADING SKELETON */
        @keyframes shimmer { 0% { background-position: -1000px 0; } 100% { background-position: 1000px 0; } }
        .skeleton { background: linear-gradient(to right, #F4F5F7 8%, #E9ECEF 18%, #F4F5F7 33%); background-size: 1000px 100%; animation: shimmer 2s infinite linear; border-radius: 12px; }

        /* CATEGORY SCROLL & ANIMATION */
        .category-scroll { display: flex; gap: 12px; overflow-x: auto; scroll-snap-type: x mandatory; padding: 8px 20px 20px 20px; scroll-padding-left: 20px; scroll-behavior: smooth; }
        .category-pill { position: relative; flex: 0 0 auto; scroll-snap-align: start; transition: background-color 0.2s ease, color 0.2s ease, box-shadow 0.2s ease; border: 2px solid transparent; }
        
        @keyframes tabBounce {
            0% { transform: scale(1); }
            40% { transform: scale(0.92); }
            70% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }
        .tab-bounce { animation: tabBounce 0.25s cubic-bezier(0.2, 0.9, 0.3, 1); }
        
        /* PRODUCT CARDS */
        .product-card { background: white; border-radius: 20px; transition: transform 0.2s ease, box-shadow 0.2s ease; animation: fadeIn 0.4s ease-out forwards; border: 1px solid transparent; box-shadow: 0 4px 16px rgba(0,0,0,0.03); }
        .product-card:active { transform: translateY(2px) scale(0.98); box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .product-img-wrap { overflow: hidden; border-radius: 16px 16px 6px 6px; height: 160px; background: #F8F9FA; width: 100%; position: relative; }
        .product-img-wrap img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; mix-blend-mode: multiply; }

        /* MODALS */
        #bottom-sheet-root, #cart-drawer-root { position: fixed; inset: 0; z-index: 2000; pointer-events: none; display: flex; align-items: flex-end; justify-content: center; }
        #bs-overlay, #cart-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); opacity: 0; transition: opacity 0.4s ease; pointer-events: none; }
        
        #bs-panel { width: 100%; max-width: 500px; background: #FDFBFA; border-radius: 32px 32px 0 0; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.3, 1); pointer-events: auto; padding-bottom: env(safe-area-inset-bottom); max-height: 90vh; display: flex; flex-direction: column; box-shadow: 0 -20px 40px rgba(0,0,0,0.1); }
        .bs-open #bs-overlay { opacity: 1; pointer-events: auto; }
        .bs-open #bs-panel { transform: translateY(0); }

        #cart-panel { width: 100%; max-width: 500px; background: #F8F9FA; border-radius: 32px 32px 0 0; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.3, 1); pointer-events: auto; display: flex; flex-direction: column; max-height: 92vh; box-shadow: 0 -20px 40px rgba(0,0,0,0.1); }
        .drawer-open #cart-overlay { opacity: 1; pointer-events: auto; }
        .drawer-open #cart-panel { transform: translateY(0); }

        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; pointer-events: none; display: flex; flex-direction: column; gap: 8px; width: 90%; max-width: 400px; }
    </style>
</head>
<body class="drawer-closed theme-resto" id="body-wrap">

    <div id="toast-container"></div>

    <div class="app-container" id="app-root">
        
        <header class="sticky top-0 z-50 bg-white/95 backdrop-blur-xl px-5 py-4 flex justify-between items-center border-b border-gray-50/50">
            <h1 class="text-[28px] font-black tracking-tighter italic" style="color: var(--brand)">LASCOTACO</h1>
            <button onclick="toggleCart(true)" class="relative bg-[#1A1A1A] text-white px-4 py-3 rounded-[16px] font-bold text-[14px] flex items-center gap-2 active:scale-95 transition-transform duration-200 shadow-md hover:shadow-lg">
                <i data-lucide="shopping-bag" class="w-4 h-4" style="color: var(--brand)"></i>
                <span id="nav-total">0 DH</span>
                <span id="nav-badge" class="absolute -top-2 -right-2 text-white text-[11px] font-black w-6 h-6 flex items-center justify-center rounded-full border-2 border-[#1A1A1A] shadow-sm scale-0 premium-ease" style="background-color: var(--brand)">0</span>
            </button>
        </header>

        <div class="px-5 pt-3 pb-3 bg-white/95 backdrop-blur-xl sticky top-[76px] z-40">
            <div class="relative flex items-center group">
                <i data-lucide="search" class="absolute left-4 w-5 h-5 text-gray-400 group-focus-within:text-[var(--brand)] transition-colors"></i>
                <input type="text" id="search-input" placeholder="Rechercher un plat, une boisson..." class="w-full bg-[#F4F5F7] border-2 border-transparent rounded-[20px] py-4 pl-12 pr-4 text-[15px] font-semibold focus:outline-none focus:bg-white focus:border-[var(--brand)] transition-all">
            </div>
        </div>

        <div class="px-5 pb-3 bg-white sticky top-[154px] z-30">
            <div class="bg-[#F4F5F7] p-1.5 rounded-[20px] flex relative w-full items-center shadow-inner">
                <div id="store-toggle-bg" class="absolute left-1.5 top-1.5 bottom-1.5 w-[calc(50%-6px)] rounded-[16px] shadow-sm bg-[var(--brand)] transition-transform duration-300 ease-out"></div>
                <button onclick="setStore('Restaurant')" id="btn-resto" class="flex-1 relative z-10 py-3 rounded-[16px] text-[15px] font-extrabold flex items-center justify-center gap-2 text-white transition-colors duration-300 active:scale-95">
                    <i data-lucide="utensils" class="w-4 h-4"></i> Resto
                </button>
                <button onclick="setStore('Épicerie')" id="btn-epi" class="flex-1 relative z-10 py-3 rounded-[16px] text-[15px] font-extrabold flex items-center justify-center gap-2 text-gray-500 transition-colors duration-300 active:scale-95">
                    <i data-lucide="shopping-basket" class="w-4 h-4"></i> Épicerie
                </button>
            </div>
        </div>

        <div id="sub-nav-wrapper" class="bg-white relative z-20">
            <div class="absolute right-0 top-0 bottom-0 w-8 bg-gradient-to-l from-white to-transparent z-10 pointer-events-none"></div>
            <div id="sub-nav" class="category-scroll no-scrollbar"></div>
            <div class="h-[1px] w-full bg-gray-50 absolute bottom-0"></div>
        </div>

        <main id="product-grid" class="p-5 grid grid-cols-2 gap-4 pb-40"></main>

        <div id="checkout-bar" class="fixed bottom-6 left-5 right-5 max-w-[460px] mx-auto z-50 translate-y-[150%] premium-ease">
            <button onclick="toggleCart(true)" class="w-full text-white p-3 rounded-[24px] flex justify-between items-center shadow-[0_12px_30px_var(--brand-medium)] active:scale-95 premium-ease relative overflow-hidden bg-[var(--brand)]">
                <div class="flex items-center gap-3 pl-1 z-10">
                    <div class="relative bg-white/20 backdrop-blur-md w-[48px] h-[48px] rounded-[18px] flex items-center justify-center">
                        <i data-lucide="shopping-bag" class="w-[24px] h-[24px] text-white"></i>
                        <span id="floating-badge" class="absolute -top-1.5 -right-1.5 text-[var(--brand)] text-[11px] w-6 h-6 rounded-full flex justify-center items-center font-black bg-white shadow-md">0</span>
                    </div>
                    <div class="text-left">
                        <p id="item-count-text" class="text-[15px] font-black leading-tight">0 article</p>
                        <p class="text-[12px] font-semibold text-white/80 mt-0.5">Voir le panier</p>
                    </div>
                </div>
                <div class="font-black text-[20px] bg-white text-[var(--brand)] px-5 py-3.5 rounded-[18px] shadow-sm z-10 tracking-tight" id="final-price-bottom">
                    0 DH
                </div>
            </button>
        </div>
    </div>

    <div id="bottom-sheet-root">
        <div id="bs-overlay" onclick="closeSheet()"></div>
        <div id="bs-panel">
            
            <div class="p-6 bg-white flex justify-between items-start shrink-0 relative rounded-t-[32px] shadow-[0_4px_16px_rgba(0,0,0,0.02)] z-20">
                <div class="absolute top-2.5 left-1/2 -translate-x-1/2 w-12 h-1.5 bg-gray-200 rounded-full"></div>
                <div class="mt-3 pr-4 w-full">
                    <h3 id="bs-title" class="font-black text-[22px] text-gray-900 leading-tight tracking-tight">Produit</h3>
                    <p id="bs-description" class="text-[13px] text-gray-500 font-medium mt-2 leading-relaxed hidden"></p>
                    <p id="bs-price" class="font-black mt-3 text-[22px] text-gray-900">0 DH</p>
                </div>
                <button onclick="closeSheet()" class="p-2.5 bg-[#F4F5F7] rounded-full text-gray-500 hover:bg-gray-200 active:scale-90 transition-transform duration-200 mt-3 shrink-0"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            
            <div class="p-6 overflow-y-auto no-scrollbar flex-1 space-y-8 relative z-10" id="bs-content-scroll">
                
                <div id="bs-sizes" class="space-y-3 hidden">
                    <div class="flex items-center justify-between mb-1">
                        <h4 class="font-black text-[15px] text-gray-900">Choisissez une taille</h4>
                        <span class="bg-gray-100 text-gray-500 text-[10px] font-bold px-2 py-1 rounded-md uppercase tracking-wider">Requis</span>
                    </div>
                    <div id="size-options-container" class="space-y-2.5"></div>
                </div>

                <div id="bs-sauces" class="space-y-3 hidden">
                    <div class="flex items-center justify-between mb-1">
                        <h4 class="font-black text-[15px] text-gray-900">Choix de sauce</h4>
                        <span class="bg-[var(--brand-soft)] text-[var(--brand)] text-[10px] font-bold px-2 py-1 rounded-md uppercase tracking-wider">Requis</span>
                    </div>
                    <div id="sauce-options-container" class="space-y-2.5"></div>
                </div>

                <div id="bs-extras" class="space-y-3 hidden">
                    <div class="flex items-center justify-between mb-1">
                        <h4 class="font-black text-[15px] text-gray-900">Extras</h4>
                        <span class="text-gray-400 text-[11px] font-bold uppercase tracking-wider">Optionnel</span>
                    </div>
                    <div id="extras-options-container" class="space-y-2.5"></div>
                </div>
                
                <div id="bs-instructions" class="space-y-3 hidden pb-4">
                    <div class="flex items-center justify-between mb-1">
                        <h4 class="font-black text-[15px] text-gray-900">Instructions spéciales</h4>
                        <span class="text-gray-400 text-[11px] font-bold uppercase tracking-wider">Optionnel</span>
                    </div>
                    <textarea id="bs-notes" placeholder="Ex: Sans oignons, sauce à part..." class="w-full p-4 bg-white rounded-[20px] font-semibold text-[14px] text-gray-800 border-2 border-[#F4F5F7] outline-none resize-none h-28 transition-colors focus:border-[var(--brand)] shadow-sm"></textarea>
                </div>
            </div>

            <div class="p-5 bg-white shrink-0 border-t border-gray-100 shadow-[0_-15px_40px_rgba(0,0,0,0.04)] z-20">
                <button id="bs-add-btn" class="w-full text-white py-4.5 h-[60px] rounded-[20px] font-black text-[16px] active:scale-95 transition-all duration-200 flex items-center justify-center shadow-[0_8px_25px_var(--brand-medium)] bg-[var(--brand)]">
                    Ajouter au panier • <span id="bs-btn-price" class="ml-1">0 DH</span>
                </button>
            </div>
        </div>
    </div>

    <div id="cart-drawer-root" class="premium-ease">
        <div id="cart-overlay" onclick="toggleCart(false)" class="premium-ease"></div>
        <div id="cart-panel" class="premium-ease">
            
            <div class="p-6 flex justify-between items-start shrink-0 bg-white rounded-t-[32px] relative border-b border-gray-50 shadow-[0_4px_16px_rgba(0,0,0,0.02)] z-20">
                <div class="absolute top-2.5 left-1/2 -translate-x-1/2 w-12 h-1.5 bg-gray-200 rounded-full"></div>
                <div class="mt-2">
                    <h2 class="text-[24px] font-black tracking-tight text-gray-900">Mon Panier</h2>
                    <p class="text-[13px] font-semibold mt-1 flex items-center gap-1.5 text-[var(--brand)]">
                        <i data-lucide="clock" class="w-4 h-4"></i> <span id="cart-header-count">0 article</span> • Livraison ~ 30 min
                    </p>
                </div>
                <button onclick="toggleCart(false)" class="p-2.5 bg-[#F4F5F7] rounded-full text-gray-500 hover:bg-gray-200 active:scale-90 transition-transform mt-2"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            
            <div id="cart-items" class="flex-1 overflow-y-auto p-5 space-y-4 no-scrollbar bg-[#FDFBFA] z-10"></div>
            
            <div id="upsell-container" class="px-5 pb-5 shrink-0 bg-[#FDFBFA] hidden z-10">
                <p class="font-black text-[16px] text-gray-900 tracking-tight mb-3">À ne pas manquer ! 🥤</p>
                <div class="flex gap-3 overflow-x-auto no-scrollbar pb-2" id="upsell-list"></div>
            </div>

            <div class="p-6 bg-white shrink-0 rounded-t-[32px] shadow-[0_-20px_40px_rgba(0,0,0,0.06)] z-20">
                <div class="space-y-4">
                    <div class="flex justify-between items-center">
                        <span class="font-bold text-gray-500 text-[14px]">Sous-total</span>
                        <span id="drawer-subtotal" class="font-black text-gray-900 text-[15px]">0 DH</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="font-bold text-gray-500 text-[14px]">Frais de livraison</span>
                        <span class="font-black text-gray-900 text-[15px]">20 DH</span>
                    </div>
                    
                    <div class="border-t border-gray-100 pt-4 mt-2 flex justify-between items-end">
                        <div>
                            <span class="font-black text-gray-900 text-[20px]">Total</span>
                            <p class="text-[11px] font-bold text-gray-400 mt-0.5">Toutes taxes comprises</p>
                        </div>
                        <span id="drawer-total" class="text-[32px] font-black text-[var(--brand)] leading-none tracking-tight">0 DH</span>
                    </div>
                </div>
                
                <button onclick="sendToWhatsApp()" id="wa-btn" class="w-full bg-gradient-to-r from-[#25D366] to-[#1EBE57] text-white py-4.5 h-[60px] rounded-[20px] font-black text-[16px] flex justify-center items-center gap-2 mt-6 shadow-[0_8px_20px_rgba(37,211,102,0.25)] active:scale-[0.97] transition-all duration-200">
                    <i data-lucide="message-circle" class="w-5 h-5 fill-current"></i> Commander via WhatsApp
                </button>
            </div>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js').catch(()=>{}); }); }

        const firebaseConfig = { apiKey: "AIzaSyBebaGxqiNBvCqofveg1Fmztl7av3Mdoyg", authDomain: "lascotaco-67fe5.firebaseapp.com", projectId: "lascotaco-67fe5", storageBucket: "lascotaco-67fe5.firebasestorage.app", messagingSenderId: "865918381027", appId: "1:865918381027:web:abc6435df20894020c4ed6" };
        firebase.initializeApp(firebaseConfig); const db = firebase.firestore();

        let cart = JSON.parse(localStorage.getItem('lasco_cart_v2')) || []; 
        let activeStore = 'Restaurant'; let activeCat = '🔥 Top vente';
        let livraisonFee = 20;
        let globalProducts = []; 
        let currentItemForSheet = null;
        let lastTotal = 0; 

        // --- SKELETON LOADING UI ---
        function renderSkeletons() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = Array(6).fill().map(() => `
                <div class="product-card p-2.5 flex flex-col h-[270px] border-transparent shadow-sm">
                    <div class="skeleton w-full h-[150px] rounded-[16px] mb-3 shrink-0"></div>
                    <div class="skeleton w-3/4 h-4 rounded mb-2"></div>
                    <div class="skeleton w-1/2 h-4 rounded mt-auto"></div>
                    <div class="flex justify-between items-center mt-4">
                        <div class="skeleton w-1/3 h-5 rounded"></div>
                        <div class="skeleton w-[44px] h-[44px] rounded-full"></div>
                    </div>
                </div>
            `).join('');
        }

        renderSkeletons();

        function saveCart() { localStorage.setItem('lasco_cart_v2', JSON.stringify(cart)); }

        // FETCH PRODUCTS
        db.collection("products").get().then(snap => {
            snap.forEach(doc => {
                let data = doc.data();
                if (data.isActive === false) return; 
                if (!data.category) data.category = '🔥 Top vente'; 
                globalProducts.push(data);
            });
            renderUpsells(); loadProducts(); syncUI(); 
        });

        function showToast(message) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'bg-[#1A1A1A] text-white px-5 py-4 rounded-[18px] text-[14px] font-bold shadow-[0_10px_30px_rgba(0,0,0,0.15)] transition-all duration-400 translate-y-[-20px] opacity-0 flex items-center gap-3 z-[9999]';
            toast.innerHTML = `<i data-lucide="check-circle-2" class="w-5 h-5 text-[#25D366]"></i> <span>${message}</span>`;
            container.appendChild(toast); lucide.createIcons();
            requestAnimationFrame(() => { toast.classList.remove('translate-y-[-20px]', 'opacity-0'); });
            setTimeout(() => { toast.classList.add('translate-y-[-20px]', 'opacity-0'); setTimeout(() => toast.remove(), 400); }, 2500);
        }

        function setStore(type) { 
            activeStore = type; activeCat = '🔥 Top vente'; document.getElementById('search-input').value = '';
            
            const body = document.getElementById('body-wrap');
            const toggleBg = document.getElementById('store-toggle-bg');
            const btnResto = document.getElementById('btn-resto'); const btnEpi = document.getElementById('btn-epi');
            
            if(type === 'Restaurant') {
                body.className = "drawer-closed theme-resto";
                toggleBg.style.transform = 'translateX(0)';
                btnResto.classList.replace('text-gray-500', 'text-white'); btnEpi.classList.replace('text-white', 'text-gray-500');
            } else {
                body.className = "drawer-closed theme-epi";
                toggleBg.style.transform = 'translateX(100%)';
                btnEpi.classList.replace('text-gray-500', 'text-white'); btnResto.classList.replace('text-white', 'text-gray-500');
            }
            renderLabels(); loadProducts(); renderUpsells();
        }

        async function renderLabels() {
            const nav = document.getElementById('sub-nav');
            const cats = [{name: '🔥 Top vente'}];
            const snap = await db.collection("categories").where("type", "==", activeStore).get();
            snap.forEach(doc => cats.push(doc.data()));
            
            nav.innerHTML = cats.map((cat, idx) => {
                let isTop = cat.name === '🔥 Top vente';
                let displayName = isTop ? 'Top vente' : cat.name;
                let isActive = activeCat === cat.name;
                
                // SVG logic for Top Vente
                let iconClass = isActive ? 'text-white' : 'text-[#E85A24]';
                let iconHtml = isTop ? `<i data-lucide="flame" class="w-4 h-4 ${iconClass}"></i>` : '';

                return `
                <button id="btn-cat-${idx}" onclick="handleCatClick('${cat.name}', 'btn-cat-${idx}')" 
                    class="category-pill flex items-center gap-1.5 px-5 py-2.5 text-[14px] font-bold whitespace-nowrap rounded-[14px] transition-all duration-200 ${isActive ? 'bg-[var(--brand)] text-white shadow-[0_4px_16px_var(--brand-soft)] scale-100' : 'bg-[#F4F5F7] text-[#4A5568] hover:bg-gray-100'}">
                    ${iconHtml} ${displayName}
                </button>`;
            }).join('');
            lucide.createIcons();
        }

        function handleCatClick(catName, elementId) {
            const el = document.getElementById(elementId);
            if(el) {
                el.classList.add('tab-bounce');
                setTimeout(() => el.classList.remove('tab-bounce'), 250);
            }
            activeCat = catName; document.getElementById('search-input').value = '';
            renderLabels(); loadProducts();
            
            const nav = document.getElementById('sub-nav');
            const scrollTarget = document.getElementById(elementId).offsetLeft - 20;
            nav.scrollTo({ left: scrollTarget, behavior: 'smooth' });
        }

        document.getElementById('search-input').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            if(term.length > 0) {
                const filtered = globalProducts.filter(p => p.type === activeStore && p.name.toLowerCase().includes(term));
                renderProductGrid(filtered);
            } else { loadProducts(); }
        });

        function loadProducts() {
            let filtered = [];
            if (activeCat === '🔥 Top vente') { filtered = globalProducts.filter(p => p.type === activeStore && p.isTop === true); } 
            else { filtered = globalProducts.filter(p => p.type === activeStore && p.category === activeCat); }
            renderProductGrid(filtered);
        }

        function renderProductGrid(products) {
            const grid = document.getElementById('product-grid');
            if(products.length === 0) { grid.innerHTML = '<p class="col-span-2 text-center text-gray-400 py-12 font-bold text-[15px]">Aucun résultat trouvé 🌮</p>'; return; }
            
            grid.innerHTML = products.map((p) => `
                <div class="product-card cursor-pointer p-2 flex flex-col" onclick="openProductByName('${p.name.replace(/'/g, "\\'")}')">
                    <div class="product-img-wrap">
                        <img src="${p.image}" loading="lazy">
                        ${p.isTop ? `<span class="absolute top-2 left-2 text-[var(--brand)] bg-white text-[9px] font-black px-2 py-1 rounded-[6px] uppercase shadow-sm">Top</span>` : ''}
                    </div>
                    <div class="pt-3 px-1.5 flex flex-col flex-1 justify-between pb-1">
                        <h3 class="font-bold text-[14px] text-gray-900 leading-snug line-clamp-2">${p.name}</h3>
                        <div class="flex justify-between items-end mt-3">
                            <span class="font-black text-[16px] text-gray-900 mb-1">${p.hasSizes ? 'Dès ' : ''}${p.price} DH</span>
                            <button class="w-[44px] h-[44px] rounded-full flex items-center justify-center text-white shadow-[0_4px_12px_var(--brand-soft)] hover:brightness-95 active:scale-90 transition-transform duration-150 ease-out bg-[var(--brand)]" onclick="event.stopPropagation(); openProductByName('${p.name.replace(/'/g, "\\'")}', true);" id="add-btn-${p.name.replace(/\s+/g, '')}">
                                <i data-lucide="plus" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </div>
                </div>`).join('');
            lucide.createIcons();
        }

        // --- CALCULATION LOGIC FOR MODAL ---
        function calculateCurrentModalPrice() {
            if(!currentItemForSheet) return;
            let basePrice = currentItemForSheet.price;
            
            if(currentItemForSheet.hasSizes && currentItemForSheet.sizes && currentItemForSheet.sizes.length > 0) {
                const checkedSize = document.querySelector('input[name="size-choice"]:checked');
                if (checkedSize) basePrice = Number(checkedSize.value);
            }
            
            if(currentItemForSheet.hasExtras && currentItemForSheet.extras && currentItemForSheet.extras.length > 0) {
                const checkedExtras = document.querySelectorAll('input[name="extra-choice"]:checked');
                checkedExtras.forEach(cb => { basePrice += Number(cb.value); });
            }
            
            document.getElementById('bs-price').innerText = basePrice + ' DH';
            document.getElementById('bs-btn-price').innerText = basePrice + ' DH';
        }

        // --- DYNAMIC OPEN MODAL ---
        function openProductByName(productName, animateBtn = false) {
            const p = globalProducts.find(item => item.name === productName);
            if(!p) return;
            
            currentItemForSheet = p;
            document.getElementById('bs-content-scroll').scrollTo(0,0);
            
            document.getElementById('bs-title').innerText = p.name;
            const descEl = document.getElementById('bs-description');
            if(p.description && p.description.trim() !== "") {
                descEl.innerText = p.description; descEl.classList.remove('hidden');
            } else { descEl.classList.add('hidden'); }
            
            // SIZES
            const sizeDiv = document.getElementById('bs-sizes');
            const sizeContainer = document.getElementById('size-options-container');
            if(p.hasSizes && p.sizes && p.sizes.length > 0) {
                sizeContainer.innerHTML = p.sizes.map((s, idx) => `
                    <div class="relative active:scale-[0.98] transition-transform">
                        <input type="radio" name="size-choice" id="size-${idx}" value="${s.price}" data-name="${s.name}" class="peer hidden" ${idx === 0 ? 'checked' : ''} onchange="calculateCurrentModalPrice()">
                        <label for="size-${idx}" class="flex justify-between items-center p-4 rounded-[16px] border-2 border-[#F4F5F7] bg-white cursor-pointer transition-all peer-checked:border-[var(--brand)] peer-checked:bg-[var(--brand-soft)] shadow-sm">
                            <span class="font-bold text-gray-800 text-[15px]">${s.name}</span>
                            <div class="flex items-center gap-3">
                                <span class="font-black text-[15px] text-gray-800 peer-checked:text-[var(--brand)] transition-colors">${s.price} DH</span>
                                <i data-lucide="check-circle-2" class="w-5 h-5 text-[var(--brand)] opacity-0 peer-checked:opacity-100 transition-opacity"></i>
                            </div>
                        </label>
                    </div>
                `).join('');
                sizeDiv.classList.remove('hidden');
            } else { sizeDiv.classList.add('hidden'); }

            // EXTRAS
            const extrasDiv = document.getElementById('bs-extras');
            const extrasContainer = document.getElementById('extras-options-container');
            if(p.hasExtras && p.extras && p.extras.length > 0) {
                extrasContainer.innerHTML = p.extras.map((e, idx) => `
                    <div class="relative active:scale-[0.98] transition-transform">
                        <input type="checkbox" name="extra-choice" id="extra-${idx}" value="${e.price}" data-name="${e.name}" class="peer hidden" onchange="calculateCurrentModalPrice()">
                        <label for="extra-${idx}" class="flex justify-between items-center p-4 rounded-[16px] border-2 border-[#F4F5F7] bg-white cursor-pointer transition-all hover:border-gray-200 peer-checked:border-[var(--brand)] peer-checked:bg-[var(--brand-soft)] shadow-sm">
                            <span class="font-bold text-gray-800 text-[15px]">${e.name}</span>
                            <div class="flex items-center gap-3">
                                <span class="font-black text-[14px] text-gray-500 peer-checked:text-[var(--brand)] transition-colors">+${e.price} DH</span>
                                <div class="w-6 h-6 rounded-full bg-[#F4F5F7] peer-checked:bg-[var(--brand)] flex items-center justify-center transition-colors">
                                    <i data-lucide="plus" class="w-4 h-4 text-gray-400 peer-checked:hidden"></i>
                                    <i data-lucide="check" class="w-4 h-4 text-white hidden peer-checked:block"></i>
                                </div>
                            </div>
                        </label>
                    </div>
                `).join('');
                extrasDiv.classList.remove('hidden');
            } else { extrasDiv.classList.add('hidden'); }
            
            // SAUCES
            const sauceDiv = document.getElementById('bs-sauces');
            const sauceContainer = document.getElementById('sauce-options-container');
            if(p.requiresSauce && p.sauces && p.sauces.length > 0) {
                sauceContainer.innerHTML = p.sauces.map((s, idx) => `
                    <div class="relative active:scale-[0.98] transition-transform">
                        <input type="radio" name="sauce-choice" id="sauce-${idx}" value="${s}" class="peer hidden">
                        <label for="sauce-${idx}" class="flex justify-between items-center p-4 rounded-[16px] border-2 border-[#F4F5F7] bg-white cursor-pointer transition-all peer-checked:border-[var(--brand)] peer-checked:bg-[var(--brand-soft)] shadow-sm">
                            <span class="font-bold text-gray-800 text-[15px]">${s}</span>
                            <i data-lucide="check-circle-2" class="w-5 h-5 text-[var(--brand)] opacity-0 peer-checked:opacity-100 transition-opacity"></i>
                        </label>
                    </div>
                `).join('');
                sauceDiv.classList.remove('hidden');
            } else {
                sauceContainer.innerHTML = '';
                sauceDiv.classList.add('hidden');
            }
            
            // INSTRUCTIONS
            const notesDiv = document.getElementById('bs-instructions');
            document.getElementById('bs-notes').value = '';
            if(p.hasInstructions !== false) notesDiv.classList.remove('hidden'); else notesDiv.classList.add('hidden');
            
            calculateCurrentModalPrice();
            lucide.createIcons();
            document.getElementById('body-wrap').classList.add('bs-open', 'modal-open');
        }

        function closeSheet() { document.getElementById('body-wrap').classList.remove('bs-open', 'modal-open'); currentItemForSheet = null; }

        document.getElementById('bs-add-btn').addEventListener('click', () => {
            if(!currentItemForSheet) return;
            const p = currentItemForSheet;
            
            // Sizes
            let finalPrice = p.price;
            let finalSizeName = "";
            if (p.hasSizes && p.sizes && p.sizes.length > 0) {
                const checkedSize = document.querySelector('input[name="size-choice"]:checked');
                if (checkedSize) { finalPrice = Number(checkedSize.value); finalSizeName = checkedSize.dataset.name; }
            }

            // Extras
            let selectedExtras = [];
            let extrasTotal = 0;
            if(p.hasExtras && p.extras && p.extras.length > 0) {
                const checkedExtras = document.querySelectorAll('input[name="extra-choice"]:checked');
                checkedExtras.forEach(cb => {
                    selectedExtras.push({ name: cb.dataset.name, price: Number(cb.value) });
                    extrasTotal += Number(cb.value);
                });
            }
            finalPrice += extrasTotal;

            // Sauces & Notes
            const checkedSauce = document.querySelector('input[name="sauce-choice"]:checked');
            const sauceContainer = document.getElementById('sauce-options-container');
            const sauce = sauceContainer && !sauceContainer.parentElement.classList.contains('hidden') && checkedSauce ? checkedSauce.value : '';
            
            const notesEl = document.getElementById('bs-notes');
            const notes = notesEl && !notesEl.parentElement.classList.contains('hidden') ? notesEl.value.trim() : '';
            
            if (p.requiresSauce && sauce === "") { alert("Veuillez choisir une sauce."); return; }

            const extrasStr = selectedExtras.map(e => e.name).join(',');
            const complexId = `${p.name}-${finalSizeName}-${sauce}-${notes}-${extrasStr}`;
            
            const existing = cart.find(i => i.id === complexId);
            if(existing) { 
                existing.qty++; 
            } else {
                cart.push({ id: complexId, name: p.name, price: finalPrice, image: p.image, sizeName: finalSizeName, extras: selectedExtras, sauce: sauce, notes: notes, qty: 1 });
            }
            
            closeSheet(); saveCart(); syncUI(); showToast(`${p.name} ajouté !`);
        });

        // UPSELLS
        function renderUpsells() {
            const drinks = globalProducts.filter(p => {
                const cat = (p.category || '').toLowerCase();
                return cat.includes('boisson') || cat.includes('drink') || cat.includes('boissons');
            }).slice(0, 5); 

            const container = document.getElementById('upsell-container');
            const list = document.getElementById('upsell-list');
            if(drinks.length === 0) { container.classList.add('hidden'); return; }
            
            container.classList.remove('hidden');
            const tags = ['POPULAIRE', 'FRAIS', 'TOP'];
            
            list.innerHTML = drinks.map((d, index) => {
                const tag = tags[index % tags.length];
                const tagColor = tag === 'POPULAIRE' ? 'bg-red-500' : (tag === 'FRAIS' ? 'bg-[#10B981]' : 'bg-[var(--brand)]');
                return `
                <div class="min-w-[140px] bg-white border border-[#F4F5F7] rounded-[20px] p-2 relative shadow-sm cursor-pointer active:scale-95 transition" onclick="quickAdd('${d.name.replace(/'/g, "\\'")}')">
                    <span class="absolute top-0 left-2 ${tagColor} text-white text-[8px] font-black px-2 py-0.5 rounded-b-md tracking-widest">${tag}</span>
                    <div class="flex items-center gap-3 mt-4">
                        <img src="${d.image}" class="w-10 h-10 object-contain">
                        <div>
                            <p class="font-bold text-[11px] text-gray-800 leading-tight line-clamp-1">${d.name}</p>
                            <p class="font-black text-[12px] text-[var(--brand)] mt-0.5">${d.price} DH</p>
                        </div>
                    </div>
                    <button class="absolute bottom-2 right-2 w-7 h-7 bg-[#F4F5F7] rounded-full flex items-center justify-center font-bold text-gray-600">+</button>
                </div>`;
            }).join('');
        }

        function quickAdd(productName) {
            const p = globalProducts.find(item => item.name === productName);
            if(!p) return;
            const complexId = `${p.name}-----`;
            const existing = cart.find(i => i.id === complexId);
            if(existing) existing.qty++;
            else cart.push({ id: complexId, name: p.name, price: p.price, image: p.image, sizeName: '', extras: [], sauce: '', notes: '', qty: 1 });
            saveCart(); syncUI(); renderDrawer(); showToast(`${p.name} ajouté !`);
        }

        // CART LOGIC
        function updateCartItemQty(id, change) {
            const index = cart.findIndex(i => i.id === id);
            if(index !== -1) { cart[index].qty += change; if(cart[index].qty <= 0) cart.splice(index, 1); }
            saveCart(); syncUI(); renderDrawer();
        }
        function removeCartItem(id) {
            const index = cart.findIndex(i => i.id === id);
            if(index !== -1) { cart.splice(index, 1); }
            saveCart(); syncUI(); renderDrawer();
        }

        function animateValue(obj, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                obj.innerHTML = Math.floor(progress * (end - start) + start) + " DH";
                if (progress < 1) window.requestAnimationFrame(step); else obj.innerHTML = end + " DH";
            };
            window.requestAnimationFrame(step);
        }

        function syncUI() {
            let total = 0; let count = 0;
            cart.forEach(i => { total += i.qty * i.price; count += i.qty; });
            const totalWithDelivery = total > 0 ? total + livraisonFee : 0;
            
            document.getElementById('nav-total').innerText = total + " DH";
            const navBadge = document.getElementById('nav-badge');
            if (count > 0) { navBadge.innerText = count; navBadge.classList.replace('scale-0', 'scale-100'); } 
            else { navBadge.classList.replace('scale-100', 'scale-0'); }
            
            document.getElementById('floating-badge').innerText = count;
            document.getElementById('item-count-text').innerText = count + (count > 1 ? " articles" : " article");
            
            const bottomPriceEl = document.getElementById('final-price-bottom');
            if (total !== lastTotal) { animateValue(bottomPriceEl, lastTotal, total, 400); lastTotal = total; } 
            else { bottomPriceEl.innerText = total + " DH"; }
            
            document.getElementById('cart-header-count').innerText = count + (count > 1 ? " articles" : " article");
            document.getElementById('drawer-subtotal').innerText = total + " DH";
            document.getElementById('drawer-total').innerText = totalWithDelivery + " DH";
            
            document.getElementById('checkout-bar').style.transform = count > 0 ? 'translateY(0)' : 'translateY(150%)';
        }

        function renderDrawer() {
            const list = document.getElementById('cart-items');
            if(cart.length === 0) { list.innerHTML = `<div class="py-24 text-center"><p class="text-gray-400 font-bold text-[14px] uppercase tracking-widest mb-4">Panier vide 🌮</p><button onclick="toggleCart(false)" class="text-[15px] font-black underline underline-offset-4 text-[var(--brand)] active:scale-95 transition-transform">Retour au menu</button></div>`; lucide.createIcons(); return; }
            
            list.innerHTML = cart.map(item => `
                <div class="flex items-center gap-4 bg-white p-4 rounded-[20px] shadow-[0_4px_16px_rgba(0,0,0,0.03)] border border-gray-50/50">
                    <img src="${item.image}" class="w-16 h-16 rounded-[14px] object-cover bg-[#F8F9FA] shrink-0" style="mix-blend-mode: multiply;">
                    <div class="flex-1 pr-1">
                        <p class="font-bold text-[15px] text-gray-900 leading-tight">${item.name}</p>
                        ${item.sizeName ? `<p class="text-[11px] text-gray-500 font-bold mt-1">Taille: ${item.sizeName}</p>` : ''}
                        ${item.extras && item.extras.length > 0 ? `<p class="text-[11px] text-gray-500 font-bold mt-0.5">Extras: ${item.extras.map(e=>e.name).join(', ')}</p>` : ''}
                        ${item.sauce ? `<p class="text-[11px] text-gray-500 mt-0.5">Sauce: ${item.sauce}</p>` : ''}
                        ${item.notes ? `<p class="text-[11px] text-orange-500 italic mt-0.5">"${item.notes}"</p>` : ''}
                        <p class="font-black mt-2.5 text-[16px] text-gray-900">${item.price} DH</p>
                        <button onclick="removeCartItem('${item.id}')" class="text-gray-400 text-[11px] font-bold mt-2.5 flex items-center gap-1 hover:text-red-500 transition-colors"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i> Supprimer</button>
                    </div>
                    
                    <div class="flex flex-col items-center justify-between bg-[#F4F5F7] rounded-full p-1 h-[104px] w-[42px] shrink-0 shadow-inner">
                        <button onclick="updateCartItemQty('${item.id}', 1)" class="w-[34px] h-[34px] bg-white rounded-full shadow-sm flex items-center justify-center active:scale-90 transition-transform"><i data-lucide="plus" class="w-4 h-4 text-gray-800"></i></button>
                        <span class="font-bold text-[14px] text-gray-900">${item.qty}</span>
                        <button onclick="updateCartItemQty('${item.id}', -1)" class="w-[34px] h-[34px] bg-white rounded-full shadow-sm flex items-center justify-center active:scale-90 transition-transform"><i data-lucide="minus" class="w-4 h-4 text-gray-800"></i></button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function toggleCart(show) {
            const body = document.getElementById('body-wrap'); const overlay = document.getElementById('cart-overlay'); const panel = document.getElementById('cart-panel');
            if(show) { body.classList.replace('drawer-closed', 'drawer-open'); body.classList.add('modal-open'); renderDrawer(); } 
            else { body.classList.replace('drawer-open', 'drawer-closed'); body.classList.remove('modal-open'); }
        }

        function sendToWhatsApp() {
            if(cart.length === 0) return;
            let msg = `🛒 *Nouvelle Commande LASCOTACO*\n\n`;
            let sub = 0; 
            cart.forEach(i => { 
                msg += `• *${i.qty}x* ${i.name}`;
                if(i.sizeName) msg += ` _(Taille: ${i.sizeName})_`;
                if(i.extras && i.extras.length > 0) msg += `\n  ↳ _Extras: ${i.extras.map(e=>e.name).join(', ')}_`;
                if(i.sauce) msg += `\n  ↳ _Sauce: ${i.sauce}_`;
                if(i.notes) msg += `\n  ↳ _Note: ${i.notes}_`;
                msg += `\n  = ${i.qty * i.price} DH\n\n`;
                sub += i.qty * i.price; 
            });
            msg += `🛵 *Livraison:* ${livraisonFee} DH\n💰 *TOTAL:* ${sub + livraisonFee} DH`;
            window.open(`https://wa.me/212708006088?text=${encodeURIComponent(msg)}`);
        }

        document.addEventListener('DOMContentLoaded', () => { setStore('Restaurant'); lucide.createIcons(); });
    </script>
</body>
</html>
