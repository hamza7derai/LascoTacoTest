<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LASCOTACO | App</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3075/3075977.png"> 
    <meta name="theme-color" content="#ffffff">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --brand: #E85A24; --brand-soft: rgba(232, 90, 36, 0.1); --brand-medium: rgba(232, 90, 36, 0.15); --market: #10B981; --bg: #FDFBFA; }
        body { background-color: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden;}
        .app-container { max-width: 500px; margin: 0 auto; width: 100%; position: relative; background: #FFFFFF; min-height: 100vh; box-shadow: 0 0 60px rgba(0,0,0,0.03); overflow-x: hidden; padding-bottom: 90px; }
        body.modal-open { overflow: hidden; }

        .premium-ease { transition: all 0.25s cubic-bezier(0.2, 0.9, 0.3, 1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .skeleton { background: linear-gradient(90deg, #F4F5F7 25%, #E9ECEF 50%, #F4F5F7 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite linear; }
        .skeleton-fade-out { animation: fadeOut 0.3s ease-out forwards; }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

        @keyframes tabBounce { 0% { transform: scale(1); } 50% { transform: scale(0.95); } 100% { transform: scale(1); } }
        .tab-bounce { animation: tabBounce 0.2s cubic-bezier(0.2, 0.9, 0.3, 1); }

        @keyframes cartBump { 0% { transform: scale(1); } 40% { transform: scale(1.1) rotate(-4deg); } 70% { transform: scale(0.95) rotate(2deg); } 100% { transform: scale(1) rotate(0); } }
        .cart-bump { animation: cartBump 0.4s cubic-bezier(0.2, 0.9, 0.3, 1.5); }
        
        /* BURO STYLE CIRCLES (Home View) */
        .type-scroll { display: flex; gap: 16px; overflow-x: auto; scroll-snap-type: x mandatory; padding: 12px 20px 16px 20px; scroll-padding-left: 20px; scroll-behavior: smooth; }
        .type-btn { display: flex; flex-direction: column; align-items: center; gap: 8px; flex-shrink: 0; scroll-snap-align: start; transition: transform 0.2s; }
        .type-btn:active { transform: scale(0.95); }
        .type-circle { width: 64px; height: 64px; border-radius: 50%; background: #F4F5F7; display: flex; align-items: center; justify-content: center; border: 2px solid transparent; transition: all 0.3s ease; }
        .type-btn.active .type-circle { background: #FFF0E6; border-color: var(--brand); box-shadow: 0 4px 12px var(--brand-soft); }
        .type-btn.active span { color: var(--brand); font-weight: 800; }

        /* CATEGORY PILLS */
        .category-scroll { display: flex; gap: 10px; overflow-x: auto; scroll-snap-type: x mandatory; padding: 4px 20px 16px 20px; scroll-padding-left: 20px; scroll-behavior: smooth; }
        .category-pill { position: relative; flex: 0 0 auto; scroll-snap-align: start; transition: all 0.2s ease; border: 1px solid transparent; }
        .category-pill:active { transform: scale(0.95); }
        
        .product-card { background: white; border-radius: 20px; transition: transform 0.2s cubic-bezier(0.2, 0.9, 0.3, 1), box-shadow 0.2s ease; animation: fadeIn 0.4s ease-out forwards; border: 1px solid transparent; box-shadow: 0 4px 16px rgba(0,0,0,0.03); }
        .product-card:active { transform: scale(0.97); box-shadow: 0 8px 24px rgba(0,0,0,0.06); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .product-img-wrap { overflow: hidden; border-radius: 16px 16px 6px 6px; height: 160px; background: #F4F5F7; width: 100%; position: relative; }
        
        .btn-add-unified { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; background-color: var(--brand); box-shadow: 0 4px 12px var(--brand-soft); transition: transform 0.15s ease, box-shadow 0.15s ease; flex-shrink: 0; }
        .btn-add-unified:active { transform: scale(0.9); box-shadow: 0 2px 6px var(--brand-soft); }

        #bottom-sheet-root, #cart-drawer-root { position: fixed; inset: 0; z-index: 2000; pointer-events: none; display: flex; align-items: flex-end; justify-content: center; }
        #bs-overlay, #cart-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); opacity: 0; transition: opacity 0.3s ease; pointer-events: none; }
        
        #bs-panel, #cart-panel { width: 100%; max-width: 500px; border-radius: 32px 32px 0 0; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.3, 1); pointer-events: auto; display: flex; flex-direction: column; max-height: 92vh; box-shadow: 0 -20px 40px rgba(0,0,0,0.1); }
        #bs-panel { background: #FFFFFF; padding-bottom: env(safe-area-inset-bottom); }
        #cart-panel { background: #FDFBFA; }
        
        .bs-open #bs-overlay, .drawer-open #cart-overlay { opacity: 1; pointer-events: auto; }
        .bs-open #bs-panel, .drawer-open #cart-panel { transform: translateY(0); }

        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; pointer-events: none; display: flex; flex-direction: column; gap: 8px; width: 90%; max-width: 400px; }

        /* BOTTOM NAV BAR */
        .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 500px; background: white; border-top: 1px solid #F3F4F6; display: flex; justify-content: space-between; align-items: center; padding: 0 10px; padding-bottom: env(safe-area-inset-bottom); z-index: 1000; height: 75px; box-shadow: 0 -10px 30px rgba(0,0,0,0.03); }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; color: #A0AEC0; transition: color 0.2s; background: transparent; }
        .nav-btn.active { color: var(--brand); }
        .nav-btn span { font-size: 10px; font-weight: 700; }
        
        /* FLOATING CHECKOUT BAR OFFSET */
        #checkout-bar { transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.3, 1); bottom: 90px; } 

        /* VIEW TOGGLING */
        .view-page { display: none; animation: fadeIn 0.3s ease-out forwards; }
        .view-page.active { display: block; }
    </style>
</head>
<body id="body-wrap">

    <div id="toast-container"></div>

    <div class="app-container" id="app-root">
        
        <div id="view-home" class="view-page active">
            <header class="sticky top-0 z-50 bg-white/95 backdrop-blur-xl px-5 py-4 flex justify-between items-center">
                <h1 class="text-[26px] font-black tracking-tighter italic" style="color: var(--brand)">LASCOTACO</h1>
                <button onclick="toggleCart(true)" class="relative bg-[#1A1A1A] text-white px-4 py-3 rounded-[16px] font-bold text-[14px] flex items-center gap-2 active:scale-95 transition-transform shadow-md">
                    <i data-lucide="shopping-bag" class="w-4 h-4" style="color: var(--brand)"></i>
                    <span id="nav-total">0 DH</span>
                    <span id="nav-badge" class="absolute -top-2 -right-2 text-white text-[11px] font-black w-6 h-6 flex items-center justify-center rounded-full border-2 border-[#1A1A1A] shadow-sm scale-0 premium-ease" style="background-color: var(--brand)">0</span>
                </button>
            </header>

            <div class="px-5 pt-2 pb-2 bg-white/95 backdrop-blur-xl sticky top-[72px] z-40">
                <div class="relative flex items-center group">
                    <i data-lucide="search" class="absolute left-4 w-5 h-5 text-gray-400 group-focus-within:text-[var(--brand)] transition-colors"></i>
                    <input type="text" id="search-input" placeholder="Search for food, drinks..." class="w-full bg-[#F4F5F7] border-2 border-transparent rounded-[20px] py-4 pl-12 pr-12 text-[15px] font-semibold focus:outline-none focus:bg-white focus:border-[var(--brand)] transition-all">
                    <button class="absolute right-4 text-gray-400 hover:text-[var(--brand)] transition-colors active:scale-90"><i data-lucide="sliders-horizontal" class="w-5 h-5"></i></button>
                </div>
            </div>

            <div id="types-container" class="bg-white">
                <div class="type-scroll no-scrollbar" id="type-scroll-nav"></div>
            </div>

            <div id="sub-nav-wrapper" class="bg-white relative z-20 mt-2">
                <div class="absolute right-0 top-0 bottom-0 w-8 bg-gradient-to-l from-white to-transparent z-10 pointer-events-none"></div>
                <div id="sub-nav" class="category-scroll no-scrollbar"></div>
            </div>

            <div class="px-5 pb-4 mt-2">
                <div class="rounded-[24px] p-4 flex items-center gap-4 relative overflow-hidden shadow-sm cursor-pointer active:scale-[0.98] transition-all duration-300 bg-gradient-to-r from-[#FFF0E6] to-[#FFE4D6]">
                    <div class="w-12 h-12 bg-[var(--brand)] rounded-full flex items-center justify-center shrink-0 z-10 shadow-md">
                        <i data-lucide="zap" class="w-6 h-6 text-white fill-current"></i>
                    </div>
                    <div class="z-10 flex-1">
                        <h4 class="font-black text-[16px] text-gray-900 leading-tight">Fast Delivery</h4>
                        <p class="text-[13px] font-semibold text-gray-600 mt-0.5">to your door in under <span class="text-[var(--brand)] font-black">30 min</span></p>
                    </div>
                    <img src="https://cdn3d.iconscout.com/3d/premium/thumb/delivery-boy-riding-scooter-5349141-4466249.png" class="absolute right-[-10px] bottom-[-15px] w-[130px] h-[130px] object-contain z-0 opacity-90 drop-shadow-md" alt="Livraison">
                    <i data-lucide="chevron-right" class="w-5 h-5 text-[var(--brand)] relative z-10"></i>
                </div>
            </div>

            <div class="px-5 flex justify-between items-end mb-2">
                <h2 id="section-title" class="text-xl font-black text-gray-900 tracking-tight">Top Sales</h2>
                <button onclick="switchNav('categories')" class="text-[12px] font-bold text-gray-400 hover:text-[var(--brand)]">See all ></button>
            </div>
            <main id="product-grid" class="p-5 pt-2 grid grid-cols-2 gap-4 pb-20"></main>
        </div>


        <div id="view-categories-list" class="view-page min-h-screen bg-white pb-24">
            <header class="sticky top-0 z-50 bg-white/95 backdrop-blur-xl px-5 py-5 flex justify-between items-center border-b border-gray-50">
                 <h1 class="text-[22px] font-black tracking-tight text-gray-900 mx-auto">Categories</h1>
                 <button class="absolute right-5 text-gray-800"><i data-lucide="search" class="w-6 h-6"></i></button>
            </header>
            <div class="px-5 py-6 space-y-4" id="categories-cards-container">
                </div>
        </div>


        <div id="view-category-detail" class="view-page min-h-screen bg-[#FDFBFA] pb-24">
             <header class="sticky top-0 z-50 bg-white/95 backdrop-blur-xl px-5 py-4 flex items-center justify-between border-b border-gray-50">
                 <button onclick="closeCategoryDetail()" class="w-10 h-10 bg-white border border-gray-200 shadow-sm rounded-full flex items-center justify-center text-gray-800 active:scale-90 transition-transform"><i data-lucide="chevron-left" class="w-6 h-6"></i></button>
                 <h1 id="detail-title" class="text-[20px] font-black tracking-tight text-gray-900">Title</h1>
                 <button class="w-10 h-10 flex items-center justify-center text-gray-800"><i data-lucide="search" class="w-6 h-6"></i></button>
             </header>
             <div class="bg-white pt-3 pb-4 sticky top-[72px] z-40 shadow-sm">
                 <div class="category-scroll no-scrollbar" id="detail-sub-nav"></div>
             </div>
             <main id="detail-product-grid" class="p-5 grid grid-cols-2 gap-4"></main>
        </div>


        <div id="checkout-bar" class="fixed left-5 right-5 max-w-[460px] mx-auto z-40 translate-y-[200%] premium-ease">
            <button onclick="toggleCart(true)" class="w-full text-white p-3 rounded-[24px] flex justify-between items-center shadow-[0_12px_30px_var(--brand-medium)] active:scale-[0.98] premium-ease relative overflow-hidden bg-[var(--brand)]">
                <div class="flex items-center gap-3 pl-1 z-10">
                    <div class="relative bg-white/20 backdrop-blur-md w-[48px] h-[48px] rounded-[18px] flex items-center justify-center">
                        <i data-lucide="shopping-bag" class="w-[24px] h-[24px] text-white"></i>
                        <span id="floating-badge" class="absolute -top-1.5 -right-1.5 text-[var(--brand)] text-[11px] w-6 h-6 rounded-full flex justify-center items-center font-black bg-white shadow-md">0</span>
                    </div>
                    <div class="text-left">
                        <p id="item-count-text" class="text-[15px] font-black leading-tight">0 item</p>
                        <p class="text-[12px] font-semibold text-white/80 mt-0.5">View cart</p>
                    </div>
                </div>
                <div class="font-black text-[20px] bg-white text-[var(--brand)] px-5 py-3.5 rounded-[18px] shadow-sm z-10 tracking-tight" id="final-price-bottom">0 DH</div>
            </button>
        </div>

        <nav class="bottom-nav">
            <button onclick="switchNav('home')" id="nav-home" class="nav-btn active">
                <i data-lucide="home" class="w-[22px] h-[22px]"></i>
                <span>Main</span>
            </button>
            <button onclick="switchNav('categories')" id="nav-cat" class="nav-btn">
                <i data-lucide="layout-grid" class="w-[22px] h-[22px]"></i>
                <span>Categories</span>
            </button>
            
            <button onclick="switchNav('market')" id="nav-market" class="relative flex flex-col items-center justify-center -mt-8 flex-1 group">
                <div id="market-icon-bg" class="w-[56px] h-[56px] bg-[var(--market)] rounded-full flex items-center justify-center shadow-[0_8px_20px_rgba(16,185,129,0.3)] border-4 border-white transition-transform active:scale-95 text-white">
                    <i data-lucide="shopping-basket" class="w-6 h-6"></i>
                </div>
                <span id="market-text" class="text-[10px] font-bold text-gray-400 mt-1 transition-colors">Market</span>
            </button>
            
            <button onclick="showComingSoon('Favorites')" class="nav-btn">
                <i data-lucide="heart" class="w-[22px] h-[22px]"></i>
                <span>Favorites</span>
            </button>
            <button onclick="showComingSoon('Profile')" class="nav-btn">
                <i data-lucide="user" class="w-[22px] h-[22px]"></i>
                <span>Profile</span>
            </button>
        </nav>
    </div>

    <div id="bottom-sheet-root">
        <div id="bs-overlay" onclick="closeSheet()"></div>
        <div id="bs-panel">
            <div class="absolute top-2.5 left-1/2 -translate-x-1/2 w-12 h-1.5 bg-gray-200 rounded-full z-30"></div>
            <button onclick="closeSheet()" class="absolute top-4 right-4 w-9 h-9 flex items-center justify-center bg-gray-100 rounded-full text-gray-600 hover:bg-gray-200 active:scale-90 transition-transform duration-200 z-30">
                <i data-lucide="x" class="w-4 h-4"></i>
            </button>
            
            <div class="p-6 pt-10 flex gap-5 items-center relative z-20">
                <img id="bs-image" src="" class="w-[110px] h-[110px] rounded-[24px] object-cover bg-[#F8F9FA] shrink-0 shadow-sm border border-gray-50">
                <div class="flex-1 min-w-0 flex flex-col justify-center">
                    <h3 id="bs-title" class="font-black text-[22px] text-gray-900 leading-tight tracking-tight">Product</h3>
                    <p id="bs-subtitle" class="text-[13px] text-gray-500 font-semibold mt-1 leading-snug line-clamp-2"></p>
                    <div id="bs-badge-container" class="mt-2 hidden">
                        <span id="bs-badge-text" class="text-[10px] font-bold px-2 py-1 rounded-[6px] text-[#10B981] bg-[#E6F8F3] border border-[#D1E8DB] flex items-center gap-1 w-fit">
                            <i data-lucide="leaf" class="w-3 h-3"></i> Fresh Today
                        </span>
                    </div>
                    <p id="bs-price" class="font-black mt-2 text-[22px] text-[var(--brand)] tracking-tight">0 DH</p>
                </div>
            </div>
            
            <div class="px-6 flex-1 overflow-y-auto no-scrollbar space-y-7 relative z-10 pb-6" id="bs-content-scroll">
                
                <div id="bs-sizes" class="space-y-3 hidden">
                    <div class="flex items-center justify-between mb-2">
                        <h4 class="font-black text-[15px] text-gray-900 flex items-center gap-2"> Size</h4>
                        <span class="bg-gray-100 text-gray-500 text-[10px] font-bold px-2 py-1 rounded-md uppercase">Required</span>
                    </div>
                    <div id="size-options-container" class="space-y-2"></div>
                </div>

                <div id="bs-sauces" class="space-y-3 hidden">
                    <div class="flex items-center justify-between mb-2">
                        <h4 class="font-black text-[15px] text-gray-900 flex items-center gap-2"> Sauces</h4>
                        <span class="bg-[var(--brand-soft)] text-[var(--brand)] text-[10px] font-bold px-2 py-1 rounded-md uppercase">Required</span>
                    </div>
                    <div id="sauce-options-container" class="space-y-2"></div>
                </div>

                <div id="bs-extras" class="space-y-3 hidden">
                    <div class="flex items-center justify-between mb-2">
                        <h4 class="font-black text-[15px] text-gray-900 flex items-center gap-2"> Extras</h4>
                        <span class="text-gray-400 text-[11px] font-bold uppercase">Optional</span>
                    </div>
                    <div id="extras-options-container" class="space-y-2"></div>
                </div>
                
                <div class="flex items-center justify-between pt-2">
                    <h4 class="font-black text-[16px] text-gray-900">Quantity</h4>
                    <div class="flex items-center gap-4 bg-[#F8F9FA] rounded-[16px] px-2 py-1.5 border border-gray-100 shadow-sm">
                        <button onclick="updateModalQty(-1)" class="w-8 h-8 flex items-center justify-center text-[var(--brand)] active:scale-90 transition-transform"><i data-lucide="minus" class="w-5 h-5"></i></button>
                        <span id="bs-qty" class="font-black text-[16px] text-gray-900 w-4 text-center">1</span>
                        <button onclick="updateModalQty(1)" class="w-8 h-8 flex items-center justify-center text-[var(--brand)] active:scale-90 transition-transform"><i data-lucide="plus" class="w-5 h-5"></i></button>
                    </div>
                    <span id="bs-total-inline" class="font-black text-[16px] text-[var(--brand)] text-right min-w-[50px]">0 DH</span>
                </div>

                <div id="bs-instructions" class="space-y-3 hidden">
                    <div class="flex items-center justify-between mb-1">
                        <h4 class="font-bold text-[14px] text-gray-800 flex items-center gap-1.5"><i data-lucide="file-text" class="w-4 h-4 text-[var(--brand)]"></i> Notes <span class="text-gray-400 font-medium text-[12px]">(optional)</span></h4>
                    </div>
                    <div class="relative">
                        <textarea id="bs-notes" maxlength="150" oninput="document.getElementById('char-count').innerText = this.value.length" placeholder="Ex: No onions, well done..." class="w-full p-4 bg-[#F8F9FA] rounded-[16px] font-medium text-[13px] text-gray-800 border-2 border-transparent outline-none resize-none h-20 transition-colors focus:border-[var(--brand)] focus:bg-white placeholder-gray-400 shadow-inner"></textarea>
                        <span class="absolute bottom-3 right-4 text-[10px] font-bold text-gray-400"><span id="char-count">0</span>/150</span>
                    </div>
                </div>
            </div>

            <div class="p-5 bg-white shrink-0 border-t border-gray-100 shadow-[0_-15px_40px_rgba(0,0,0,0.04)] z-20">
                <button id="bs-add-btn" class="w-full text-white h-[56px] rounded-[16px] font-black text-[15px] active:scale-[0.97] transition-all duration-200 flex items-center justify-between px-5 shadow-[0_8px_20px_var(--brand-medium)] bg-[var(--brand)]">
                    <div class="flex items-center gap-2"><i data-lucide="shopping-basket" class="w-5 h-5"></i><span>Add to cart</span></div>
                    <span id="bs-btn-price" class="bg-white/20 px-3 py-1.5 rounded-[10px] tracking-wide text-[15px]">0 DH</span>
                </button>
            </div>
        </div>
    </div>

    <div id="cart-drawer-root" class="premium-ease">
        <div id="cart-overlay" onclick="toggleCart(false)" class="premium-ease"></div>
        <div id="cart-panel" class="premium-ease">
            <div class="p-6 flex justify-between items-start shrink-0 bg-white rounded-t-[32px] relative shadow-[0_4px_16px_rgba(0,0,0,0.02)] z-20 border-b border-gray-50">
                <div class="absolute top-2.5 left-1/2 -translate-x-1/2 w-12 h-1.5 bg-gray-200 rounded-full"></div>
                <div class="mt-2">
                    <h2 class="text-[24px] font-black tracking-tight text-gray-900">My Cart</h2>
                    <p class="text-[13px] font-bold mt-1 flex items-center gap-1.5 text-[var(--brand)]">
                        <i data-lucide="clock" class="w-4 h-4"></i> 
                        <span id="cart-header-count">0 item</span> <span class="text-gray-400">• ~ 30 min</span>
                    </p>
                </div>
                <button onclick="toggleCart(false)" class="w-8 h-8 flex items-center justify-center bg-[#F4F5F7] rounded-full text-gray-500 hover:bg-gray-200 active:scale-90 transition-transform mt-2"><i data-lucide="x" class="w-4 h-4"></i></button>
            </div>
            <div id="cart-items" class="flex-1 overflow-y-auto p-5 space-y-4 no-scrollbar bg-[#FDFBFA] z-10"></div>
            <div class="p-6 bg-white shrink-0 rounded-t-[32px] shadow-[0_-20px_40px_rgba(0,0,0,0.06)] z-20">
                <div class="space-y-4">
                    <div class="flex justify-between items-center">
                        <span class="font-bold text-gray-500 text-[14px] flex items-center gap-2"><i data-lucide="file-text" class="w-5 h-5 text-gray-400"></i> Subtotal</span>
                        <span id="drawer-subtotal" class="font-bold text-gray-600 text-[15px]">0 DH</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="font-bold text-gray-500 text-[14px] flex items-center gap-2"><i data-lucide="truck" class="w-5 h-5 text-gray-400"></i> Delivery</span>
                        <span class="font-bold text-gray-600 text-[15px]">20 DH</span>
                    </div>
                    <div class="pt-2 mt-1 flex justify-between items-center">
                        <div class="flex items-center gap-2">
                            <i data-lucide="wallet" class="w-5 h-5 text-[var(--brand)]"></i>
                            <span class="font-black text-gray-900 text-[18px]">Total</span>
                        </div>
                        <span id="drawer-total" class="text-[28px] font-black text-[var(--brand)] tracking-tight">0 DH</span>
                    </div>
                </div>
                <button onclick="sendToWhatsApp()" class="w-full bg-[#25D366] text-white py-4 h-[60px] rounded-[20px] font-black text-[16px] flex justify-center items-center gap-2 mt-6 active:scale-[0.97] transition-all shadow-[0_8px_20px_rgba(37,211,102,0.25)]">
                    <i data-lucide="message-circle" class="w-5 h-5 fill-current text-white"></i> Order Now
                </button>
            </div>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js').catch(()=>{}); }); }

        const firebaseConfig = { apiKey: "AIzaSyBebaGxqiNBvCqofveg1Fmztl7av3Mdoyg", authDomain: "lascotaco-67fe5.firebaseapp.com", projectId: "lascotaco-67fe5", storageBucket: "lascotaco-67fe5.firebasestorage.app", messagingSenderId: "865918381027", appId: "1:865918381027:web:abc6435df20894020c4ed6" };
        firebase.initializeApp(firebaseConfig); const db = firebase.firestore();

        let cart = JSON.parse(localStorage.getItem('lasco_cart_v2')) || []; 
        let activeType = 'Fast Food'; 
        let activeCat = '🔥 Top Sales';
        let livraisonFee = 20;
        let globalProducts = []; 
        let currentItemForSheet = null;
        let currentModalQty = 1;
        let lastTotal = 0; 

        // THE 5 MAIN TYPES
        const mainTypes = [
            { name: 'Breakfast', icon: 'coffee', desc: 'Start the day fresh', color: '#FFF3E0', emoji: '🥐' },
            { name: 'Fast Food', icon: 'pizza', desc: 'Quick & delicious', color: '#FFEBEE', emoji: '🍔' },
            { name: 'Meals', icon: 'utensils', desc: 'Satisfying dishes', color: '#FFF8E1', emoji: '🍛' },
            { name: 'Drinks', icon: 'cup-soda', desc: 'Cold beverages', color: '#E3F2FD', emoji: '🥤' },
            { name: 'Desserts', icon: 'cake', desc: 'Sweet treats', color: '#FCE4EC', emoji: '🍰' }
        ];

        function getCategoryIcon(catName) {
            const n = catName.toLowerCase();
            if(n.includes('top')) return 'flame';
            if(n.includes('pasticcio')) return 'pie-chart';
            if(n.includes('drink') || n.includes('boisson')) return 'cup-soda';
            if(n.includes('taco')) return 'sandwich';
            if(n.includes('burger')) return 'utensils';
            if(n.includes('pizza')) return 'pizza';
            if(n.includes('fruit')) return 'apple';
            if(n.includes('veg')) return 'carrot';
            if(n.includes('dessert') || n.includes('cake')) return 'cake';
            if(n.includes('snack')) return 'cookie';
            return 'tag';
        }

        function renderSkeletons(targetGrid = 'product-grid') {
            const grid = document.getElementById(targetGrid);
            grid.innerHTML = Array(6).fill().map(() => `
                <div class="product-card p-2 flex flex-col h-[260px] border-transparent shadow-sm">
                    <div class="skeleton w-full h-[160px] rounded-[16px] mb-3 shrink-0"></div>
                    <div class="px-1.5 flex flex-col flex-1">
                        <div class="skeleton w-3/4 h-4 rounded mb-2"></div>
                        <div class="skeleton w-1/2 h-4 rounded mt-auto mb-1"></div>
                        <div class="flex justify-between items-end mt-2">
                            <div class="skeleton w-1/3 h-5 rounded mb-1"></div>
                            <div class="skeleton w-[40px] h-[40px] rounded-full shrink-0"></div>
                        </div>
                    </div>
                </div>`).join('');
        }

        function saveCart() { localStorage.setItem('lasco_cart_v2', JSON.stringify(cart)); }

        db.collection("products").get().then(snap => {
            snap.forEach(doc => {
                let data = doc.data();
                if (data.isActive === false) return; 
                if (!data.category) data.category = '🔥 Top Sales'; 
                globalProducts.push(data);
            });
            setTimeout(() => { 
                renderTypeCircles(); 
                renderLabels(); 
                loadProducts(false); 
                renderCategoryCards();
                syncUI(); 
            }, 500);
        });

        function showToast(message) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'bg-[#1A1A1A] text-white px-5 py-4 rounded-[16px] text-[14px] font-bold shadow-lg transition-all duration-300 translate-y-[-20px] opacity-0 flex items-center gap-3 z-[9999]';
            toast.innerHTML = `<i data-lucide="check-circle-2" class="w-5 h-5 text-[#25D366]"></i> <span>${message}</span>`;
            container.appendChild(toast); lucide.createIcons();
            requestAnimationFrame(() => { toast.classList.remove('translate-y-[-20px]', 'opacity-0'); });
            setTimeout(() => { toast.classList.add('translate-y-[-20px]', 'opacity-0'); setTimeout(() => toast.remove(), 400); }, 2500);
        }

        function triggerCartPulse() {
            const btn = document.getElementById('nav-cart-btn');
            if(btn) { btn.classList.remove('cart-bump'); void btn.offsetWidth; btn.classList.add('cart-bump'); }
            if (window.navigator.vibrate) window.navigator.vibrate(10);
        }

        function showComingSoon(feature) { showToast(`${feature} is coming soon!`); }

        // ==========================================
        // SINGLE PAGE APP (SPA) NAVIGATION LOGIC
        // ==========================================
        function switchNav(tab) {
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('market-icon-bg').classList.remove('scale-110');
            document.getElementById('market-text').classList.remove('text-[var(--market)]');
            
            // Hide all views
            document.querySelectorAll('.view-page').forEach(v => v.classList.remove('active'));
            
            if(tab === 'home') {
                document.getElementById('nav-home').classList.add('active');
                document.getElementById('view-home').classList.add('active');
                if(activeType === 'Market') activeType = 'Fast Food'; // Reset
                activeCat = '🔥 Top Sales';
                renderTypeCircles();
                renderLabels();
                loadProducts(false);
            } 
            else if(tab === 'categories') {
                document.getElementById('nav-cat').classList.add('active');
                document.getElementById('view-categories-list').classList.add('active');
            }
            else if (tab === 'market') {
                document.getElementById('market-icon-bg').classList.add('scale-110');
                document.getElementById('market-text').classList.add('text-[var(--market)]');
                document.getElementById('view-home').classList.add('active'); // Market uses Home view layout
                document.getElementById('types-container').classList.add('hidden'); // Hide types scroll
                activeType = 'Market';
                activeCat = '🔥 Top Sales';
                renderLabels();
                loadProducts(true);
            }
        }

        // ==========================================
        // HOME VIEW FUNCTIONS
        // ==========================================
        function renderTypeCircles() {
            document.getElementById('types-container').classList.remove('hidden');
            const container = document.getElementById('type-scroll-nav');
            container.innerHTML = mainTypes.map(type => {
                let isActive = activeType === type.name;
                return `
                <button onclick="handleTypeClick('${type.name}')" class="type-btn ${isActive ? 'active' : ''}">
                    <div class="type-circle">
                        <i data-lucide="${type.icon}" class="w-7 h-7 ${isActive ? 'text-[var(--brand)]' : 'text-gray-400'}"></i>
                    </div>
                    <span class="text-[11px] font-semibold text-gray-500">${type.name}</span>
                </button>`;
            }).join('');
            lucide.createIcons();
        }

        function handleTypeClick(typeName) {
            activeType = typeName;
            activeCat = '🔥 Top Sales';
            document.getElementById('search-input').value = '';
            renderTypeCircles();
            renderLabels(); 
            loadProducts(true);
        }

        async function renderLabels() {
            const nav = document.getElementById('sub-nav');
            const cats = [{name: '🔥 Top Sales'}];
            const snap = await db.collection("categories").where("type", "==", activeType).get();
            snap.forEach(doc => { cats.push(doc.data()); });
            
            document.getElementById('section-title').innerText = activeType === 'Market' ? 'Market Products' : activeType;

            nav.innerHTML = cats.map((cat, idx) => {
                let isTop = cat.name === '🔥 Top Sales';
                let isActive = activeCat === cat.name;
                let iconName = getCategoryIcon(cat.name);
                let brandColor = activeType === 'Market' ? 'var(--market)' : 'var(--brand)';
                
                return `
                <button id="btn-cat-${idx}" onclick="handleCatClick('${cat.name}', 'btn-cat-${idx}')" class="category-pill flex items-center gap-2 px-5 py-2.5 text-[14px] font-bold whitespace-nowrap rounded-[16px] transition-all duration-200 ${isActive ? 'text-white shadow-md' : 'bg-[#F4F5F7] text-[#64748b] hover:bg-gray-100'}" style="${isActive ? `background-color: ${brandColor}; border-color: ${brandColor};` : 'border-color: transparent;'}">
                    <i data-lucide="${iconName}" class="w-4 h-4 ${isActive ? 'text-white' : 'text-gray-400'}"></i>
                    ${isTop ? 'Top Sales' : cat.name}
                </button>`;
            }).join('');
            lucide.createIcons();
        }

        function handleCatClick(catName, elementId) {
            const el = document.getElementById(elementId);
            if(el) { el.classList.add('tab-bounce'); setTimeout(() => el.classList.remove('tab-bounce'), 250); }
            activeCat = catName; document.getElementById('search-input').value = '';
            renderLabels(); loadProducts(true);
            const nav = document.getElementById('sub-nav');
            if (document.getElementById(elementId)) { nav.scrollTo({ left: document.getElementById(elementId).offsetLeft - 20, behavior: 'smooth' }); }
        }

        document.getElementById('search-input').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            if(term.length > 0) { 
                const filtered = globalProducts.filter(p => p.name.toLowerCase().includes(term));
                renderProductGrid(filtered, 'product-grid'); 
            } 
            else { loadProducts(false); }
        });

        function loadProducts(withSkeleton = false) {
            let filtered = activeCat === '🔥 Top Sales' ? 
                globalProducts.filter(p => p.type === activeType && p.isTop === true) : 
                globalProducts.filter(p => p.type === activeType && p.category === activeCat);

            if(withSkeleton) { renderSkeletons('product-grid'); setTimeout(() => renderProductGrid(filtered, 'product-grid'), 400); } 
            else { renderProductGrid(filtered, 'product-grid'); }
        }

        // ==========================================
        // CATEGORY LIST VIEW (The Big Cards)
        // ==========================================
        function renderCategoryCards() {
            const container = document.getElementById('categories-cards-container');
            container.innerHTML = mainTypes.map(c => {
                const count = globalProducts.filter(p => p.type === c.name).length;
                return `
                <div onclick="openCategoryDetail('${c.name}')" class="flex justify-between items-center p-6 rounded-[24px] cursor-pointer active:scale-95 transition-transform shadow-sm" style="background-color: ${c.color};">
                    <div>
                        <h3 class="font-black text-[20px] text-gray-900 tracking-tight">${c.name}</h3>
                        <p class="text-[13px] font-bold text-gray-600 mt-1 opacity-80">${c.desc}</p>
                        <span class="inline-block mt-3 bg-white/50 text-[11px] font-bold px-3 py-1.5 rounded-full text-gray-800 backdrop-blur-sm shadow-sm">${count} products</span>
                    </div>
                    <div class="text-[60px] leading-none drop-shadow-xl">${c.emoji}</div>
                </div>`;
            }).join('');
        }

        // ==========================================
        // CATEGORY DETAIL VIEW (Buro Pill style)
        // ==========================================
        function openCategoryDetail(typeName) {
            document.querySelectorAll('.view-page').forEach(v => v.classList.remove('active'));
            document.getElementById('view-category-detail').classList.add('active');
            
            document.getElementById('detail-title').innerText = typeName;
            activeType = typeName;
            activeCat = 'All'; 
            
            renderDetailSubNav();
            loadDetailProducts(true);
        }

        function closeCategoryDetail() {
            document.querySelectorAll('.view-page').forEach(v => v.classList.remove('active'));
            document.getElementById('view-categories-list').classList.add('active');
        }

        async function renderDetailSubNav() {
            const nav = document.getElementById('detail-sub-nav');
            const cats = [{name: 'All'}];
            const snap = await db.collection("categories").where("type", "==", activeType).get();
            snap.forEach(doc => { cats.push(doc.data()); });
            
            nav.innerHTML = cats.map((cat, idx) => {
                let isActive = activeCat === cat.name;
                return `
                <button id="btn-detail-cat-${idx}" onclick="handleDetailCatClick('${cat.name}', 'btn-detail-cat-${idx}')" class="category-pill flex items-center px-5 py-2 text-[14px] font-bold whitespace-nowrap rounded-full transition-all duration-200 border ${isActive ? 'bg-[#1A1A1A] text-white border-[#1A1A1A] shadow-md' : 'bg-white text-gray-600 border-gray-200'}">
                    ${cat.name}
                </button>`;
            }).join('');
        }

        function handleDetailCatClick(catName, elementId) {
            const el = document.getElementById(elementId);
            if(el) { el.classList.add('tab-bounce'); setTimeout(() => el.classList.remove('tab-bounce'), 250); }
            activeCat = catName;
            renderDetailSubNav();
            loadDetailProducts(true);
            const nav = document.getElementById('detail-sub-nav');
            if (document.getElementById(elementId)) { nav.scrollTo({ left: document.getElementById(elementId).offsetLeft - 20, behavior: 'smooth' }); }
        }

        function loadDetailProducts(withSkeleton = false) {
            let filtered = activeCat === 'All' ? 
                globalProducts.filter(p => p.type === activeType) : 
                globalProducts.filter(p => p.type === activeType && p.category === activeCat);

            if(withSkeleton) { renderSkeletons('detail-product-grid'); setTimeout(() => renderProductGrid(filtered, 'detail-product-grid'), 300); } 
            else { renderProductGrid(filtered, 'detail-product-grid'); }
        }

        // ==========================================
        // SHARED PRODUCT GRID RENDERER
        // ==========================================
        function renderProductGrid(products, targetElementId) {
            const grid = document.getElementById(targetElementId);
            if(products.length === 0) { grid.innerHTML = '<div class="col-span-2 text-center text-gray-400 py-12"><i data-lucide="search-x" class="w-10 h-10 mx-auto mb-3 opacity-50"></i><p class="font-bold text-[15px]">No products found</p></div>'; lucide.createIcons(); return; }
            
            let btnColor = activeType === 'Market' ? 'var(--market)' : 'var(--brand)';

            grid.innerHTML = products.map((p, index) => `
                <div class="product-card cursor-pointer p-2 flex flex-col" onclick="openProductByName('${p.name.replace(/'/g, "\\'")}')">
                    <div class="product-img-wrap group">
                        <div class="absolute inset-0 skeleton z-10 pointer-events-none"></div>
                        <img src="${p.image}" ${index >= 4 ? 'loading="lazy"' : ''} onerror="this.onerror=null; this.src='https://placehold.co/400x300/F4F5F7/A0AEC0?text=--'" class="w-full h-full object-cover opacity-0 blur-[4px] transition-all duration-500 ease-out" onload="this.classList.remove('opacity-0', 'blur-[4px]'); this.previousElementSibling?.classList.add('skeleton-fade-out');">
                        ${p.isTop ? `<span class="absolute top-2 left-2 text-[var(--brand)] bg-white/95 backdrop-blur-sm text-[9px] font-black px-2 py-1 rounded-[6px] uppercase shadow-sm z-20">Top</span>` : ''}
                    </div>
                    <div class="pt-3 px-1.5 flex flex-col flex-1 justify-between pb-1">
                        <h3 class="font-bold text-[14px] text-gray-900 leading-snug line-clamp-2">${p.name}</h3>
                        <div class="flex justify-between items-end mt-3"><span class="font-black text-[16px] text-[var(--brand)] mb-1" style="color: ${btnColor}">${p.hasSizes ? 'From ' : ''}${p.price} DH</span><button class="btn-add-unified" style="background-color: ${btnColor}" onclick="event.stopPropagation(); openProductByName('${p.name.replace(/'/g, "\\'")}', true);"><i data-lucide="plus" class="w-5 h-5"></i></button></div>
                    </div>
                </div>`).join('');
            lucide.createIcons();
        }

        // ==========================================
        // BOTTOM SHEET & CART LOGIC (Shared)
        // ==========================================
        function updateModalQty(change) {
            currentModalQty = Math.max(1, currentModalQty + change);
            document.getElementById('bs-qty').innerText = currentModalQty;
            calculateCurrentModalPrice();
        }

        function calculateCurrentModalPrice() {
            if(!currentItemForSheet) return;
            let unitPrice = currentItemForSheet.price;
            if(currentItemForSheet.hasSizes && currentItemForSheet.sizes?.length > 0) { const checkedSize = document.querySelector('input[name="size-choice"]:checked'); if (checkedSize) unitPrice = Number(checkedSize.value); }
            if(currentItemForSheet.hasExtras && currentItemForSheet.extras?.length > 0) { document.querySelectorAll('input[name="extra-choice"]:checked').forEach(cb => { unitPrice += Number(cb.value); }); }
            
            const totalPrice = unitPrice * currentModalQty;
            document.getElementById('bs-price').innerText = unitPrice + ' DH';
            document.getElementById('bs-total-inline').innerText = totalPrice + ' DH';
            document.getElementById('bs-btn-price').innerText = totalPrice + ' DH';
        }

        function openProductByName(productName, animateBtn = false) {
            const p = globalProducts.find(item => item.name === productName);
            if(!p) return;
            currentItemForSheet = p;
            currentModalQty = 1; 
            document.getElementById('bs-qty').innerText = currentModalQty;

            document.getElementById('bs-content-scroll').scrollTo(0,0);
            document.getElementById('bs-image').src = p.image;
            document.getElementById('bs-title').innerText = p.name;
            
            const subtitleEl = document.getElementById('bs-subtitle');
            if(p.description?.trim()) { subtitleEl.innerText = p.description; subtitleEl.classList.remove('hidden'); } else { subtitleEl.classList.add('hidden'); }

            const badgeContainer = document.getElementById('bs-badge-container');
            
            if (p.type === 'Market') {
                badgeContainer.classList.remove('hidden');
                document.getElementById('bs-badge-text').innerHTML = `<i data-lucide="leaf" class="w-3 h-3"></i> Fresh Today`;
            } else { badgeContainer.classList.add('hidden'); }
            
            const sizeDiv = document.getElementById('bs-sizes');
            const sizeContainer = document.getElementById('size-options-container');
            if(p.hasSizes && p.sizes?.length > 0) {
                sizeContainer.innerHTML = p.sizes.map((s, idx) => `
                    <div class="relative active:scale-[0.98] transition-transform">
                        <input type="radio" name="size-choice" id="size-${idx}" value="${s.price}" data-name="${s.name}" class="peer hidden" ${idx === 0 ? 'checked' : ''} onchange="calculateCurrentModalPrice()">
                        <label for="size-${idx}" class="flex justify-between items-center p-3.5 rounded-[16px] border border-gray-100 bg-white cursor-pointer transition-all peer-checked:border-[var(--brand)] peer-checked:bg-[var(--brand-soft)] shadow-sm">
                            <div class="flex items-center gap-3"><div class="w-5 h-5 rounded-full border-2 border-gray-300 flex items-center justify-center modal-radio-indicator bg-white shrink-0"><div class="w-2.5 h-2.5 rounded-full bg-[var(--brand)] modal-radio-dot"></div></div><span class="font-bold text-gray-800 text-[14px]">${s.name}</span></div>
                            <span class="font-black text-[14px] text-gray-800 peer-checked:text-[var(--brand)] shrink-0">${s.price} DH</span>
                        </label>
                    </div>`).join('');
                sizeDiv.classList.remove('hidden');
            } else { sizeDiv.classList.add('hidden'); }

            const extrasDiv = document.getElementById('bs-extras');
            const extrasContainer = document.getElementById('extras-options-container');
            if(p.hasExtras && p.extras?.length > 0) {
                extrasContainer.innerHTML = p.extras.map((e, idx) => `
                    <div class="relative active:scale-[0.98] transition-transform">
                        <input type="checkbox" name="extra-choice" id="extra-${idx}" value="${e.price}" data-name="${e.name}" class="peer hidden" onchange="calculateCurrentModalPrice()">
                        <label for="extra-${idx}" class="flex justify-between items-center p-3.5 rounded-[16px] border border-gray-100 bg-white cursor-pointer transition-all hover:bg-gray-50 peer-checked:border-[var(--brand)] peer-checked:bg-[var(--brand-soft)] shadow-sm">
                            <div class="flex items-center gap-3"><div class="w-[20px] h-[20px] rounded-[6px] border-2 border-gray-300 flex items-center justify-center modal-cb-indicator bg-white shrink-0"><i data-lucide="check" class="w-3 h-3 text-white modal-cb-icon"></i></div><span class="font-bold text-gray-800 text-[14px]">${e.name}</span></div>
                            <span class="font-black text-[14px] text-gray-500 peer-checked:text-[var(--brand)] shrink-0">+${e.price} DH</span>
                        </label>
                    </div>`).join('');
                extrasDiv.classList.remove('hidden');
            } else { extrasDiv.classList.add('hidden'); }
            
            const sauceDiv = document.getElementById('bs-sauces');
            const sauceContainer = document.getElementById('sauce-options-container');
            if(p.requiresSauce && p.sauces?.length > 0) {
                sauceContainer.innerHTML = `<div class="flex flex-wrap gap-2.5">` + p.sauces.map((s, idx) => `<div class="relative active:scale-[0.95] transition-transform"><input type="radio" name="sauce-choice" id="sauce-${idx}" value="${s}" class="peer hidden"><label for="sauce-${idx}" class="flex items-center px-4 py-2.5 rounded-full border border-gray-200 bg-white cursor-pointer transition-all peer-checked:border-[var(--brand)] peer-checked:bg-[var(--brand)] peer-checked:text-white text-gray-700 font-bold text-[13px] shadow-sm">${s}</label></div>`).join('') + `</div>`;
                sauceDiv.classList.remove('hidden');
            } else { sauceContainer.innerHTML = ''; sauceDiv.classList.add('hidden'); }
            
            const notesDiv = document.getElementById('bs-instructions');
            document.getElementById('bs-notes').value = '';
            document.getElementById('char-count').innerText = '0';
            if(p.hasInstructions !== false) notesDiv.classList.remove('hidden'); else notesDiv.classList.add('hidden');
            
            let btnColor = p.type === 'Market' ? 'var(--market)' : 'var(--brand)';
            document.getElementById('bs-add-btn').style.backgroundColor = btnColor;
            
            calculateCurrentModalPrice(); lucide.createIcons();
            document.getElementById('body-wrap').classList.add('bs-open', 'modal-open');
        }

        function closeSheet() { document.getElementById('body-wrap').classList.remove('bs-open', 'modal-open'); currentItemForSheet = null; }

        document.getElementById('bs-add-btn').addEventListener('click', () => {
            if(!currentItemForSheet) return;
            const p = currentItemForSheet;
            let unitPrice = p.price;
            let finalSizeName = "";
            if (p.hasSizes && p.sizes?.length > 0) { const checkedSize = document.querySelector('input[name="size-choice"]:checked'); if (checkedSize) { unitPrice = Number(checkedSize.value); finalSizeName = checkedSize.dataset.name; } }
            let selectedExtras = [];
            if(p.hasExtras && p.extras?.length > 0) { document.querySelectorAll('input[name="extra-choice"]:checked').forEach(cb => { selectedExtras.push({ name: cb.dataset.name, price: Number(cb.value) }); unitPrice += Number(cb.value); }); }
            const checkedSauce = document.querySelector('input[name="sauce-choice"]:checked');
            const sauce = checkedSauce ? checkedSauce.value : '';
            const notes = document.getElementById('bs-notes').value.trim();
            if (p.requiresSauce && !sauce) { alert("Please choose a sauce."); return; }
            
            const complexId = `${p.name}-${finalSizeName}-${sauce}-${notes}-${selectedExtras.map(e => e.name).join(',')}`;
            const existing = cart.find(i => i.id === complexId);
            
            if(existing) existing.qty += currentModalQty; 
            else cart.push({ id: complexId, name: p.name, price: unitPrice, image: p.image, sizeName: finalSizeName, extras: selectedExtras, sauce: sauce, notes: notes, qty: currentModalQty });
            
            closeSheet(); saveCart(); syncUI(); showToast(`${p.name} added!`); triggerCartPulse();
        });

        function updateCartItemQty(id, change) {
            const index = cart.findIndex(i => i.id === id);
            if(index !== -1) { cart[index].qty += change; if(cart[index].qty <= 0) cart.splice(index, 1); }
            saveCart(); syncUI(); renderDrawer();
        }
        function removeCartItem(id) { const index = cart.findIndex(i => i.id === id); if(index !== -1) cart.splice(index, 1); saveCart(); syncUI(); renderDrawer(); }

        function animateValue(obj, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                obj.innerHTML = Math.floor(progress * (end - start) + start) + " DH";
                if (progress < 1) window.requestAnimationFrame(step); else obj.innerHTML = end + " DH";
            };
            window.requestAnimationFrame(step);
        }

        function syncUI() {
            let total = 0, count = 0; cart.forEach(i => { total += i.qty * i.price; count += i.qty; });
            document.getElementById('nav-total').innerText = total + " DH";
            const navBadge = document.getElementById('nav-badge');
            if (count > 0) { navBadge.innerText = count; navBadge.classList.replace('scale-0', 'scale-100'); } else { navBadge.classList.replace('scale-100', 'scale-0'); }
            document.getElementById('floating-badge').innerText = count;
            document.getElementById('item-count-text').innerText = count + (count > 1 ? " items" : " item");
            const bottomPriceEl = document.getElementById('final-price-bottom');
            if (total !== lastTotal) { animateValue(bottomPriceEl, lastTotal, total, 300); lastTotal = total; } else { bottomPriceEl.innerText = total + " DH"; }
            document.getElementById('cart-header-count').innerText = count + (count > 1 ? " items" : " item");
            document.getElementById('drawer-subtotal').innerText = total + " DH";
            document.getElementById('drawer-total').innerText = (total > 0 ? total + livraisonFee : 0) + " DH";
            document.getElementById('checkout-bar').style.transform = count > 0 ? 'translateY(0)' : 'translateY(200%)';
        }

        function renderDrawer() {
            const list = document.getElementById('cart-items');
            if(cart.length === 0) { list.innerHTML = `<div class="py-16 text-center"><p class="text-gray-400 font-bold text-[14px] uppercase tracking-widest mb-4">Cart is empty 🌮</p><button onclick="toggleCart(false)" class="text-[15px] font-black underline text-[var(--brand)]">Back to menu</button></div>`; return; }
            
            list.innerHTML = cart.map(item => {
                let badgesHtml = '';
                if(item.sizeName) badgesHtml += `<span class="bg-[#FFF0E6] text-[var(--brand)] text-[10px] font-bold px-2 py-1 rounded-[6px]">${item.sizeName}</span>`;
                if(item.extras && item.extras.length > 0) {
                    item.extras.forEach(e => { badgesHtml += `<span class="bg-[#FFF0E6] text-[var(--brand)] text-[10px] font-bold px-2 py-1 rounded-[6px]">${e.name}</span>`; });
                }
                if(item.sauce) badgesHtml += `<span class="bg-[#E6F4EA] text-[#10B981] text-[10px] font-bold px-2 py-1 rounded-[6px]">${item.sauce}</span>`;

                return `
                <div class="flex gap-4 bg-white p-4 rounded-[20px] shadow-sm border border-gray-100">
                    <img src="${item.image}" class="w-[72px] h-[72px] rounded-[16px] object-cover bg-[#F8F9FA] shrink-0" style="mix-blend-mode: multiply;">
                    <div class="flex-1 pr-2 min-w-0 flex flex-col justify-center">
                        <p class="font-bold text-[15px] text-gray-900 truncate">${item.name}</p>
                        ${badgesHtml ? `<div class="flex flex-wrap gap-1.5 mt-1.5 mb-1">${badgesHtml}</div>` : ''}
                        ${item.notes ? `<p class="text-[11px] text-orange-500 italic mt-0.5 truncate">"${item.notes}"</p>` : ''}
                        <p class="font-black mt-1 text-[16px] text-[var(--brand)]">${item.price} DH</p>
                        <button onclick="removeCartItem('${item.id}')" class="mt-2 flex items-center gap-1 text-gray-400 hover:text-red-500 font-bold text-[11px] active:scale-95 transition-transform w-fit">
                            <i data-lucide="trash-2" class="w-3 h-3"></i> Remove
                        </button>
                    </div>
                    <div class="flex flex-col items-center justify-between bg-white border border-gray-100 rounded-[24px] p-1 h-[100px] w-[40px] shrink-0 shadow-[0_2px_8px_rgba(0,0,0,0.04)]">
                        <button onclick="updateCartItemQty('${item.id}', 1)" class="w-8 h-8 rounded-full flex items-center justify-center active:scale-90 transition-transform text-gray-800"><i data-lucide="plus" class="w-4 h-4"></i></button>
                        <span class="font-bold text-[14px] text-gray-900">${item.qty}</span>
                        <button onclick="updateCartItemQty('${item.id}', -1)" class="w-8 h-8 rounded-full flex items-center justify-center active:scale-90 transition-transform text-gray-800"><i data-lucide="minus" class="w-4 h-4"></i></button>
                    </div>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        function toggleCart(show) { document.getElementById('body-wrap').classList.toggle('drawer-open', show); document.getElementById('body-wrap').classList.toggle('modal-open', show); if(show) renderDrawer(); }

        async function sendToWhatsApp() {
            if(cart.length === 0) return;
            
            let msg = `🛒 *New Order LASCOTACO*\n\n`;
            let subtotalSale = 0; let subtotalCost = 0; 

            cart.forEach(item => { 
                msg += `• *${item.qty}x* ${item.name} ${item.sizeName ? `(${item.sizeName})` : ''}\n  ${item.extras?.length ? `Extras: ${item.extras.map(e=>e.name).join(', ')}\n` : ''}${item.sauce ? `Sauce: ${item.sauce}\n` : ''}${item.notes ? `Note: ${item.notes}\n` : ''}  = ${item.qty * item.price} DH\n\n`; 
                subtotalSale += item.qty * item.price; 
                
                const originalProduct = globalProducts.find(p => p.name === item.name);
                let unitCost = 0;
                
                if (originalProduct) {
                    if (item.sizeName && originalProduct.sizes && originalProduct.sizes.length > 0) {
                        const matchedSize = originalProduct.sizes.find(s => s.name === item.sizeName);
                        if (matchedSize && matchedSize.costPrice) { unitCost = Number(matchedSize.costPrice); } 
                        else if (originalProduct.costPrice) { unitCost = Number(originalProduct.costPrice); }
                    } else if (originalProduct.costPrice) { unitCost = Number(originalProduct.costPrice); }
                }
                subtotalCost += item.qty * unitCost;
            });

            msg += `🛵 *Delivery:* ${livraisonFee} DH\n💰 *TOTAL:* ${subtotalSale + livraisonFee} DH`;
            const myProfit = subtotalSale - subtotalCost;

            try {
                const orderData = { timestamp: firebase.firestore.FieldValue.serverTimestamp(), items: cart, totalSale: subtotalSale, totalCost: subtotalCost, profit: myProfit, deliveryFee: livraisonFee, status: "pending", dateString: new Date().toLocaleDateString('fr-FR') };
                await db.collection("orders").add(orderData);
                cart = []; saveCart(); syncUI(); toggleCart(false);
            } catch (error) { console.error("Save error:", error); }
            window.open(`https://wa.me/212708006088?text=${encodeURIComponent(msg)}`);
        }
    </script>
</body>
