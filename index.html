<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LASCOTACO | Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --main: #E85A24; }
        body { background-color: #FDFBFA; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        
        .glass-card { background: white; border-radius: 20px; border: 1px solid #F1F3F5; box-shadow: 0 4px 20px rgba(0,0,0,0.02); }
        .active-main { background-color: var(--main) !important; color: white !important; box-shadow: 0 10px 20px rgba(232, 90, 36, 0.2); }
        .active-label { background-color: white; border: 2px solid var(--main); color: var(--main); }
        
        .slider-container { display: flex; transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        .slide-img { min-width: 100%; height: 200px; object-fit: cover; border-radius: 22px; }

        #cart-panel { 
            transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1); 
            box-shadow: -10px 0 50px rgba(0,0,0,0.1);
        }
        .drawer-open #cart-panel { transform: translateX(0); }
        .drawer-closed #cart-panel { transform: translateX(100%); }
        
        #cart-overlay { transition: opacity 0.4s ease; }
        .drawer-closed #cart-overlay { opacity: 0; pointer-events: none; }
        .drawer-open #cart-overlay { opacity: 1; pointer-events: auto; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        #checkout-bar { transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body class="pb-44 drawer-closed" id="body-wrap">

    <nav class="sticky top-0 bg-white/80 backdrop-blur-md p-5 z-50 flex justify-between items-center px-6 border-b border-gray-50">
        <h1 class="text-2xl font-extrabold text-[#E85A24] tracking-tighter">LASCOTACO</h1>
        <button onclick="toggleCart(true)" class="bg-[#1A1A1A] text-white px-5 py-2.5 rounded-2xl font-black text-sm flex items-center gap-2 shadow-xl active:scale-95 transition">
            <i data-lucide="shopping-bag" class="w-4 h-4 text-orange-400"></i>
            <span id="nav-total">0 DH</span>
        </button>
    </nav>

    <div class="p-4 pt-6">
        <div class="glass-card p-1 overflow-hidden relative h-52 bg-gray-50">
            <div id="slider" class="slider-container h-full"></div>
            <div id="slider-dots" class="absolute bottom-5 left-0 right-0 flex justify-center gap-2"></div>
        </div>
    </div>

    <div class="p-4 flex gap-3 sticky top-[80px] bg-[#FDFBFA]/90 backdrop-blur-sm z-40">
        <button onclick="setStore('Restaurant')" id="btn-resto" class="flex-1 py-4 rounded-2xl font-extrabold flex items-center justify-center gap-2 transition-all bg-white border active-main">
            <i data-lucide="utensils" class="w-5 h-5"></i> Resto
        </button>
        <button onclick="setStore('Épicerie')" id="btn-epi" class="flex-1 py-4 rounded-2xl font-extrabold flex items-center justify-center gap-2 transition-all bg-white border">
            <i data-lucide="shopping-basket" class="w-5 h-5"></i> Épicerie
        </button>
    </div>

    <div id="sub-nav" class="px-6 flex gap-3 overflow-x-auto no-scrollbar py-2 sticky top-[165px] bg-[#FDFBFA]/90 backdrop-blur-sm z-30"></div>

    <main id="product-grid" class="p-6 grid grid-cols-2 gap-5 max-w-4xl mx-auto"></main>

    <div id="checkout-bar" class="fixed bottom-0 left-0 right-0 p-6 z-[60] translate-y-full">
        <button onclick="toggleCart(true)" class="max-w-md mx-auto w-full bg-[#1A1A1A] text-white p-5 rounded-[2.2rem] flex justify-between items-center shadow-2xl active:scale-95 transition">
            <div class="text-left pl-2">
                <p id="item-count" class="text-[9px] font-bold text-gray-400 uppercase tracking-widest">0 Articles</p>
                <p id="final-price" class="text-xl font-black">0 DH</p>
            </div>
            <span class="font-black flex items-center gap-2 pr-2">Voir le panier <i data-lucide="arrow-right" class="w-4 h-4 text-orange-500"></i></span>
        </button>
    </div>

    <div id="cart-drawer-root" class="fixed inset-0 z-[100] pointer-events-none">
        <div id="cart-overlay" class="absolute inset-0 bg-black/40 backdrop-blur-sm pointer-events-auto" onclick="toggleCart(false)"></div>
        <div id="cart-panel" class="absolute right-0 top-0 bottom-0 w-[85%] max-w-md bg-white flex flex-col pointer-events-auto">
            <div class="p-6 border-b flex justify-between items-center">
                <h2 class="text-2xl font-black italic tracking-tight">Mon Panier</h2>
                <button onclick="toggleCart(false)" class="p-3 bg-gray-100 rounded-full text-gray-500"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-4 no-scrollbar"></div>
            
            <div class="p-8 bg-gray-50/80 border-t border-gray-100 space-y-3">
                <div class="flex justify-between items-center px-2">
                    <span class="font-bold text-gray-400 uppercase text-[10px]">Livraison</span>
                    <span id="delivery-price" class="font-bold text-gray-600 text-sm">20 DH</span>
                </div>
                <div class="flex justify-between items-center px-2">
                    <span class="font-bold text-gray-400 uppercase text-[10px]">Total à payer</span>
                    <span id="drawer-total" class="text-3xl font-black text-[#E85A24]">0 DH</span>
                </div>
                <button onclick="sendToWhatsApp()" class="w-full bg-[#25D366] text-white py-5 rounded-[1.8rem] font-black text-lg flex justify-center items-center gap-3 shadow-xl shadow-green-100 active:scale-95 transition">
                    <i data-lucide="message-circle" class="w-6 h-6"></i> Commander via WhatsApp
                </button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBebaGxqiNBvCqofveg1Fmztl7av3Mdoyg",
            authDomain: "lascotaco-67fe5.firebaseapp.com",
            projectId: "lascotaco-67fe5",
            storageBucket: "lascotaco-67fe5.firebasestorage.app",
            messagingSenderId: "865918381027",
            appId: "1:865918381027:web:abc6435df20894020c4ed6"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let cart = {}; 
        let activeStore = 'Restaurant'; 
        let activeCat = '🔥 Top vente';
        let livraisonFee = 20; // <--- You can change this number anytime

        async function loadSlides() {
            const slider = document.getElementById('slider');
            const dots = document.getElementById('slider-dots');
            const snap = await db.collection("banners").orderBy("timestamp", "desc").get();
            if (snap.empty) { slider.innerHTML = `<img src="https://via.placeholder.com/800x400" class="slide-img">`; return; }
            slider.innerHTML = ""; dots.innerHTML = "";
            let i = 0;
            snap.forEach(doc => {
                slider.innerHTML += `<img src="${doc.data().url}" class="slide-img shrink-0">`;
                dots.innerHTML += `<div class="w-1.5 h-1.5 rounded-full bg-white transition-all duration-500 ${i === 0 ? 'w-5' : 'opacity-40'}"></div>`;
                i++;
            });
            let index = 0;
            if(snap.size > 1) {
                setInterval(() => {
                    index = (index + 1) % snap.size;
                    slider.style.transform = `translateX(-${index * 100}%)`;
                    Array.from(dots.children).forEach((dot, dIdx) => {
                        dot.className = `w-1.5 h-1.5 rounded-full bg-white transition-all duration-500 ${dIdx === index ? 'w-5' : 'opacity-40'}`;
                    });
                }, 5000);
            }
        }

        function toggleCart(show) {
            const body = document.getElementById('body-wrap');
            if(show) { body.classList.replace('drawer-closed', 'drawer-open'); renderDrawer(); } 
            else { body.classList.replace('drawer-open', 'drawer-closed'); }
        }

        async function renderLabels() {
            const nav = document.getElementById('sub-nav');
            nav.innerHTML = `<button onclick="setCat('🔥 Top vente')" class="px-6 py-2.5 rounded-xl font-bold whitespace-nowrap border transition-all ${activeCat === '🔥 Top vente' ? 'active-label' : 'bg-white text-gray-400 border-transparent'}">🔥 Top vente</button>`;
            const snap = await db.collection("categories").where("type", "==", activeStore).get();
            snap.forEach(doc => {
                const name = doc.data().name;
                const active = activeCat === name ? 'active-label' : 'bg-white text-gray-400 border-transparent';
                nav.innerHTML += `<button onclick="setCat('${name}')" class="px-6 py-2.5 rounded-xl font-bold whitespace-nowrap border transition-all ${active}">${name}</button>`;
            });
        }

        function loadProducts() {
            let query = db.collection("products").where("type", "==", activeStore);
            if (activeCat === '🔥 Top vente') query = query.where("isTop", "==", true);
            else query = query.where("category", "==", activeCat);

            query.onSnapshot(snap => {
                const grid = document.getElementById('product-grid');
                grid.innerHTML = "";
                snap.forEach(doc => {
                    const p = doc.data();
                    const qty = cart[p.name]?.qty || 0;
                    grid.innerHTML += `
                        <div class="glass-card p-3 flex flex-col gap-3">
                            <div class="h-32 bg-gray-50 rounded-2xl overflow-hidden relative shadow-inner">
                                <img src="${p.image}" class="w-full h-full object-cover">
                                ${p.isTop ? '<span class="absolute top-2 left-2 bg-orange-600 text-white text-[8px] font-black px-2 py-1 rounded-md">TOP</span>' : ''}
                            </div>
                            <h3 class="font-bold text-xs text-gray-800 tracking-tight leading-tight">${p.name}</h3>
                            <div class="flex justify-between items-center mt-auto">
                                <span class="font-black text-[#E85A24] text-xs">${p.price} DH</span>
                                <div class="flex items-center gap-2 bg-gray-50 rounded-xl p-1 border border-gray-100">
                                    <button onclick="updateQty('${p.name}', ${p.price}, -1, '${p.image}')" class="w-7 h-7 bg-white rounded-lg shadow-sm font-bold text-xs">-</button>
                                    <span class="font-bold text-xs w-3 text-center">${qty}</span>
                                    <button onclick="updateQty('${p.name}', ${p.price}, 1, '${p.image}')" class="w-7 h-7 bg-[#E85A24] text-white rounded-lg shadow-sm font-bold text-xs">+</button>
                                </div>
                            </div>
                        </div>`;
                });
                lucide.createIcons();
            });
        }

        function updateQty(name, price, change, img) {
            if (!cart[name]) cart[name] = { qty: 0, price: price, image: img };
            cart[name].qty += change;
            if (cart[name].qty <= 0) delete cart[name];
            syncUI();
            if(!document.getElementById('body-wrap').classList.contains('drawer-closed')) renderDrawer();
        }

        function syncUI() {
            let total = 0; let count = 0;
            for (let id in cart) { total += cart[id].qty * cart[id].price; count += cart[id].qty; }
            const totalWithDelivery = total > 0 ? total + livraisonFee : 0;
            
            document.getElementById('nav-total').innerText = total + " DH";
            document.getElementById('final-price').innerText = total + " DH";
            document.getElementById('drawer-total').innerText = totalWithDelivery + " DH";
            document.getElementById('item-count').innerText = count + " Articles";
            document.getElementById('checkout-bar').style.transform = count > 0 ? 'translateY(0)' : 'translateY(100%)';
            loadProducts();
        }

        function renderDrawer() {
            const items = document.getElementById('cart-items');
            const keys = Object.keys(cart);
            if(keys.length === 0) {
                items.innerHTML = `<div class="py-20 text-center text-gray-300 font-bold">Votre panier est vide 🌮</div>`;
                return;
            }
            items.innerHTML = keys.map(name => `
                <div class="flex items-center gap-4 bg-gray-50 p-3 rounded-2xl border border-gray-100">
                    <img src="${cart[name].image}" class="w-12 h-12 rounded-xl object-cover shadow-sm">
                    <div class="flex-1">
                        <p class="font-bold text-[11px] text-gray-800 leading-tight">${name}</p>
                        <p class="text-[10px] font-black text-[#E85A24]">${cart[name].price} DH</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <button onclick="updateQty('${name}', ${cart[name].price}, -1, '${cart[name].image}')" class="w-7 h-7 bg-white rounded-lg shadow-sm font-black text-xs">-</button>
                        <span class="font-bold text-xs">${cart[name].qty}</span>
                        <button onclick="updateQty('${name}', ${cart[name].price}, 1, '${cart[name].image}')" class="w-7 h-7 bg-[#E85A24] text-white rounded-lg shadow-sm font-black text-xs">+</button>
                    </div>
                </div>
            `).join('');
        }

        function setStore(type) { activeStore = type; activeCat = '🔥 Top vente'; renderLabels(); loadProducts(); 
            document.getElementById('btn-resto').classList.toggle('active-main', type === 'Restaurant');
            document.getElementById('btn-epi').classList.toggle('active-main', type === 'Épicerie');
        }
        function setCat(cat) { activeCat = cat; renderLabels(); loadProducts(); }

        function sendToWhatsApp() {
            let msg = `🛒 *Nouvelle Commande LASCOTACO*\n\n`;
            let subtotal = 0;
            for (let id in cart) { 
                msg += `• ${cart[id].qty}x ${id} (${cart[id].qty * cart[id].price} DH)\n`;
                subtotal += cart[id].qty * cart[id].price;
            }
            msg += `\n🛵 *Livraison:* ${livraisonFee} DH`;
            msg += `\n💰 *Total:* ${subtotal + livraisonFee} DH`;
            window.open(`https://wa.me/212635791674?text=${encodeURIComponent(msg)}`);
        }

        document.addEventListener('DOMContentLoaded', () => { loadSlides(); setStore('Restaurant'); lucide.createIcons(); });
    </script>
</body>
</html>
