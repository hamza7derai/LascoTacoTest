<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LASCOTACO | App</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3075/3075977.png"> 
    <meta name="theme-color" content="#ffffff">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --resto: #E85A24; --epi: #10B981; --bg: #FDFBFA; }
        body { background-color: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .app-container { max-width: 500px; margin: 0 auto; width: 100%; position: relative; background: #FFFFFF; min-height: 100vh; box-shadow: 0 0 60px rgba(0,0,0,0.03); overflow-x: hidden; }
        body.modal-open { overflow: hidden; }

        .theme-resto { --brand: var(--resto); --brand-soft: rgba(232, 90, 36, 0.1); --brand-medium: rgba(232, 90, 36, 0.15); }
        .theme-epi { --brand: var(--epi); --brand-soft: rgba(16, 185, 129, 0.1); --brand-medium: rgba(16, 185, 129, 0.15); }

        .premium-ease { transition: all 0.25s cubic-bezier(0.2, 0.9, 0.3, 1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* SKELETON SHIMMER */
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .skeleton { background: linear-gradient(90deg, #F4F5F7 25%, #E9ECEF 50%, #F4F5F7 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite linear; }
        .skeleton-fade-out { animation: fadeOut 0.3s ease-out forwards; }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

        /* MICRO-INTERACTIONS */
        @keyframes tabBounce { 0% { transform: scale(1); } 50% { transform: scale(0.95); } 100% { transform: scale(1); } }
        .tab-bounce { animation: tabBounce 0.2s cubic-bezier(0.2, 0.9, 0.3, 1); }

        @keyframes cartBump { 0% { transform: scale(1); } 40% { transform: scale(1.1) rotate(-4deg); } 70% { transform: scale(0.95) rotate(2deg); } 100% { transform: scale(1) rotate(0); } }
        .cart-bump { animation: cartBump 0.4s cubic-bezier(0.2, 0.9, 0.3, 1.5); }
        
        /* CATEGORY SCROLL */
        .category-scroll { display: flex; gap: 12px; overflow-x: auto; scroll-snap-type: x mandatory; padding: 8px 20px 20px 20px; scroll-padding-left: 20px; scroll-behavior: smooth; }
        .category-pill { position: relative; flex: 0 0 auto; scroll-snap-align: start; transition: background-color 0.2s ease, color 0.2s ease, transform 0.15s ease; border: 2px solid transparent; }
        .category-pill:active { transform: scale(0.95); }
        
        /* PRODUCT CARDS */
        .product-card { background: white; border-radius: 20px; transition: transform 0.2s cubic-bezier(0.2, 0.9, 0.3, 1), box-shadow 0.2s ease; animation: fadeIn 0.4s ease-out forwards; border: 1px solid transparent; box-shadow: 0 4px 16px rgba(0,0,0,0.03); }
        .product-card:active { transform: scale(0.97); box-shadow: 0 8px 24px rgba(0,0,0,0.06); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .product-img-wrap { overflow: hidden; border-radius: 16px 16px 6px 6px; height: 160px; background: #F4F5F7; width: 100%; position: relative; }
        
        /* UNIFIED ADD BUTTON */
        .btn-add-unified { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; background-color: var(--brand); box-shadow: 0 4px 12px var(--brand-soft); transition: transform 0.15s ease, box-shadow 0.15s ease; flex-shrink: 0; }
        .btn-add-unified:active { transform: scale(0.9); box-shadow: 0 2px 6px var(--brand-soft); }

        /* UPSELL ANIMATION */
        @keyframes slideUpFade { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .upsell-animate { opacity: 0; animation: slideUpFade 0.4s cubic-bezier(0.2, 0.9, 0.3, 1) forwards; }

        /* MODALS */
        #bottom-sheet-root, #cart-drawer-root { position: fixed; inset: 0; z-index: 2000; pointer-events: none; display: flex; align-items: flex-end; justify-content: center; }
        #bs-overlay, #cart-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); opacity: 0; transition: opacity 0.3s ease; pointer-events: none; }
        
        #bs-panel, #cart-panel { width: 100%; max-width: 500px; border-radius: 32px 32px 0 0; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.3, 1); pointer-events: auto; display: flex; flex-direction: column; max-height: 92vh; box-shadow: 0 -20px 40px rgba(0,0,0,0.1); }
        #bs-panel { background: #FDFBFA; padding-bottom: env(safe-area-inset-bottom); }
        #cart-panel { background: #F8F9FA; }
        
        .bs-open #bs-overlay, .drawer-open #cart-overlay { opacity: 1; pointer-events: auto; }
        .bs-open #bs-panel, .drawer-open #cart-panel { transform: translateY(0); }

        /* TOAST */
        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; pointer-events: none; display: flex; flex-direction: column; gap: 8px; width: 90%; max-width: 400px; }

        /* MODAL SPECIFIC STYLES */
        .modal-radio-indicator { transition: border-color 0.2s ease; }
        .modal-radio-dot { opacity: 0; transform: scale(0.5); transition: all 0.2s cubic-bezier(0.2, 0.9, 0.3, 1); }
        .peer:checked + label .modal-radio-indicator { border-color: var(--brand); }
        .peer:checked + label .modal-radio-dot { opacity: 1; transform: scale(1); }

        .modal-cb-indicator { transition: all 0.2s ease; }
        .modal-cb-icon { opacity: 0; transform: scale(0.5); transition: all 0.2s cubic-bezier(0.2, 0.9, 0.3, 1); }
        .peer:checked + label .modal-cb-indicator { background-color: var(--brand); border-color: var(--brand); }
        .peer:checked + label .modal-cb-icon { opacity: 1; transform: scale(1); }

        /* Textarea scrollbar hiding */
        #bs-notes::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="drawer-closed theme-resto" id="body-wrap">

    <div id="toast-container"></div>

    <div class="app-container" id="app-root">
        
        <header class="sticky top-0 z-50 bg-white/95 backdrop-blur-xl px-5 py-4 flex justify-between items-center border-b border-gray-50/50">
            <h1 class="text-[28px] font-black tracking-tighter italic" style="color: var(--brand)">LASCOTACO</h1>
            <button id="nav-cart-btn" onclick="toggleCart(true)" class="relative bg-[#1A1A1A] text-white px-4 py-3 rounded-[16px] font-bold text-[14px] flex items-center gap-2 active:scale-95 transition-transform shadow-md">

                <span id="nav-badge" class="absolute -top-2 -right-2 text-white text-[11px] font-black w-6 h-6 flex items-center justify-center rounded-full border-2 border-[#1A1A1A] shadow-sm scale-0 premium-ease" style="background-color: var(--brand)">0</span>

        <div class="px-5 pt-3 pb-3 bg-white/95 backdrop-blur-xl sticky top-[76px] z-40">

                <button onclick="setStore('Restaurant')" id="btn-resto" class="flex-1 relative z-10 py-3 rounded-[16px] text-[15px] font-extrabold flex items-center justify-center gap-2 text-white transition-colors duration-300 active:scale-95">

        </div>

        <div id="sub-nav-wrapper" class="bg-white relative z-20">

            <div class="h-[1px] w-full bg-gray-50 absolute bottom-0"></div>

        <main id="product-grid" class="p-5 grid grid-cols-2 gap-4 pb-40"></main>

        <div id="checkout-bar" class="fixed bottom-6 left-5 right-5 max-w-[460px] mx-auto z-50 translate-y-[150%] premium-ease">
            <button onclick="toggleCart(true)" class="w-full text-white p-3 rounded-[24px] flex justify-between items-center shadow-[0_12px_30px_var(--brand-medium)] active:scale-[0.98] premium-ease relative overflow-hidden bg-[var(--brand)]">
                <div class="flex items-center gap-3 pl-1 z-10">

                        <i data-lucide="shopping-bag" class="w-[24px] h-[24px] text-white"></i>
                        <span id="floating-badge" class="absolute -top-1.5 -right-1.5 text-[var(--brand)] text-[11px] w-6 h-6 rounded-full flex justify-center items-center font-black bg-white shadow-md">0</span>
                    </div>
                    <div class="text-left">

                </div>

                    0 DH

    <div id="bottom-sheet-root">

                <div class="absolute top-2.5 left-1/2 -translate-x-1/2 w-12 h-1.5 bg-gray-200 rounded-full"></div>
                <img id="bs-image" src="" class="w-20 h-20 rounded-[16px] object-cover bg-[#F4F5F7] mt-2 shrink-0 shadow-sm border border-gray-100">
                <div class="mt-2 pr-2 w-full flex-1 min-w-0">
                    <h3 id="bs-title" class="font-black text-[18px] text-gray-900 leading-tight tracking-tight truncate">Produit</h3>
                    <p id="bs-description" class="text-[12px] text-gray-500 font-medium mt-1 leading-snug hidden line-clamp-2"></p>
                    <p id="bs-price" class="font-black mt-2 text-[18px] text-[var(--brand)]">0 DH</p>
                </div>
                <button onclick="closeSheet()" class="w-8 h-8 flex items-center justify-center bg-[#F4F5F7] rounded-full text-gray-500 hover:bg-gray-200 active:scale-90 transition-transform duration-200 mt-2 shrink-0">
                    <i data-lucide="x" class="w-4 h-4"></i>

                        <span class="bg-[var(--brand-soft)] text-[var(--brand)] text-[10px] font-bold px-2 py-1 rounded-md uppercase">Requis</span>
                    </div>

                <div id="bs-instructions" class="space-y-3 hidden pb-4">

                    <div class="relative">
                        <textarea id="bs-notes" maxlength="150" oninput="document.getElementById('char-count').innerText = this.value.length" placeholder="Ex: Sans oignons..." class="w-full p-4 bg-[#F8F9FA] rounded-[16px] font-medium text-[14px] text-gray-800 border-2 border-transparent outline-none resize-none h-24 transition-colors focus:border-[var(--brand)] focus:bg-white placeholder-gray-400 shadow-inner"></textarea>
                        <span class="absolute bottom-3 right-4 text-[10px] font-bold text-gray-400"><span id="char-count">0</span>/150</span>

                    <div class="flex items-center gap-2.5"><i data-lucide="shopping-cart" class="w-5 h-5"></i><span>Ajouter</span></div>

                </button>

        </div>

        <div id="cart-overlay" onclick="toggleCart(false)" class="premium-ease"></div>
        <div id="cart-panel" class="premium-ease">
            <div class="p-6 flex justify-between items-start shrink-0 bg-white rounded-t-[32px] relative border-b border-gray-50 shadow-[0_4px_16px_rgba(0,0,0,0.02)] z-20">
                <div class="absolute top-2.5 left-1/2 -translate-x-1/2 w-12 h-1.5 bg-gray-200 rounded-full"></div>
                <div class="mt-2">
                    <h2 class="text-[24px] font-black tracking-tight text-gray-900">Mon Panier</h2>
                    <p class="text-[13px] font-semibold mt-1 flex items-center gap-1.5 text-[var(--brand)]">
                        <i data-lucide="clock" class="w-4 h-4"></i> <span id="cart-header-count">0 article</span> • ~ 30 min
                    </p>
                </div>
                <button onclick="toggleCart(false)" class="p-2.5 bg-[#F4F5F7] rounded-full text-gray-500 hover:bg-gray-200 active:scale-90 transition-transform mt-2"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            
            <div id="cart-items" class="flex-1 overflow-y-auto p-5 space-y-4 no-scrollbar bg-[#FDFBFA] z-10"></div>
            
            <div id="upsell-container" class="pb-5 shrink-0 bg-[#FDFBFA] hidden z-10 border-t border-gray-100">
                <div class="px-5 pt-5 pb-2"><p class="font-black text-[16px] text-gray-900">À ne pas manquer ! 🥤</p></div>
                <div class="flex gap-3 overflow-x-auto no-scrollbar px-5 pb-3 pt-1" style="scroll-snap-type: x mandatory;" id="upsell-list"></div>
            </div>

            <div class="p-6 bg-white shrink-0 rounded-t-[32px] shadow-[0_-20px_40px_rgba(0,0,0,0.06)] z-20">
                <div class="space-y-3.5">
                    <div class="flex justify-between items-center"><span class="font-bold text-gray-400 text-[14px]">Sous-total</span><span id="drawer-subtotal" class="font-bold text-gray-600 text-[15px]">0 DH</span></div>
                    <div class="flex justify-between items-center"><span class="font-bold text-gray-400 text-[14px]">Livraison</span><span class="font-bold text-gray-600 text-[15px]">20 DH</span></div>
                    <div class="border-t border-gray-100 pt-4 mt-2 flex justify-between items-end">

                <button onclick="sendToWhatsApp()" id="wa-btn" class="w-full bg-[#25D366] text-white py-4.5 h-[60px] rounded-[20px] font-black text-[16px] flex justify-center items-center gap-2 mt-6 active:scale-[0.97] transition-all"><i data-lucide="message-circle" class="w-5 h-5"></i> Commander</button>

    <script>
        if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js').catch(()=>{}); }); }

        const firebaseConfig = { apiKey: "AIzaSyBebaGxqiNBvCqofveg1Fmztl7av3Mdoyg", authDomain: "lascotaco-67fe5.firebaseapp.com", projectId: "lascotaco-67fe5", storageBucket: "lascotaco-67fe5.firebasestorage.app", messagingSenderId: "865918381027", appId: "1:865918381027:web:abc6435df20894020c4ed6" };
        firebase.initializeApp(firebaseConfig); const db = firebase.firestore();

        let cart = JSON.parse(localStorage.getItem('lasco_cart_v2')) || []; 
        let activeStore = 'Restaurant'; let activeCat = '🔥 Top vente';
        let livraisonFee = 20;
        let globalProducts = []; 
        let currentItemForSheet = null;
        let lastTotal = 0; 

        function renderSkeletons() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = Array(6).fill().map(() => `
                <div class="product-card p-2 flex flex-col h-[260px] border-transparent shadow-sm">
                    <div class="skeleton w-full h-[160px] rounded-[16px] mb-3 shrink-0"></div>
                    <div class="px-1.5 flex flex-col flex-1">
                        <div class="skeleton w-3/4 h-4 rounded mb-2"></div>
                        <div class="skeleton w-1/2 h-4 rounded mt-auto mb-1"></div>
                        <div class="flex justify-between items-end mt-2">
                            <div class="skeleton w-1/3 h-5 rounded mb-1"></div>
                            <div class="skeleton w-[40px] h-[40px] rounded-full shrink-0"></div>
                        </div>
                    </div>
                </div>`).join('');
        }

        function saveCart() { localStorage.setItem('lasco_cart_v2', JSON.stringify(cart)); }

        renderSkeletons();
        db.collection("products").get().then(snap => {
            snap.forEach(doc => {
                let data = doc.data();
                if (data.isActive === false) return; 
                if (!data.category) data.category = '🔥 Top vente'; 
                globalProducts.push(data);
            });
            setTimeout(() => { renderUpsells(); loadProducts(false); syncUI(); }, 500);
        });

        function showToast(message) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'bg-[#1A1A1A] text-white px-5 py-4 rounded-[16px] text-[14px] font-bold shadow-lg transition-all duration-300 translate-y-[-20px] opacity-0 flex items-center gap-3 z-[9999]';
            toast.innerHTML = `<i data-lucide="check-circle-2" class="w-5 h-5 text-[#25D366]"></i> <span>${message}</span>`;
            container.appendChild(toast); lucide.createIcons();
            requestAnimationFrame(() => { toast.classList.remove('translate-y-[-20px]', 'opacity-0'); });
            setTimeout(() => { toast.classList.add('translate-y-[-20px]', 'opacity-0'); setTimeout(() => toast.remove(), 400); }, 2500);
        }

        function triggerCartPulse() {
            const btn = document.getElementById('nav-cart-btn');
            if(btn) { btn.classList.remove('cart-bump'); void btn.offsetWidth; btn.classList.add('cart-bump'); }
            if (window.navigator.vibrate) window.navigator.vibrate(10);
        }

        function setStore(type) { 
            activeStore = type; activeCat = '🔥 Top vente'; document.getElementById('search-input').value = '';
            const body = document.getElementById('body-wrap');
            const toggleBg = document.getElementById('store-toggle-bg');
            const btnResto = document.getElementById('btn-resto'); const btnEpi = document.getElementById('btn-epi');
            if(type === 'Restaurant') { body.className = "drawer-closed theme-resto"; toggleBg.style.transform = 'translateX(0)'; btnResto.classList.replace('text-gray-500', 'text-white'); btnEpi.classList.replace('text-white', 'text-gray-500'); } 
            else { body.className = "drawer-closed theme-epi"; toggleBg.style.transform = 'translateX(100%)'; btnEpi.classList.replace('text-gray-500', 'text-white'); btnResto.classList.replace('text-white', 'text-gray-500'); }
            renderLabels(); loadProducts(true); renderUpsells();
        }

        async function renderLabels() {
            const nav = document.getElementById('sub-nav');
            const cats = [{name: '🔥 Top vente'}];
            const snap = await db.collection("categories").where("type", "==", activeStore).get();
            snap.forEach(doc => cats.push(doc.data()));
            nav.innerHTML = cats.map((cat, idx) => {
                let isTop = cat.name === '🔥 Top vente';
                let isActive = activeCat === cat.name;
                return `<button id="btn-cat-${idx}" onclick="handleCatClick('${cat.name}', 'btn-cat-${idx}')" class="category-pill flex items-center gap-1.5 px-5 py-2.5 text-[14px] font-bold whitespace-nowrap rounded-[14px] transition-all duration-200 ${isActive ? 'bg-[var(--brand)] text-white shadow-md' : 'bg-[#F4F5F7] text-[#64748b] hover:bg-gray-100'}">${isTop ? `<i data-lucide="flame" class="w-4 h-4"></i>` : ''} ${cat.name === '🔥 Top vente' ? 'Top vente' : cat.name}</button>`;
            }).join('');
            lucide.createIcons();
        }

        function handleCatClick(catName, elementId) {
            const el = document.getElementById(elementId);
            if(el) { el.classList.add('tab-bounce'); setTimeout(() => el.classList.remove('tab-bounce'), 250); }
            activeCat = catName; document.getElementById('search-input').value = '';
            renderLabels(); loadProducts(true);
            const nav = document.getElementById('sub-nav');
            nav.scrollTo({ left: document.getElementById(elementId).offsetLeft - 20, behavior: 'smooth' });
        }

        document.getElementById('search-input').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            if(term.length > 0) { renderProductGrid(globalProducts.filter(p => p.type === activeStore && p.name.toLowerCase().includes(term))); } 
            else { loadProducts(false); }
        });

        function loadProducts(withSkeleton = false) {
            let filtered = activeCat === '🔥 Top vente' ? globalProducts.filter(p => p.type === activeStore && p.isTop === true) : globalProducts.filter(p => p.type === activeStore && p.category === activeCat);
            if(withSkeleton) { renderSkeletons(); setTimeout(() => renderProductGrid(filtered), 400); } 
            else { renderProductGrid(filtered); }
        }

        function renderProductGrid(products) {
            const grid = document.getElementById('product-grid');
            if(products.length === 0) { grid.innerHTML = '<div class="col-span-2 text-center text-gray-400 py-12"><i data-lucide="search-x" class="w-10 h-10 mx-auto mb-3 opacity-50"></i><p class="font-bold text-[15px]">Aucun résultat trouvé</p></div>'; lucide.createIcons(); return; }
            grid.innerHTML = products.map((p, index) => `
                <div class="product-card cursor-pointer p-2 flex flex-col" onclick="openProductByName('${p.name.replace(/'/g, "\\'")}')">
                    <div class="product-img-wrap group">
                        <div class="absolute inset-0 skeleton z-10 pointer-events-none"></div>
                        <img src="${p.image}" ${index >= 4 ? 'loading="lazy"' : ''} onerror="this.onerror=null; this.src='https://placehold.co/400x300/F4F5F7/A0AEC0?text=--'" class="w-full h-full object-cover opacity-0 blur-[4px] transition-all duration-500 ease-out" onload="this.classList.remove('opacity-0', 'blur-[4px]'); this.previousElementSibling?.classList.add('skeleton-fade-out');">
                        ${p.isTop ? `<span class="absolute top-2 left-2 text-[var(--brand)] bg-white/95 backdrop-blur-sm text-[9px] font-black px-2 py-1 rounded-[6px] uppercase shadow-sm z-20">Top</span>` : ''}
                    </div>
                    <div class="pt-3 px-1.5 flex flex-col flex-1 justify-between pb-1">
                        <h3 class="font-bold text-[14px] text-gray-900 leading-snug line-clamp-2">${p.name}</h3>
                        <div class="flex justify-between items-end mt-3"><span class="font-black text-[16px] text-[var(--brand)] mb-1">${p.hasSizes ? 'Dès ' : ''}${p.price} DH</span><button class="btn-add-unified" onclick="event.stopPropagation(); openProductByName('${p.name.replace(/'/g, "\\'")}', true);"><i data-lucide="plus" class="w-5 h-5"></i></button></div>
                    </div>
                </div>`).join('');
            lucide.createIcons();
        }

        function calculateCurrentModalPrice() {
            if(!currentItemForSheet) return;
            let basePrice = currentItemForSheet.price;
            if(currentItemForSheet.hasSizes && currentItemForSheet.sizes?.length > 0) { const checkedSize = document.querySelector('input[name="size-choice"]:checked'); if (checkedSize) basePrice = Number(checkedSize.value); }
            if(currentItemForSheet.hasExtras && currentItemForSheet.extras?.length > 0) { document.querySelectorAll('input[name="extra-choice"]:checked').forEach(cb => { basePrice += Number(cb.value); }); }
            document.getElementById('bs-price').innerText = basePrice + ' DH';
            document.getElementById('bs-btn-price').innerText = basePrice + ' DH';
        }

        function openProductByName(productName, animateBtn = false) {
            const p = globalProducts.find(item => item.name === productName);
            if(!p) return;
            currentItemForSheet = p;
            document.getElementById('bs-content-scroll').scrollTo(0,0);
            document.getElementById('bs-image').src = p.image;
            document.getElementById('bs-title').innerText = p.name;
            const descEl = document.getElementById('bs-description');
            if(p.description?.trim()) { descEl.innerText = p.description; descEl.classList.remove('hidden'); } else { descEl.classList.add('hidden'); }
            
            const sizeDiv = document.getElementById('bs-sizes');
            const sizeContainer = document.getElementById('size-options-container');
            if(p.hasSizes && p.sizes?.length > 0) {
                sizeContainer.innerHTML = p.sizes.map((s, idx) => `
                    <div class="relative active:scale-[0.98] transition-transform">
                        <input type="radio" name="size-choice" id="size-${idx}" value="${s.price}" data-name="${s.name}" class="peer hidden" ${idx === 0 ? 'checked' : ''} onchange="calculateCurrentModalPrice()">
                        <label for="size-${idx}" class="flex justify-between items-center p-3.5 rounded-[16px] border-2 border-transparent bg-[#F8F9FA] cursor-pointer transition-all peer-checked:border-[var(--brand)] peer-checked:bg-[var(--brand-soft)] shadow-sm">
                            <div class="flex items-center gap-3"><div class="w-5 h-5 rounded-full border-2 border-gray-300 flex items-center justify-center modal-radio-indicator bg-white shrink-0"><div class="w-2.5 h-2.5 rounded-full bg-[var(--brand)] modal-radio-dot"></div></div><span class="font-bold text-gray-800 text-[15px]">${s.name}</span></div>
                            <span class="font-black text-[15px] text-gray-800 peer-checked:text-[var(--brand)] shrink-0">${s.price} DH</span>
                        </label>
                    </div>`).join('');
                sizeDiv.classList.remove('hidden');
            } else { sizeDiv.classList.add('hidden'); }

            const extrasDiv = document.getElementById('bs-extras');
            const extrasContainer = document.getElementById('extras-options-container');
            if(p.hasExtras && p.extras?.length > 0) {
                extrasContainer.innerHTML = p.extras.map((e, idx) => `
                    <div class="relative active:scale-[0.98] transition-transform">
                        <input type="checkbox" name="extra-choice" id="extra-${idx}" value="${e.price}" data-name="${e.name}" class="peer hidden" onchange="calculateCurrentModalPrice()">
                        <label for="extra-${idx}" class="flex justify-between items-center p-3.5 rounded-[16px] border-2 border-transparent bg-white cursor-pointer transition-all hover:bg-gray-50 peer-checked:border-[var(--brand)] peer-checked:bg-[var(--brand-soft)] shadow-sm border border-gray-100">
                            <div class="flex items-center gap-3"><div class="w-[20px] h-[20px] rounded-[6px] border-2 border-gray-300 flex items-center justify-center modal-cb-indicator bg-white shrink-0"><i data-lucide="check" class="w-3 h-3 text-white modal-cb-icon"></i></div><span class="font-bold text-gray-800 text-[14px]">${e.name}</span></div>
                            <span class="font-black text-[14px] text-gray-500 peer-checked:text-[var(--brand)] shrink-0">+${e.price} DH</span>
                        </label>
                    </div>`).join('');
                extrasDiv.classList.remove('hidden');
            } else { extrasDiv.classList.add('hidden'); }
            
            const sauceDiv = document.getElementById('bs-sauces');
            const sauceContainer = document.getElementById('sauce-options-container');
            if(p.requiresSauce && p.sauces?.length > 0) {
                sauceContainer.innerHTML = `<div class="flex flex-wrap gap-2.5">` + p.sauces.map((s, idx) => `<div class="relative active:scale-[0.95] transition-transform"><input type="radio" name="sauce-choice" id="sauce-${idx}" value="${s}" class="peer hidden"><label for="sauce-${idx}" class="flex items-center px-4 py-2.5 rounded-full border-2 border-gray-100 bg-white cursor-pointer transition-all peer-checked:border-[var(--brand)] peer-checked:bg-[var(--brand)] peer-checked:text-white text-gray-600 font-bold text-[13px] shadow-sm">${s}</label></div>`).join('') + `</div>`;
                sauceDiv.classList.remove('hidden');
            } else { sauceContainer.innerHTML = ''; sauceDiv.classList.add('hidden'); }
            
            const notesDiv = document.getElementById('bs-instructions');
            document.getElementById('bs-notes').value = '';
            document.getElementById('char-count').innerText = '0';
            if(p.hasInstructions !== false) notesDiv.classList.remove('hidden'); else notesDiv.classList.add('hidden');
            
            calculateCurrentModalPrice(); lucide.createIcons();
            document.getElementById('body-wrap').classList.add('bs-open', 'modal-open');
        }

        function closeSheet() { document.getElementById('body-wrap').classList.remove('bs-open', 'modal-open'); currentItemForSheet = null; }

        document.getElementById('bs-add-btn').addEventListener('click', () => {
            if(!currentItemForSheet) return;
            const p = currentItemForSheet;
            let finalPrice = p.price;
            let finalSizeName = "";
            if (p.hasSizes && p.sizes?.length > 0) { const checkedSize = document.querySelector('input[name="size-choice"]:checked'); if (checkedSize) { finalPrice = Number(checkedSize.value); finalSizeName = checkedSize.dataset.name; } }
            let selectedExtras = [];
            if(p.hasExtras && p.extras?.length > 0) { document.querySelectorAll('input[name="extra-choice"]:checked').forEach(cb => { selectedExtras.push({ name: cb.dataset.name, price: Number(cb.value) }); finalPrice += Number(cb.value); }); }
            const checkedSauce = document.querySelector('input[name="sauce-choice"]:checked');
            const sauce = checkedSauce ? checkedSauce.value : '';
            const notes = document.getElementById('bs-notes').value.trim();
            if (p.requiresSauce && !sauce) { alert("Choisissez une sauce."); return; }
            const complexId = `${p.name}-${finalSizeName}-${sauce}-${notes}-${selectedExtras.map(e => e.name).join(',')}`;
            const existing = cart.find(i => i.id === complexId);
            if(existing) existing.qty++; else cart.push({ id: complexId, name: p.name, price: finalPrice, image: p.image, sizeName: finalSizeName, extras: selectedExtras, sauce: sauce, notes: notes, qty: 1 });
            closeSheet(); saveCart(); syncUI(); showToast(`${p.name} ajouté !`); triggerCartPulse();
        });

        function renderUpsells() {
            const drinks = globalProducts.filter(p => p.category?.toLowerCase().includes('boisson')).slice(0, 5); 
            const container = document.getElementById('upsell-container');
            const list = document.getElementById('upsell-list');
            if(drinks.length === 0) { container.classList.add('hidden'); return; }
            container.classList.remove('hidden');
            list.innerHTML = drinks.map((d, index) => `
                <div class="upsell-animate snap-start min-w-[250px] h-[72px] bg-white border border-[#F4F5F7] rounded-[16px] p-3 flex items-center gap-3 relative shadow-sm cursor-pointer active:scale-[0.97] transition-transform" style="animation-delay: ${index * 60}ms" onclick="quickAdd('${d.name.replace(/'/g, "\\'")}')">
                    <span class="absolute -top-2 left-3 ${index % 2 ? 'bg-[#10B981]' : 'bg-red-500'} text-white text-[8px] font-black px-1.5 py-0.5 rounded shadow-sm z-20">${index % 2 ? 'FRAIS' : 'POPULAIRE'}</span>
                    <div class="w-[48px] h-[48px] rounded-[12px] bg-[#F4F5F7] overflow-hidden shrink-0 relative"><div class="absolute inset-0 skeleton z-10 pointer-events-none"></div><img src="${d.image}" loading="lazy" class="w-full h-full object-cover opacity-0 blur-[4px] transition-all duration-500" onload="this.classList.remove('opacity-0', 'blur-[4px]'); this.previousElementSibling?.classList.add('skeleton-fade-out');"></div>
                    <div class="flex-1 min-w-0 flex flex-col justify-center"><p class="font-bold text-[14px] text-gray-900 truncate">${d.name}</p><p class="font-black text-[14px] text-[var(--brand)] mt-0.5">${d.price} DH</p></div>
                    <button class="btn-add-unified"><i data-lucide="plus" class="w-5 h-5"></i></button>
                </div>`).join('');
            lucide.createIcons();
        }

        function quickAdd(productName) {
            const p = globalProducts.find(item => item.name === productName);
            if(!p) return;
            const complexId = `${p.name}-----`;
            const existing = cart.find(i => i.id === complexId);
            if(existing) existing.qty++; else cart.push({ id: complexId, name: p.name, price: p.price, image: p.image, sizeName: '', extras: [], sauce: '', notes: '', qty: 1 });
            saveCart(); syncUI(); renderDrawer(); showToast(`${p.name} ajouté !`); triggerCartPulse();
        }

        function updateCartItemQty(id, change) {
            const index = cart.findIndex(i => i.id === id);
            if(index !== -1) { cart[index].qty += change; if(cart[index].qty <= 0) cart.splice(index, 1); }
            saveCart(); syncUI(); renderDrawer();
        }
        function removeCartItem(id) { const index = cart.findIndex(i => i.id === id); if(index !== -1) cart.splice(index, 1); saveCart(); syncUI(); renderDrawer(); }

        function animateValue(obj, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                obj.innerHTML = Math.floor(progress * (end - start) + start) + " DH";
                if (progress < 1) window.requestAnimationFrame(step); else obj.innerHTML = end + " DH";
            };
            window.requestAnimationFrame(step);
        }

        function syncUI() {
            let total = 0, count = 0; cart.forEach(i => { total += i.qty * i.price; count += i.qty; });
            document.getElementById('nav-total').innerText = total + " DH";
            const navBadge = document.getElementById('nav-badge');
            if (count > 0) { navBadge.innerText = count; navBadge.classList.replace('scale-0', 'scale-100'); } else { navBadge.classList.replace('scale-100', 'scale-0'); }
            document.getElementById('floating-badge').innerText = count;
            document.getElementById('item-count-text').innerText = count + (count > 1 ? " articles" : " article");
            const bottomPriceEl = document.getElementById('final-price-bottom');
            if (total !== lastTotal) { animateValue(bottomPriceEl, lastTotal, total, 300); lastTotal = total; } else { bottomPriceEl.innerText = total + " DH"; }
            document.getElementById('cart-header-count').innerText = count + (count > 1 ? " articles" : " article");
            document.getElementById('drawer-subtotal').innerText = total + " DH";
            document.getElementById('drawer-total').innerText = (total > 0 ? total + livraisonFee : 0) + " DH";
            document.getElementById('checkout-bar').style.transform = count > 0 ? 'translateY(0)' : 'translateY(150%)';
        }

        function renderDrawer() {
            const list = document.getElementById('cart-items');
            if(cart.length === 0) { list.innerHTML = `<div class="py-24 text-center"><p class="text-gray-400 font-bold text-[14px] uppercase tracking-widest mb-4">Panier vide 🌮</p><button onclick="toggleCart(false)" class="text-[15px] font-black underline text-[var(--brand)]">Retour au menu</button></div>`; return; }
            list.innerHTML = cart.map(item => `
                <div class="flex items-center gap-4 bg-white p-5 rounded-[20px] shadow-sm border border-gray-50/50">
                    <img src="${item.image}" class="w-[72px] h-[72px] rounded-[16px] object-cover bg-[#F8F9FA] shrink-0" style="mix-blend-mode: multiply;">
                    <div class="flex-1 pr-2 min-w-0">
                        <p class="font-bold text-[16px] text-gray-900 truncate">${item.name}</p>
                        ${item.sizeName ? `<p class="text-[12px] text-gray-500 font-bold mt-1">Taille: ${item.sizeName}</p>` : ''}
                        ${item.extras?.length ? `<p class="text-[12px] text-gray-500 font-bold mt-0.5 truncate">Extras: ${item.extras.map(e=>e.name).join(', ')}</p>` : ''}
                        ${item.sauce ? `<p class="text-[12px] text-gray-500 mt-0.5">Sauce: ${item.sauce}</p>` : ''}
                        ${item.notes ? `<p class="text-[12px] text-orange-500 italic mt-0.5 truncate">"${item.notes}"</p>` : ''}
                        <p class="font-black mt-2 text-[17px] text-[var(--brand)]">${item.price} DH</p>
                        <button onclick="removeCartItem('${item.id}')" class="text-gray-400 text-[11px] font-bold mt-2 flex items-center gap-1.5"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i> Supprimer</button>
                    </div>
                    <div class="flex flex-col items-center justify-between bg-[#F4F5F7] rounded-full p-1.5 h-[112px] w-[46px] shrink-0">
                        <button onclick="updateCartItemQty('${item.id}', 1)" class="w-[34px] h-[34px] bg-white rounded-full shadow-sm flex items-center justify-center"><i data-lucide="plus" class="w-4 h-4 text-gray-800"></i></button>
                        <span class="font-bold text-[15px] text-gray-900">${item.qty}</span>
                        <button onclick="updateCartItemQty('${item.id}', -1)" class="w-[34px] h-[34px] bg-white rounded-full shadow-sm flex items-center justify-center"><i data-lucide="minus" class="w-4 h-4 text-gray-800"></i></button>
                    </div>
                </div>`).join('');
            lucide.createIcons();
        }

        function toggleCart(show) { document.getElementById('body-wrap').classList.toggle('drawer-open', show); document.getElementById('body-wrap').classList.toggle('modal-open', show); if(show) renderDrawer(); }

        function sendToWhatsApp() {
            if(cart.length === 0) return;
            let msg = `🛒 *Nouvelle Commande LASCOTACO*\n\n`;
            let sub = 0; cart.forEach(i => { msg += `• *${i.qty}x* ${i.name} ${i.sizeName ? `(${i.sizeName})` : ''}\n  ${i.extras?.length ? `Extras: ${i.extras.map(e=>e.name).join(', ')}\n` : ''}${i.sauce ? `Sauce: ${i.sauce}\n` : ''}${i.notes ? `Note: ${i.notes}\n` : ''}  = ${i.qty * i.price} DH\n\n`; sub += i.qty * i.price; });
            msg += `🛵 *Livraison:* ${livraisonFee} DH\n💰 *TOTAL:* ${sub + livraisonFee} DH`;
            window.open(`https://wa.me/212708006088?text=${encodeURIComponent(msg)}`);
        }
        document.addEventListener('DOMContentLoaded', () => { setStore('Restaurant'); lucide.createIcons(); });
    </script>
</body>
</html>
